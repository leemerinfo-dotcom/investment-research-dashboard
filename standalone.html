delay claims versus primary SemiAnalysis/NVIDIA statements.", "summary": "Source / Funds / Social Intelligence — Sweep Date: 20260710 Desk: Source / funds / social intelligence Desk conclusion"}, {"id": "job-36becd52f823", "title": "Biotech / Health / Longevity / Tools", "category": "Desk Outputs", "source": "cron/36becd52f823/2026-07-10_06-50-52.md — final response only", "updated": "2026-07-10T07:50:52", "content": "## Biotech / health-tech public-market scan — Fri Jul 10, 2026\n\n**Bottom line:** this vertical deserves **more desk coverage**, but not indiscriminately. The best current risk/reward is in **measurable adoption platforms** — diagnostics, med-device/logistics, oncology testing — plus a **small event-driven sleeve** in gene editing/obesity. I’d spend **less time on pure AI-drug-discovery narratives** until clinical translation improves.\n\nMarket data below from current Yahoo/yfinance pull today; clinical/financial facts from company releases and public filings/news.\n\n---\n\n# Priority candidates / themes\n\n## 1) TransMedics — **TMDX**\n**Theme:** transplant-medtech + logistics platform; closer to repeatable compounder than biotech lottery.\n\n- **Catalyst:** continued scaling of Organ Care System + National OCS Program; ENHANCE Heart / DENOVO Lung; Europe transplant logistics rollout via PAD Aviation; OCS Kidney progress.\n- **Evidence quality:** **High for commercial traction, medium for new indications.** Q1’26 revenue was **$173.9M, +21% YoY**; company reiterated **2026 revenue guidance $727M–$757M**; Q1 was GAAP profitable.\n- **Probability of thesis success:** **~60–70%** for continued operating compounder execution; lower for each incremental clinical expansion program.\n- **Cash / dilution risk:** **Low near-term.** Cash **$461.7M** at Q1; profitable, though aircraft/logistics expansion is capital intensive.\n- **Valuation:** price ~$72; market cap **~$2.5B**, EV **~$2.9B**; roughly **3.9x 2026E sales**. This is the cleanest valuation/revenue mismatch in the list if growth persists.\n- **Thesis-breaker:** margin compression from owning logistics/aircraft; clinical trial failures limiting expansion; reimbursement/transplant-center workflow resistance; execution risk in Europe/kidney.\n\n**Desk view:** **Best repeatable opportunity in the scan.** Worth active coverage.\n\n---\n\n## 2) Guardant Health — **GH**\n**Theme:** blood-based cancer screening + precision oncology platform.\n\n- **Catalyst:** Shield colorectal cancer screening commercialization. On July 1, UnitedHealth coverage pushed Shield access to **100M+ covered lives**; Q1 showed early screening ramp. Quest partnership adds distribution.\n- **Evidence quality:** **High commercial evidence, medium clinical-utility/adoption durability.** Q1’26 revenue **$301.7M, +48% YoY**; oncology revenue **$205M, +36%**; screening revenue **$41.6M** on **~44k Shield tests**, up from **$5.7M / 9k tests** YoY. Guidance raised to **$1.30B–$1.32B** revenue.\n- **Probability of thesis success:** **~55–70%** that Shield/oncology growth remains strong enough to support premium valuation; lower if payer friction or test economics disappoint.\n- **Cash / dilution risk:** **Moderate-low.** Cash/securities **~$1.2B**; guided 2026 FCF burn **$185M–$195M**, so runway looks comfortable.\n- **Valuation:** price ~$164; market cap **~$21.8B**, EV **~$22.4B**; roughly **17x 2026E sales**. Expensive, but growth is real.\n- **Thesis-breaker:** payer reimbursement rates, CRC screening compliance/follow-up colonoscopy friction, sensitivity/advanced-adenoma limitations vs alternatives, Exact/Grail/Natera competition, guideline or USPSTF-related uncertainty.\n\n**Desk view:** **High-quality but not cheap.** Track weekly through Shield volume, payer coverage, gross margin, and FCF burn.\n\n---\n\n## 3) Natera — **NTRA**\n**Theme:** cell-free DNA diagnostics platform; MRD oncology, women’s health, transplant.\n\n- **Catalyst:** Signatera oncology MRD expansion. Fresh July catalysts: **EU IVDR certification for Signatera across multiple cancers** and new JAMA Oncology data showing Signatera MRD-positive resected metastatic CRC patients had OS benefit with adjuvant chemotherapy while MRD-negative patients did not show significant benefit.\n- **Evidence quality:** **High commercial evidence, improving clinical utility evidence.** Q1’26 revenue **$696.6M, +38.8% YoY**; oncology tests **~258.9k, +54.4% YoY**; total tests passed **1M/quarter**; 2026 revenue guide raised to **$2.74B–$2.82B**.\n- **Probability of thesis success:** **~65–80%** for continued platform growth; much lower probability of attractive forward returns if multiple compresses.\n- **Cash / dilution risk:** **Low near-term.** Cash/restricted cash **~$1.09B**; debt **~$80M**; Q1 positive cash inflow **~$11.8M**; company guides positive 2026 cash inflow.\n- **Valuation:** price ~$282; market cap **~$40.4B**, EV **~$39.5B**; roughly **14.2x 2026E sales**. Excellent business, valuation already prices a lot.\n- **Thesis-breaker:** MRD reimbursement/payer pushback, clinical-utility disputes, competitive pressure in MRD, litigation/regulatory shocks, margin pressure from aggressive R&D/commercial spend.\n\n**Desk view:** **Core watchlist compounder, not an obvious asymmetric entry.** Cover for pullbacks and reimbursement/data inflections.\n\n---\n\n## 4) Viking Therapeutics — **VKTX**\n**Theme:** obesity/metabolic challenger; high upside, high dilution/binary risk.\n\n- **Catalyst:** Phase 3 VANQUISH-1/2 for subcutaneous VK2735 are fully enrolled; maintenance dosing data expected **3Q26**; oral VK2735 Phase 3 initiation expected **4Q26**; amylin agonist VK3019 moving into Phase 1.\n- **Evidence quality:** **Medium.** Prior Phase 2 VENTURE showed up to **14.7% mean body-weight reduction after 13 weekly doses** with mostly mild/moderate GI events. But Phase 3 durability, safety, adherence, and competitive positioning remain unresolved.\n- **Probability of thesis success:** **Injectable VK2735 ~45–60%** to clear the next major clinical/regulatory hurdle if Phase 2 replicates; **oral program lower, ~20–35%** until more data.\n- **Cash / dilution risk:** **High.** Cash/securities **$603M** at Q1; Q1 net loss **$158M** as Phase 3 spend ramps. Simple burn math is ~1 year runway; real runway depends on trial spend pacing, financing, partnership, or buyout.\n- **Valuation:** price ~$41; market cap **~$4.8B**, EV **~$4.2B**; no revenue. Upside is event-driven: Phase 3 success / oral differentiation / M&A.\n- **Thesis-breaker:** Phase 3 efficacy below Lilly/Novo standards; GI tolerability/discontinuation; oral bioavailability/safety; manufacturing scale; payer/price pressure; forced equity raise before value-creating data.\n\n**Desk view:** **Worth coverage, but classify as binary/event-driven.** Not a compounder yet.\n\n---\n\n## 5) Intellia Therapeutics — **NTLA**\n**Theme:** in vivo CRISPR; potentially historic one-time therapy platform, still regulatory/safety-heavy.\n\n- **Catalyst:** rolling BLA for lonvo-z in hereditary angioedema; BLA completion planned **2H26**, potential U.S. launch **1H27**. ATTR Phase 3 screening resumed after FDA holds lifted. MAGNITUDE-2 enrollment completion expected **2H26**.\n- **Evidence quality:** **Medium-high for HAE efficacy signal, medium for platform durability/safety.** Phase 3 HAELO met primary endpoint: **87% attack reduction vs placebo**, 62% attack-free/therapy-free in efficacy window; no serious AEs in lonvo-z arm as of cutoff, but long-term permanent-edit safety remains the core issue.\n- **Probability of thesis success:** **~60–75%** for HAE regulatory path based on current topline; **~35–50%** for broad in vivo CRISPR platform value realization.\n- **Cash / dilution risk:** **Moderate.** Q1 cash/securities **$517M**; April public offering priced **16.7M shares at $10.75**, ~$180M gross proceeds, extending runway “at least into 2028.” Dilution has already happened, but commercial prep could require more.\n- **Valuation:** price ~$15; market cap **~$2.2B**, EV **~$1.9B** before fully adjusting for April proceeds. Big upside if lonvo-z validates in vivo editing commercially.\n- **Thesis-breaker:** FDA/CMC concerns for permanent in vivo editing; long-term safety/off-target issues; commercial reluctance vs chronic HAE prophylaxis; ATTR safety/hold recurrence; payer pushback on one-time pricing.\n\n**Desk view:** **Best pure in vivo gene-editing event setup**, but still binary. Cover closely into BLA completion / FDA acceptance.\n\n---\n\n## 6) CRISPR Therapeutics — **CRSP**\n**Theme:** diversified gene-editing platform with approved CASGEVY plus in vivo, autoimmune, oncology, siRNA programs.\n\n- **Catalyst:** 2H26 updates across CTX310 liver editing, CTX611 FXI siRNA, zugo-cel autoimmune / oncology, pediatric CASGEVY submission, and multiple IND/CTA starts.\n- **Evidence quality:** **Mixed.** Strongest validation is CASGEVY approval and global access expansion; Q1 reported **>500 people globally initiated CASGEVY treatment journey** and **$43M CASGEVY revenue** operationally. Most platform expansion remains early clinical/preclinical.\n- **Probability of thesis success:** **~50–65%** for remaining a durable gene-editing platform; **~25–45%** for any specific early pipeline pillar becoming a large commercial franchise.\n- **Cash / dilution risk:** **Low.** Cash + marketable securities **~$2.44B**; Q1 net loss **~$123M**; runway roughly multi-year.\n- **Valuation:** price ~$56; market cap **~$5.5B**, EV **~$3.8B**. Cash-rich, but near-term product revenue to CRSP remains limited relative to valuation.\n- **Thesis-breaker:** CASGEVY launch slower than expected due treatment complexity; autoimmune CAR-T safety/durability; in vivo liver-editing adverse events; competitive gene-editing/siRNA pressure; partner economics limit upside.\n\n**Desk view:** **Platform watchlist, not urgent unless 2H26 data surprises.** Better balance sheet than most, less asymmetric than NTLA/VKTX.\n\n---\n\n## 7) Recursion — **RXRX**\n**Theme:** AI/TechBio drug discovery platform; outside AI infra but still AI narrative-sensitive.\n\n- **Catalyst:** 2H26 regulatory update for REC-4881 FAP/MEK; additional Phase 1 dose-escalation data for REC-1245 RBM39; Sanofi/Roche/Genentech partnered milestone potential.\n- **Evidence quality:** **Low-medium.** Q1 showed early safety/PK and target-engagement data, but no definitive efficacy. REC-4881 Phase 2 showed median polyp burden reductions, and FDA engagement is underway. Prior pipeline cuts remind us the platform has not yet proven superior clinical translation.\n- **Probability of thesis success:** **~20–35%** for a meaningful near/mid-term drug-development win; **~10–25%** for the broad “AI platform improves drug R&D odds” thesis being validated enough to rerate sustainably.\n- **Cash / dilution risk:** **Moderate.** Cash/restricted cash **$665M**; 2026 operational cash burn guided **< $390M**; runway into early 2028 without financing. If data are weak, dilution likely before value inflection.\n- **Valuation:** price ~$3.76; market cap **~$2.0B**, EV **~$1.4B**. Cheap vs old AI-biotech hype, but not cheap vs proven clinical output.\n- **Thesis-breaker:** clinical failures despite platform claims; partner milestones delayed; AI-drug-discovery multiple compression; high cash burn; lack of registrational path clarity.\n\n**Desk view:** **Monitor, don’t overweight.** It is a science/translation proof-of-concept trade, not yet a quality compounder.\n\n---\n\n# Explicit binary vs compounder split\n\n## Repeatable platform / compounder candidates\n1. **TMDX** — best valuation-to-growth setup; measurable revenue/profitability.\n2. **GH** — high-growth cancer diagnostics; expensive but adoption catalysts are concrete.\n3. **NTRA** — strongest diagnostics execution; very expensive, best on pullbacks.\n4. **CRSP** — platform with huge cash and approved-product validation, but pipeline still early.\n\n## Binary / event-driven biotech\n1. **VKTX** — obesity Phase 3 / oral program / M&A; high upside, high financing risk.\n2. **NTLA** — in vivo CRISPR BLA; strong HAE data but permanent-editing safety/regulatory risk.\n3. **RXRX** — AI-drug-discovery validation trade; evidence not yet strong enough for conviction.\n\n## Rejected / not clear enough this week\n- **PACB:** interesting distressed long-read sequencing call option, but not clear enough. Q1 revenue was flat at **$37.2M**, 2026 guide **$165M–$175M**, cash **$276M**, non-GAAP net loss **$35.9M**, EV roughly **5.5x 2026E sales** despite slow growth and debt overhang. Needs clear Revio/Vega/SPRQ-Nx acceleration before desk time increases.\n- **Pure longevity public names:** no clean public-market setup surfaced with enough evidence. Most remain either supplement-adjacent, early biotech, or valuation/story risk.\n\n---\n\n# Coverage recommendation\n\n**Increase coverage, but focus it.**\n\n**More coverage:**\n- **TMDX, GH, NTRA** — weekly adoption/revenue/reimbursement dashboards.\n- **VKTX, NTLA** — catalyst calendar + financing-risk watch.\n- **CRSP** — 2H26 data watch, especially autoimmune / in vivo editing.\n\n**Less coverage:**\n- Broad “AI drug discovery” baskets until clinical efficacy proof improves.\n- Distressed life-science tools unless orders/revenue inflect.\n- Longevity-adjacent publics without hard clinical/commercial evidence.\n\n**Highest-conviction desk setup:**  \nA barbell: **TMDX/GH/NTRA as measurable platform growth**, plus **small event-driven monitoring of VKTX/NTLA**. This avoids turning the vertical into pure biotech gambling while still preserving asymmetric upside.", "summary": "Biotech / healthtech publicmarket scan — Fri Jul 10, 2026 Bottom line: this vertical deserves more desk coverage, but not indiscriminately. The best current risk/reward is in measurable adoption platforms — diagnostics,…"}, {"id": "job-2cc52e4f25e7", "title": "Research Desk Manager", "category": "Desk Outputs", "source": "cron/2cc52e4f25e7/2026-07-10_06-57-23.md — final response only", "updated": "2026-07-10T07:57:23", "content": "# Research Desk Manager Memo — July 10, 2026\n\n**Primary management verdict:** the desk is improving, but it is still too AI-infra-shaped. The team is no longer purely overfitting to AAOI/semis, but several desks are still spending cycles reconfirming “AI capex is real” instead of finding the next marginal alpha source. The highest-value move now is to **split the apparatus into falsification desks, not more bullish-theme desks.**\n\nI updated `investment-research/meta_research_queue.md` with the July 10 verdict and action changes.\n\n---\n\n## 1. Desk ranking — usefulness / alpha potential\n\n| Rank | Desk | Decision | Why |\n|---:|---|---|---|\n| 1 | **Power / grid / data-center infrastructure** | **Keep P0, but tighten crowding discipline** | Best hard-evidence density: backlog, orders, interconnection constraints, PPAs, utility/regulatory data. But VRT/GEV/ETN are no longer undiscovered. Edge now = backlog/PPA conversion math, not “power bottleneck” prose. |\n| 2 | **Defense autonomy / counter-UAS / national-security software** | **Promote / hire full desk immediately** | Strongest non-AI-infra expansion. AVAV/KTOS/AXON/PLTR-style names need dedicated procurement, funded backlog, IDIQ/task-order, NDAA/DoD budget tracking. Current AI-apps desk is mixing too many frameworks. |\n| 3 | **Neocloud / AI data-center financing / private credit** | **Split from hyperscaler desk** | CoreWeave/Nebius/Oracle/IREN/CORZ/APLD are credit/project-finance problems, not just AI-demand problems. This is probably the best early-warning desk for when the AI-infra trade becomes financially fragile. |\n| 4 | **Hyperscaler capex / demand / ROI stress** | **Keep, narrower mandate** | Useful top-down arbiter for MSFT/AMZN/GOOG/META/ORCL capex, RPO, FCF strain, lease obligations, utilization. But stop making it carry neocloud credit analysis too. |\n| 5 | **Source / funds / social intelligence** | **Keep as risk-control desk** | Valuable because it catches social thesis laundering and fund/crowding mythology. It should not create conviction; it should route claims into a claim ledger and mark them verified/unverified/stale. |\n| 6 | **Biotech / health-tech / longevity tools** | **Keep small specialist sleeve** | Good anti-overfit diversification. Best output was separating TMDX/GH/NTRA/TEM-style commercial/platform names from VKTX/NTLA binary/event-driven bets. Needs catalyst/runway ledger. |\n| 7 | **AI apps / software / cyber monetization** | **Split from defense** | Real opportunity, but needs software-specific metrics: ARR, RPO, NRR, FCF, SBC, Rule of 40, AI product revenue. Do not bury APP/RBRK/PLTR/AXON under robotics/defense. |\n| 8 | **Broad hypergrowth scout** | **Keep, but raise evidence bar** | Essential anti-overfit function. However, scout outputs should stay “leads” until primary evidence and valuation math are attached. |\n| 9 | **Optical / AI networking** | **Deweight; convert to proof/falsification desk** | Thesis alive, but crowded and AAOI-heavy. AAOI is not the research system’s center of gravity. Re-expand only if Q2/Q3 shipment, GM, AR/customer concentration, and dilution checks improve. |\n| 10 | **Semis / HBM / accelerator supply chain** | **Keep as thesis-breaker desk, not daily bull desk** | Necessary, but least differentiated. Focus on CoWoS/HBM bottleneck durability, MU capex/oversupply, ASML China/export controls, AVGO/MRVL estimate risk. Avoid generic NVDA/MU cheerleading. |\n| 11 | **Stablecoin / tokenization / fintech rails** | **Scout only** | Potentially high-upside non-AI vertical, but not ready for full conviction. Needs regulation, float, reserve-yield, take-rate, and lockup/dilution work. No generic crypto desk. |\n\n---\n\n## 2. Hire / split / fire decisions\n\n### Hire / split now\n\n1. **Defense autonomy / counter-UAS desk**\n   - Coverage: AVAV, KTOS, AXON, PLTR, LHX, RTX, NOC, RKLB where defense-linked.\n   - Private watch: Anduril, Shield AI, Saronic.\n   - Required metrics: funded backlog, book-to-bill, task orders, IDIQ conversion, DoD budget lines, margin/cash conversion.\n\n2. **Neocloud + AI data-center financing desk**\n   - Coverage: CRWV, NBIS, IREN, CORZ, APLD, ORCL, BE, private-credit/ABS/CMBS issuance.\n   - Required metrics: capex/revenue, interest/revenue, lease obligations, utilization, customer concentration, GPU depreciation, MW/GW handoff dates.\n\n3. **AI apps / cyber / software monetization desk**\n   - Coverage: APP, RBRK, PLTR, AXON, PANW, CRWD, NET, DDOG, ZS as relevant.\n   - Required metrics: ARR/RPO, NRR, AI product revenue, FCF, SBC, gross margin, deceleration risk.\n\n4. **Stablecoin / tokenization scout**\n   - Not a full desk yet.\n   - Coverage: CRCL, COIN, HOOD, GLXY, plus V/MA/PYPL only where rails economics are affected.\n\n### Reduce / pause / fire\n\n1. **Reduce AAOI-only loops.**\n   - AAOI remains high-torque but must be judged by GM, dilution, AR/DSO, customer concentration, and actual 800G/1.6T shipment proof.\n\n2. **Reduce generic semis bullishness.**\n   - Semis should identify bottleneck durability and cycle breaks, not re-summarize AI demand.\n\n3. **Pause standalone humanoid/generic robotics.**\n   - Public-market revenue evidence is too thin. Resume only when contracts/revenue/customer proof appears.\n\n4. **Keep AI drug discovery watch-only.**\n   - Platform claims without clinical translation are not enough. RXRX-style narratives need milestone/partner/regulatory proof.\n\n5. **No generic crypto coverage.**\n   - Only stablecoin/tokenization/payment rails deserve research time.\n\n---\n\n## 3. Quality control issues from today’s run\n\nBluntly:\n\n- The **optical note leaked a drafting artifact** and appeared unfinished/truncated. That is not acceptable for a specialist output. The prompt needs stricter final-format discipline.\n- The **AI apps/autonomy/defense note became too recommendation-like** and mixed defense procurement with software-app valuation. Split the desk.\n- The **semis/HBM desk risks false precision**. It should be forced to cite filing/transcript dates and separate confirmed numbers from industry reports.\n- The **source intelligence desk is valuable**, but without a claim ledger it cannot prove whether sources are getting better or just sounding smart.\n- The **broad scout is doing its job** by finding non-AI themes, but scout outputs must not graduate into conviction without primary-source follow-up.\n\n---\n\n## 4. New opportunity coverage needed\n\nHighest priority new/expanded coverage:\n\n1. **Defense autonomy / counter-UAS**\n   - Best anti-overfit vertical right now.\n   - Public exposure exists and revenue/procurement evidence is measurable.\n\n2. **Neocloud credit/project-finance fragility**\n   - This is the stress layer beneath AI infra.\n   - Could produce both longs and shorts / avoid signals.\n\n3. **AI apps / cyber monetization**\n   - Needs its own software-quality lens.\n   - Current system underweights non-infra AI revenue.\n\n4. **Biotech diagnostics/device/software platforms**\n   - TMDX/GH/NTRA/TEM-style names deserve more work than generic longevity or AI drug discovery.\n\n5. **Stablecoin/tokenization rails**\n   - Scout now. Promote only after regulatory/economic model is built.\n\n---\n\n## 5. Stale or overfit coverage\n\n- **AAOI / optics:** still useful, but overfit risk remains. Treat as a falsifiable execution case.\n- **NVDA/MU/semis:** necessary context, but too crowded to dominate unless the desk has fresh bottleneck math.\n- **Social photonics claims:** useful only as leads. No conviction without filings, transcripts, customer evidence, or technical/market data.\n- **Generic robotics / humanoids:** pause.\n- **AI drug discovery platforms:** watch-only until clinical proof appears.\n- **SMR / nuclear optionality:** keep as optionality, not AI-power evidence unless binding orders and financing appear.\n\n---\n\n## 6. Gus build queue — next apparatus upgrades\n\nPriority order:\n\n1. **Claim ledger**\n   - `claim_ledger.json`\n   - Fields: claim, ticker/theme, source, source score, primary evidence, date, verification date, status, investment impact.\n   - This is now the most important process upgrade.\n\n2. **Desk scorecard automation**\n   - Score each desk on primary evidence density, novelty, math quality, thesis-breaker clarity, valuation discipline, anti-overfit value, and source discipline.\n\n3. **Company model auto-refresh**\n   - Immediate models: AAOI, LITE, CRDO, GLW, VRT, GEV, PWR, ETN, VST, CEG, AVAV, KTOS, AXON, PLTR, RBRK, APP, CRWV, NBIS, TEM, TMDX, GH, VKTX, NTLA.\n\n4. **Trigger watcher upgrade**\n   - Add filing/news triggers, not just price moves:\n     - dilution / ATM / shelf / convertibles\n     - guidance raise/cut\n     - backlog/RPO/order changes\n     - DoD awards/task orders\n     - utility tariff/PPA/interconnection filings\n     - FDA/reimbursement/clinical events\n     - data-center ABS/CMBS/private-credit deals\n\n5. **Prompt reorg**\n   - Split defense from AI apps.\n   - Split neocloud finance from hyperscaler capex.\n   - Rewrite optical/semis as falsification desks.\n   - Add stablecoin/tokenization scout.\n\n---\n\n## Bottom line\n\nThe desk should **reweight away from AAOI/semis as the gravitational center**. Keep them covered, but stop letting them consume the apparatus.\n\nThe next best research edge is:\n\n1. **Power/grid backlog and PPA conversion**\n2. **Defense autonomy / counter-UAS procurement**\n3. **Neocloud financing fragility**\n4. **AI apps/cyber monetization**\n5. **Selective biotech platforms**\n\nThe apparatus is now close to useful. The missing piece is discipline: claim ledger, model refreshes, and trigger upgrades so the team stops re-summarizing narratives and starts compounding verified decision signals.", "summary": "Research Desk Manager Memo — July 10, 2026 Primary management verdict: the desk is improving, but it is still too AIinfrashaped. The team is no longer purely overfitting to AAOI/semis, but several desks are still spendi…"}, {"id": "job-04aa99181e16", "title": "Market Trigger Watcher", "category": "Desk Outputs", "source": "cron/04aa99181e16/2026-07-10_06-37-36.md — final response only", "updated": "2026-07-10T07:37:36", "content": "# Cron Job: Investment market trigger watcher\n\n**Job ID:** 04aa99181e16\n**Run Time:** 2026-07-10 06:37:36\n**Mode:** no_agent (script)\n**Status:** silent (empty output)", "summary": "Cron Job: Investment market trigger watcher Job ID: 04aa99181e16 Run Time: 20260710 06:37:36 Mode: no_agent (script)"}]};</script>
<script>
let DATA = null;
let selectedDoc = null;
const $ = (sel) => document.querySelector(sel);
const el = (tag, cls, html) => { const n = document.createElement(tag); if (cls) n.className = cls; if (html !== undefined) n.innerHTML = html; return n; };
function md(text){ if(!text) return ""; const html = window.marked ? marked.parse(text,{mangle:false,headerIds:false}) : text.replace(/\n/g,"<br>"); return window.DOMPurify ? DOMPurify.sanitize(html) : html; }
function fmtDate(s){ if(!s) return ""; try{return new Date(s).toLocaleString()}catch{return s} }
function pct(v){ if(v===null||v===undefined||Number.isNaN(v)) return "—"; return `${v>=0?"+":""}${Number(v).toFixed(2)}%`; }
function money(v){ if(v===null||v===undefined||Number.isNaN(v)) return "—"; return Number(v).toLocaleString(undefined,{maximumFractionDigits:2,minimumFractionDigits:2}); }
function quoteColor(q){ return (q.changePct||0) >= 0 ? "up" : "down"; }
function quoteByTicker(t){ return (DATA.quotes||[]).find(q => q.ticker === String(t||"").toUpperCase()); }
function sparkline(values, cls=""){ if(!values||values.length<2) return `<svg class="spark ${cls}" viewBox="0 0 120 42"><path d="M0 22 L120 22"/></svg>`; const min=Math.min(...values), max=Math.max(...values), span=max-min||1; const pts=values.map((v,i)=>{const x=(i/(values.length-1))*120; const y=38-((v-min)/span)*34; return `${i?"L":"M"}${x.toFixed(1)} ${y.toFixed(1)}`}).join(" "); return `<svg class="spark ${cls}" viewBox="0 0 120 42" preserveAspectRatio="none"><path d="${pts}"/></svg>`; }
function quoteCard(q){ const color=quoteColor(q); if(q.error) return `<div class="quote-card"><div class="quote-top"><span class="ticker">${q.ticker}</span><span class="price">n/a</span></div><div class="quote-time">${q.error}</div></div>`; return `<div class="quote-card ${color}"><div class="quote-top"><span class="ticker">${q.ticker}</span><span class="price">${money(q.price)}</span></div><div class="change ${color}">${pct(q.changePct)}</div>${sparkline(q.sparkline,color)}<div class="quote-time">${q.exchange||""} · ${q.quoteTime?fmtDate(q.quoteTime):"snapshot"}</div></div>`; }
function topQuotes(n=8){ return [...(DATA.quotes||[])].filter(q=>!q.error&&q.changePct!==null&&q.changePct!==undefined).sort((a,b)=>Math.abs(b.changePct)-Math.abs(a.changePct)).slice(0,n); }
async function load(){ if(window.__SITE_DATA__) DATA=window.__SITE_DATA__; else DATA=await (await fetch("data/site-data.json",{cache:"no-store"})).json(); selectedDoc=DATA.latestCioNote||DATA.docs[0]; renderShell(); renderOverview(); renderTape(); renderScorecard(); renderAlerts(); renderFiles(); }
function renderShell(){ $("#generated").textContent=`Generated ${fmtDate(DATA.meta.generatedAt)} · ${DATA.stats.quotes||0} quote snapshots · public-safe export`; document.querySelectorAll(".nav button").forEach(btn=>btn.onclick=()=>switchView(btn.dataset.view)); $("#search").addEventListener("input",renderFileList); $("#copyLink").onclick=async()=>{await navigator.clipboard.writeText(location.href); $("#copyLink").textContent="Copied"; setTimeout(()=>$("#copyLink").textContent="Copy dashboard link",1200)}; renderFileList(); }
function switchView(view){ document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.view===view)); document.querySelectorAll(".view").forEach(v=>v.classList.toggle("active",v.id===view)); window.scrollTo({top:0,behavior:"smooth"}); }
function renderFileList(){ const q=$("#search").value.toLowerCase().trim(); const list=$("#fileList"); list.innerHTML=""; DATA.docs.filter(d=>!q||[d.title,d.category,d.source,d.summary,d.content].join(" ").toLowerCase().includes(q)).slice(0,60).forEach(d=>{const item=el("div","file-item",`<strong>${d.title}</strong><span>${d.category} · ${d.source}</span>`); item.onclick=()=>{selectedDoc=d; renderFiles(); switchView("files")}; list.appendChild(item);}); }
function renderOverview(){ const root=$("#overview"); root.innerHTML=""; root.appendChild(el("div","ticker-strip",topQuotes(8).map(quoteCard).join(""))); const stats=el("div","grid cols-4"); [["Names",DATA.stats.scorecardNames],["Watch",DATA.stats.watchlistNames],["Docs",DATA.stats.docs],["Alerts",DATA.stats.alerts]].forEach(([label,val])=>stats.appendChild(el("div","card",`<div class="stat">${val}</div><div class="muted">${label}</div>`))); root.appendChild(stats); const note=DATA.latestCioNote; root.appendChild(el("article","card markdown",`<h3>Latest CIO Note</h3>${md(note?note.content:"No CIO note yet.")}`)); }
function renderTape(){ const root=$("#tape"); const quotes=[...(DATA.quotes||[])].sort((a,b)=>(a.ticker||"").localeCompare(b.ticker||"")); root.innerHTML=`<div class="card"><h3>Market Tape</h3><p class="muted">Static quote/candle snapshots embedded at build time. Refreshes when the local dashboard job runs.</p><div class="ticker-strip">${topQuotes(10).map(quoteCard).join("")}</div></div><div class="tape">${quotes.map(quoteCard).join("")}</div>`; }
function renderScorecard(){ const root=$("#scorecard"); const rows=DATA.scorecard||[]; root.innerHTML=`<div class="card"><h3>Active Sleeve Scorecard</h3><div class="score-grid">${rows.map(r=>{const q=quoteByTicker(r.Name); return `<article class="score-card"><h4>${r.Name||""}</h4><div class="muted">${r.Theme||""}</div>${q?`<div class="quote-top"><span class="price">${money(q.price)}</span><span class="change ${quoteColor(q)}">${pct(q.changePct)}</span></div>${sparkline(q.sparkline,quoteColor(q))}`:""}<p><span class="label">Stance</span><br>${r["Current desk stance"]||""}</p><p><span class="label">Add only if</span><br>${r["Add only if"]||""}</p><p><span class="label">Risk-reduce if</span><br>${r["Risk-reduce / avoid if"]||""}</p><p><span class="label">Next check</span><br>${r["Next catalyst/check"]||""}</p></article>`}).join("")}</div></div>`; }
function renderAlerts(){ const root=$("#alerts"); root.innerHTML=""; const grid=el("div","grid"); (DATA.latestAlerts||[]).forEach(a=>{const maxLevel=Math.max(0,...a.levels.map(x=>x.level)); grid.appendChild(el("article",`card alert level-${maxLevel} markdown`,md(a.content)))}); if(!DATA.latestAlerts.length) grid.appendChild(el("div","card muted","No recent alerts.")); root.appendChild(grid); }
function renderFiles(){ const root=$("#files"); if(!selectedDoc) selectedDoc=DATA.docs[0]; const grouped=DATA.docs.reduce((acc,d)=>{(acc[d.category]||=[]).push(d); return acc},{}); root.innerHTML=`<div class="grid cols-2"><div class="card"><h3>Document Library</h3>${Object.entries(grouped).map(([cat,docs])=>`<h4>${cat}</h4><div class="pill-row">${docs.map(d=>`<button class="doc-picker" data-doc="${d.id}">${d.title}</button>`).join("")}</div>`).join("")}</div><article class="card markdown"><div class="doc-header"><div><h3>${selectedDoc.title}</h3><div class="doc-meta">${selectedDoc.category} · ${selectedDoc.source} · ${fmtDate(selectedDoc.updated)}</div></div></div>${md(selectedDoc.content)}</article></div>`; root.querySelectorAll(".doc-picker").forEach(btn=>btn.onclick=()=>{selectedDoc=DATA.docs.find(d=>d.id===btn.dataset.doc); renderFiles()}); }
load().catch(err=>{document.body.innerHTML=`<pre style="color:white;padding:24px">Dashboard failed to load: ${err.stack||err}</pre>`});

</script>
