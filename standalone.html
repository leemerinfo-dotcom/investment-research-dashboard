  <style>
:root {
  --paper: #f7f3e8;
  --paper-2: #fffdf8;
  --paper-3: #ece6d8;
  --ink: #18150f;
  --ink-2: #4e493f;
  --muted: #777064;
  --line: #d2cabc;
  --line-strong: #a89f90;
  --blue: #174a98;
  --blue-wash: #e8eef8;
  --green: #17603b;
  --green-wash: #e7f1ea;
  --red: #a12b27;
  --red-wash: #f6e8e5;
  --amber: #89510c;
  --amber-wash: #f5eddd;
  --serif: "Times New Roman", Times, Georgia, serif;
  --ui: Arial, Helvetica, sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

* { box-sizing: border-box; }
html { min-height: 100%; background: var(--paper); color-scheme: light; scroll-behavior: smooth; }
body {
  margin: 0;
  min-height: 100svh;
  background: var(--paper-2);
  color: var(--ink);
  font-family: var(--serif);
  font-size: 17px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  padding-bottom: calc(62px + var(--safe-bottom));
}
button, input { font: inherit; }
button { color: inherit; }
a { color: var(--blue); text-decoration-thickness: 1px; text-underline-offset: .18em; overflow-wrap: anywhere; }
a:hover { color: #0e3472; }
::selection { background: #cbd8ee; }

.skip-link { position: fixed; z-index: 200; top: 8px; left: 8px; transform: translateY(-150%); padding: 8px 12px; background: var(--ink); color: white; font: 700 12px var(--ui); }
.skip-link:focus { transform: none; }

.desktop-rail { display: none; }
.app-column { min-width: 0; }
.app-header {
  position: sticky;
  z-index: 40;
  top: 0;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  min-height: calc(58px + var(--safe-top));
  padding: var(--safe-top) 15px 0;
  border-bottom: 1px solid var(--line);
  background: rgba(247, 243, 232, .97);
}
.mobile-identity { display: flex; align-items: center; gap: 9px; min-width: 0; }
.mini-monogram { display: grid; place-items: center; width: 30px; height: 30px; border: 1.5px solid var(--blue); color: var(--blue); font-size: 19px; font-weight: 700; line-height: 1; }
.mobile-identity div { min-width: 0; }
.mobile-identity strong { display: block; font-size: 17px; line-height: 1; }
.mobile-identity small { display: block; margin-top: 4px; color: var(--muted); font: 9px/1 var(--ui); letter-spacing: .04em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.view-heading { display: none; }
.share-button, .link-button, .back-button {
  min-height: 44px;
  border: 0;
  background: transparent;
  color: var(--blue);
  cursor: pointer;
  font: 700 11px/1 var(--ui);
  letter-spacing: .06em;
  text-transform: uppercase;
}
.share-button { padding: 0 0 0 12px; }
.share-button:focus-visible, .link-button:focus-visible, .back-button:focus-visible, input:focus-visible, summary:focus-visible, .bottom-nav button:focus-visible, .primary-nav button:focus-visible, .filter-chip:focus-visible, .report-row:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

#mainContent { min-width: 0; padding: 18px 15px 30px; }
.view { display: none; max-width: 1160px; margin: 0 auto; }
.view.active { display: block; animation: enter .16s ease both; }
@keyframes enter { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }

.page-intro { margin-bottom: 22px; }
.eyebrow, .section-label, .field-label {
  display: block;
  margin: 0 0 5px;
  color: var(--blue);
  font: 700 10px/1.15 var(--ui);
  letter-spacing: .11em;
  text-transform: uppercase;
}
.page-intro h2 { margin: 0; font-size: clamp(34px, 10vw, 54px); line-height: .96; letter-spacing: -.04em; }
.page-intro p { max-width: 58ch; margin: 8px 0 0; color: var(--ink-2); font-style: italic; line-height: 1.3; }

.decision-banner {
  margin-bottom: 24px;
  padding: 18px 0 17px;
  border-top: 4px solid var(--blue);
  border-bottom: 1px solid var(--ink);
}
.decision-banner.none { border-top-color: var(--blue); }
.decision-banner.buy, .decision-banner.add { border-top-color: var(--green); }
.decision-banner.avoid, .decision-banner.reduce, .decision-banner.exit { border-top-color: var(--red); }
.decision-banner .banner-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; }
.decision-banner h2 { max-width: 14ch; margin: 0; font-size: clamp(32px, 9vw, 50px); line-height: .95; letter-spacing: -.04em; text-wrap: balance; }
.decision-banner .urgency { color: var(--muted); font: 700 9px/1.2 var(--ui); letter-spacing: .07em; text-align: right; text-transform: uppercase; }
.decision-banner .banner-note { max-width: 68ch; margin: 12px 0 0; color: var(--ink-2); font-size: 16px; line-height: 1.35; }

.status-strip { display: grid; grid-template-columns: repeat(3, 1fr); margin-bottom: 26px; border-top: 1px solid var(--line-strong); border-bottom: 1px solid var(--line-strong); }
.status-cell { min-width: 0; padding: 12px 8px 11px 0; border-right: 1px solid var(--line); }
.status-cell + .status-cell { padding-left: 10px; }
.status-cell:last-child { border-right: 0; }
.status-value { display: block; font-size: clamp(24px, 7vw, 34px); font-weight: 700; line-height: .9; font-variant-numeric: tabular-nums; }
.status-value.text { font-size: 18px; line-height: 1; }
.status-label { display: block; margin-top: 6px; color: var(--muted); font: 700 8px/1.15 var(--ui); letter-spacing: .08em; text-transform: uppercase; }

.section { margin-top: 28px; padding-top: 17px; border-top: 2px solid var(--ink); }
.section:first-child { margin-top: 0; }
.section-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; margin-bottom: 12px; }
.section-head h3 { margin: 0; font-size: 25px; line-height: 1; letter-spacing: -.025em; }
.section-head p { max-width: 30ch; margin: 0; color: var(--muted); font: 10px/1.3 var(--ui); text-align: right; }

.change-list, .catalyst-list, .source-list { margin: 0; padding: 0; list-style: none; border-top: 1px solid var(--line); }
.change-list li, .catalyst-list li { position: relative; padding: 12px 0 12px 20px; border-bottom: 1px solid var(--line); line-height: 1.35; }
.change-list li::before { content: "—"; position: absolute; left: 0; color: var(--blue); font-weight: 700; }
.catalyst-list li::before { content: "◇"; position: absolute; left: 0; top: 13px; color: var(--blue); font: 700 10px var(--ui); }

.portfolio-callout { margin-top: 26px; padding: 15px 0; border-top: 2px solid var(--amber); border-bottom: 1px solid var(--line); }
.portfolio-callout.pass { border-top-color: var(--green); }
.portfolio-callout h3 { margin: 0 0 6px; font-size: 21px; }
.portfolio-callout p { margin: 0; color: var(--ink-2); line-height: 1.4; }
.missing-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.missing-list span, .tag, .category-pill { display: inline-flex; align-items: center; min-height: 24px; padding: 4px 7px; border: 1px solid var(--line); color: var(--muted); font: 700 9px/1 var(--ui); letter-spacing: .045em; text-transform: uppercase; }

.portfolio-action-list { display: grid; gap: 14px; }
.portfolio-action { padding: 13px 0 15px; border-top: 3px solid var(--blue); border-bottom: 1px solid var(--line); }
.portfolio-action.reduce, .portfolio-action.exit { border-top-color: var(--red); }
.portfolio-action.hold { border-top-color: var(--blue); }
.portfolio-action.buy, .portfolio-action.add { border-top-color: var(--green); }
.portfolio-action-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.portfolio-action-head strong { display: block; font: 700 19px/1 var(--ui); }
.portfolio-action-head small { display: block; margin-top: 5px; color: var(--muted); font: 700 8px/1 var(--ui); letter-spacing: .07em; text-transform: uppercase; }
.portfolio-action > p { margin: 11px 0; color: var(--ink-2); line-height: 1.35; }
.portfolio-action-detail { display: grid; grid-template-columns: 64px 1fr; gap: 8px 12px; padding-top: 10px; border-top: 1px solid var(--line); }
.portfolio-action-detail span { color: var(--blue); font: 700 8px/1.25 var(--ui); letter-spacing: .07em; text-transform: uppercase; }
.portfolio-action-detail p { margin: 0; font-size: 14px; line-height: 1.35; }
.allocation-plan { margin-top: 14px; padding: 12px 0; border-top: 2px solid var(--green); border-bottom: 1px solid var(--line); }
.allocation-plan .metric-line { margin-top: 10px; }
.allocation-plan p { margin: 10px 0 0; }
.allocation-plan small { display: block; margin-top: 8px; color: var(--muted); font: 10px/1.35 var(--ui); }

.decision-list { display: grid; gap: 16px; }
.decision-card { border-top: 2px solid var(--ink); border-bottom: 1px solid var(--line); }
.decision-card.investigate { border-top-color: var(--amber); }
.decision-card.watch { border-top-color: var(--amber); }
.decision-card.conditional { border-top-color: var(--green); }
.decision-card.avoid, .decision-card.reduce, .decision-card.exit { border-top-color: var(--red); }
.decision-card.buy, .decision-card.add { border-top-color: var(--green); }
.decision-card summary { position: relative; min-height: 88px; padding: 14px 30px 14px 0; cursor: pointer; list-style: none; }
.decision-card summary::-webkit-details-marker { display: none; }
.decision-card summary::after { content: "+"; position: absolute; right: 0; top: 16px; color: var(--blue); font: 400 24px/1 var(--ui); }
.decision-card[open] summary::after { content: "−"; }
.decision-summary { display: grid; grid-template-columns: auto 1fr auto; gap: 9px 12px; align-items: start; }
.ticker { font: 700 18px/1 var(--ui); letter-spacing: -.02em; }
.action-badge { display: inline-flex; align-items: center; justify-self: start; min-height: 22px; padding: 3px 6px; border: 1px solid currentColor; color: var(--amber); font: 700 9px/1 var(--ui); letter-spacing: .06em; text-transform: uppercase; }
.action-badge.buy, .action-badge.add { color: var(--green); }
.action-badge.conditional { color: var(--green); }
.action-badge.watch { color: var(--amber); }
.action-badge.avoid, .action-badge.reduce, .action-badge.exit { color: var(--red); }
.action-badge.hold { color: var(--blue); }
.quote { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
.quote strong { display: block; font-size: 14px; line-height: 1; }
.quote span { display: block; margin-top: 4px; font: 700 10px/1 var(--ui); }
.up { color: var(--green); }
.down { color: var(--red); }
.decision-lede { grid-column: 1 / -1; margin: 0; color: var(--ink-2); font-size: 15px; line-height: 1.3; }
.decision-detail { padding: 0 0 20px; }
.detail-grid { display: grid; gap: 0; border-top: 1px solid var(--line); }
.detail-field { padding: 12px 0; border-bottom: 1px solid var(--line); }
.detail-field p, .detail-field ul { margin: 0; }
.detail-field ul { padding-left: 1.2em; }
.detail-field li { margin: 4px 0; }
.metric-line { display: flex; flex-wrap: wrap; gap: 12px 20px; }
.metric-line div { min-width: 90px; }
.metric-line strong { display: block; font-size: 20px; line-height: 1; font-variant-numeric: tabular-nums; }
.metric-line span { display: block; margin-top: 5px; color: var(--muted); font: 700 8px/1 var(--ui); letter-spacing: .07em; text-transform: uppercase; }
.plain-note { margin-top: 14px; border-top: 1px solid var(--line); }
.plain-note > div { display: grid; grid-template-columns: 76px 1fr; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); }
.plain-note span, .market-note-body span { color: var(--blue); font: 700 9px/1.25 var(--ui); letter-spacing: .07em; text-transform: uppercase; }
.plain-note p, .market-note-body p { margin: 0; line-height: 1.35; }
.rating-key { margin: 0 0 16px; padding: 11px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); color: var(--ink-2); font-size: 14px; line-height: 1.35; }
.banner-links { display: flex; flex-wrap: wrap; gap: 4px 18px; }
.source-list li { padding: 9px 0; border-bottom: 1px solid var(--line); }
.source-list li:last-child { border-bottom: 0; }
.source-list a { font-size: 15px; }
.related-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.related-links button { min-height: 38px; padding: 7px 9px; border: 1px solid var(--line); background: transparent; color: var(--blue); cursor: pointer; font: 700 10px/1.2 var(--ui); }

.filters { display: flex; gap: 6px; overflow-x: auto; margin: 0 -15px 16px; padding: 0 15px 3px; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.filter-chip { flex: 0 0 auto; min-height: 38px; padding: 7px 11px; border: 1px solid var(--line); background: transparent; color: var(--muted); cursor: pointer; font: 700 10px/1 var(--ui); letter-spacing: .04em; text-transform: uppercase; }
.filter-chip.active { border-color: var(--blue); background: var(--blue-wash); color: var(--blue); }

.reports-layout { min-width: 0; }
.report-browser { min-width: 0; }
.search-row { margin-bottom: 12px; }
.search-row label { display: block; margin-bottom: 5px; color: var(--muted); font: 700 9px/1 var(--ui); letter-spacing: .09em; text-transform: uppercase; }
.search-row input { width: 100%; min-height: 44px; padding: 9px 10px; border: 1px solid var(--line-strong); border-radius: 0; background: var(--paper-2); color: var(--ink); outline: 0; }
.search-row input::placeholder { color: #999184; font-style: italic; }
.report-list { border-top: 2px solid var(--ink); }
.report-row { display: block; width: 100%; min-height: 76px; padding: 12px 2px; border: 0; border-bottom: 1px solid var(--line); background: transparent; text-align: left; cursor: pointer; }
.report-row:hover, .report-row.active { background: var(--blue-wash); }
.report-row-top { display: flex; justify-content: space-between; gap: 12px; color: var(--muted); font: 700 9px/1.2 var(--ui); letter-spacing: .06em; text-transform: uppercase; }
.report-row strong { display: block; margin-top: 6px; font-size: 17px; line-height: 1.1; }
.report-row p { margin: 5px 0 0; color: var(--ink-2); font-size: 13px; line-height: 1.25; }
.report-reader { display: none; min-width: 0; }
.reports-layout.reading .report-browser { display: none; }
.reports-layout.reading .report-reader { display: block; }
#reports.reading-mode .page-intro { display: none; }
.reader-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--line); }
.back-button { padding-left: 0; }
.reader-meta { color: var(--muted); font: 700 9px/1.2 var(--ui); letter-spacing: .06em; text-transform: uppercase; }
.reader-header { margin: 0 0 24px; padding: 0 0 16px; border-bottom: 2px solid var(--ink); }
.reader-header h2 { margin: 5px 0 0; font-size: clamp(31px, 9vw, 50px); line-height: .98; letter-spacing: -.04em; }
.reader-header p { margin: 8px 0 0; color: var(--muted); font: 10px/1.3 var(--ui); text-transform: uppercase; letter-spacing: .05em; }
.tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 12px; }
.markdown-body { max-width: 76ch; font-size: 17px; line-height: 1.58; overflow-wrap: break-word; }
.markdown-body > :first-child { margin-top: 0; }
.markdown-body > :last-child { margin-bottom: 0; }
.markdown-body h1 { display: none; }
.markdown-body h2 { margin: 30px 0 10px; padding-top: 10px; border-top: 1px solid var(--line); font-size: 23px; line-height: 1.05; }
.markdown-body h3 { margin: 22px 0 8px; font-size: 19px; line-height: 1.1; }
.markdown-body p { margin: 0 0 14px; }
.markdown-body ul, .markdown-body ol { margin: 0 0 16px; padding-left: 1.25em; }
.markdown-body li { margin: 5px 0; }
.markdown-body blockquote { margin: 18px 0; padding-left: 16px; border-left: 2px solid var(--blue); color: var(--ink-2); font-style: italic; }
.markdown-body table { display: block; width: 100%; overflow-x: auto; border-collapse: collapse; margin: 18px 0; font-size: 13px; }
.markdown-body th, .markdown-body td { min-width: 110px; padding: 8px; border: 1px solid var(--line); text-align: left; vertical-align: top; }
.markdown-body th { background: var(--blue-wash); font: 700 9px/1.2 var(--ui); letter-spacing: .05em; text-transform: uppercase; }
.markdown-body code, .markdown-body pre { font-family: "Courier New", monospace; font-size: .82em; }
.markdown-body code { padding: .1em .25em; background: var(--paper-3); }
.markdown-body pre { overflow: auto; padding: 12px; border: 1px solid var(--line); background: var(--paper); }
.markdown-body pre code { padding: 0; background: transparent; }
.backlinks { margin-top: 32px; padding-top: 16px; border-top: 2px solid var(--ink); }
.backlinks h3 { margin: 0 0 9px; font-size: 20px; }

.watch-list { display: grid; gap: 14px; }
.watch-card { border-top: 2px solid var(--ink); border-bottom: 1px solid var(--line); }
.watch-card summary { position: relative; min-height: 72px; padding: 12px 28px 12px 0; list-style: none; cursor: pointer; }
.watch-card summary::-webkit-details-marker { display: none; }
.watch-card summary::after { content: "+"; position: absolute; right: 0; top: 15px; color: var(--blue); font: 400 22px/1 var(--ui); }
.watch-card[open] summary::after { content: "−"; }
.watch-head { display: grid; grid-template-columns: auto 1fr auto; gap: 8px 10px; align-items: start; }
.watch-theme { color: var(--ink-2); font-size: 15px; line-height: 1.15; }
.priority { color: var(--muted); font: 700 8px/1.2 var(--ui); letter-spacing: .06em; text-align: right; text-transform: uppercase; }
.watch-stage { grid-column: 1 / -1; color: var(--muted); font: 10px/1.2 var(--ui); text-transform: uppercase; letter-spacing: .05em; }
.watch-detail { padding: 0 0 16px; }
.market-note-list { border-top: 1px solid var(--line); }
.market-note { border-bottom: 1px solid var(--line); }
.market-note summary { position: relative; padding: 11px 24px 11px 0; list-style: none; cursor: pointer; }
.market-note summary::-webkit-details-marker { display: none; }
.market-note summary::after { content: "+"; position: absolute; right: 0; top: 14px; color: var(--blue); font: 400 17px/1 var(--ui); }
.market-note[open] summary::after { content: "−"; }
.market-scope { color: var(--blue); font: 700 9px/1 var(--ui); letter-spacing: .08em; text-transform: uppercase; }
.market-note summary p { margin: 5px 0 0; font-size: 15px; line-height: 1.3; }
.market-note-body { padding: 0 0 12px 14px; border-left: 2px solid var(--blue); }
.market-note-body > div { margin-top: 9px; }
.market-note-body p { margin-top: 3px; font-size: 14px; }
.signal-list { border-top: 1px solid var(--line); }
.signal-row { width: 100%; min-height: 62px; display: grid; grid-template-columns: auto 1fr auto; align-items: start; gap: 10px; padding: 11px 0; border: 0; border-bottom: 1px solid var(--line); background: transparent; text-align: left; cursor: pointer; }
.signal-level { color: var(--amber); font: 700 9px/1 var(--ui); text-transform: uppercase; }
.signal-level.high { color: var(--red); }

.empty-state { padding: 22px 0; border-top: 2px solid var(--ink); border-bottom: 1px solid var(--line); color: var(--muted); font-style: italic; }
.render-fallback { max-width: 100%; overflow: auto; padding: 12px; border: 1px solid var(--line); background: var(--paper); white-space: pre-wrap; }
.load-error { max-width: 760px; margin: 50px auto; padding: 24px; }

.guide-lead { padding: 16px 0; border-top: 4px solid var(--blue); border-bottom: 1px solid var(--ink); }

.guide-format { max-width: 720px; }
.glossary-list { margin: 0; border-top: 1px solid var(--line); }
.glossary-list > div { padding: 13px 0; border-bottom: 1px solid var(--line); }
.glossary-list dt { color: var(--blue); font: 700 11px/1.2 var(--ui); letter-spacing: .04em; text-transform: uppercase; }
.glossary-list dd { margin: 5px 0 0; line-height: 1.35; }

.bottom-nav {
  position: fixed;
  z-index: 60;
  left: 0;
  right: 0;
  bottom: 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  padding-bottom: var(--safe-bottom);
  border-top: 1px solid var(--line-strong);
  background: rgba(247, 243, 232, .98);
}
.bottom-nav button { min-width: 0; min-height: 62px; display: grid; place-content: center; gap: 4px; border: 0; border-right: 1px solid var(--line); background: transparent; color: var(--muted); cursor: pointer; font: 700 9px/1 var(--ui); }
.bottom-nav button:last-child { border-right: 0; }
.bottom-nav button.active { color: var(--blue); }
.nav-glyph { font-size: 15px; line-height: 1; }

@media (min-width: 820px) {
  body { padding-bottom: 0; background: var(--paper); }
  .app-shell { display: grid; grid-template-columns: 246px minmax(0, 1fr); min-height: 100svh; }
  .desktop-rail { position: sticky; top: 0; display: flex; flex-direction: column; height: 100vh; padding: 28px 18px; border-right: 1px solid var(--line-strong); background: var(--paper); }
  .identity { display: flex; align-items: flex-start; gap: 11px; }
  .monogram { width: 42px; height: 42px; display: grid; place-items: center; flex: 0 0 auto; border: 2px solid var(--blue); color: var(--blue); font-size: 27px; font-weight: 700; }
  .identity strong { display: block; font-size: 19px; line-height: .95; }
  .identity span { display: block; margin-top: 7px; color: var(--muted); font: 700 9px/1.25 var(--ui); letter-spacing: .08em; text-transform: uppercase; }
  .primary-nav { margin-top: 34px; border-top: 1px solid var(--ink); }
  .primary-nav button { display: grid; grid-template-columns: 28px 1fr; align-items: center; width: 100%; min-height: 48px; padding: 0; border: 0; border-bottom: 1px solid var(--line); background: transparent; color: var(--ink-2); text-align: left; cursor: pointer; font: 700 11px/1 var(--ui); letter-spacing: .06em; text-transform: uppercase; }
  .primary-nav button span { color: var(--muted); font-size: 9px; }
  .primary-nav button.active { color: var(--blue); }
  .rail-status { display: flex; align-items: flex-start; gap: 9px; margin-top: auto; padding-top: 16px; border-top: 1px solid var(--line); }
  .status-dot { width: 8px; height: 8px; margin-top: 3px; border-radius: 50%; background: var(--amber); }
  .status-dot.pass { background: var(--green); }
  .rail-status strong { display: block; font: 700 10px/1.2 var(--ui); text-transform: uppercase; }
  .rail-status small { display: block; margin-top: 4px; color: var(--muted); font: 9px/1.3 var(--ui); }
  .app-column { min-height: 100vh; background: var(--paper-2); }
  .app-header { position: static; grid-template-columns: 1fr auto; min-height: 98px; padding: 24px clamp(30px, 5vw, 70px) 18px; border-bottom: 1px solid var(--line); }
  .mobile-identity { display: none; }
  .view-heading { display: block; }
  .view-heading p { margin: 0 0 5px; color: var(--blue); font: 700 10px/1 var(--ui); letter-spacing: .11em; text-transform: uppercase; }
  .view-heading h1 { margin: 0; font-size: 34px; line-height: 1; }
  #mainContent { padding: 32px clamp(30px, 5vw, 70px) 70px; }
  .bottom-nav { display: none; }
  .page-intro { display: none; }
  .today-grid { display: grid; grid-template-columns: minmax(0, 1.7fr) minmax(300px, .8fr); gap: 34px 58px; align-items: start; }
  .today-main, .today-side { min-width: 0; }
  .today-side { position: sticky; top: 24px; }
  .decision-list { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px 28px; }
  .decision-list.compact { grid-template-columns: 1fr; }
  .detail-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .detail-field:nth-child(odd) { padding-right: 18px; border-right: 1px solid var(--line); }
  .detail-field:nth-child(even) { padding-left: 18px; }
  .reports-layout { display: grid; grid-template-columns: minmax(270px, 340px) minmax(0, 1fr); gap: 46px; align-items: start; }
  .reports-layout.reading .report-browser { display: block; }
  .report-browser { position: sticky; top: 24px; max-height: calc(100vh - 48px); overflow: auto; padding-right: 5px; }
  .report-reader { display: block; }
  .reader-toolbar .back-button { display: none; }
  .watch-list { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px 28px; }
  .markdown-body { font-size: 18px; }
}

@media (max-width: 380px) {
  #mainContent { padding-left: 12px; padding-right: 12px; }
  .status-cell { padding-right: 5px; }
  .status-cell + .status-cell { padding-left: 7px; }
  .status-value.text { font-size: 16px; }
  .section-head p { display: none; }
}

@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  .view.active { animation: none; }
}

@media print {
  body { padding: 0; background: white; font-size: 12pt; }
  .desktop-rail, .app-header, .bottom-nav, .filters, .search-row, .reader-toolbar, .share-button { display: none !important; }
  .app-shell { display: block; }
  #mainContent { padding: 0; }
  .view { display: none !important; }
  .view.active { display: block !important; }
  .report-browser { display: none !important; }
  .report-reader { display: block !important; }
}

xt Vistra guidance or filing quantifying PJM auction earnings impact"}], "marketNotes": [{"scope": "Broad market", "notice": "U.S. equities remain resilient, while long-term bonds and oil weakened. Cash still earns about 3.85% in three-month Treasuries.", "prediction": "Base case: sticky inflation with slower growth. Expect a choppy market and continued pressure on expensive, cash-burning stocks.", "implication": "Demand a clear earnings or cash-flow catalyst before taking concentrated risk.", "change": "Broad disinflation would help long-duration growth; wider credit spreads would signal a harder slowdown.", "links": [{"label": "Federal Reserve", "url": "https://www.federalreserve.gov/newsevents/pressreleases/monetary20260617a.htm"}, {"label": "U.S. Treasury curve", "url": "https://home.treasury.gov/resource-center/data-chart-center/interest-rates/pages/xml?data=daily_treasury_yield_curve&field_tdr_date_value=2026"}, {"label": "High-yield spreads", "url": "https://fred.stlouisfed.org/graph/fredgraph.csv?id=BAMLH0A0HYM2,BAMLH0A3HYC"}]}, {"scope": "AI optical networking", "notice": "LITE and AAOI have moved sharply, but recent price action has not yet been tied to a new filing or a proven valuation discount.", "prediction": "AI-network demand should remain strong, but stock returns will separate on margins, customer concentration, inventory, and dilution.", "implication": "Treat optics as a stock-picking theme, not an automatic sector buy.", "change": "Verified customer orders, improving gross margin, and clean cash conversion would support a buy rating.", "links": [{"label": "Lumentum filings", "url": "https://data.sec.gov/submissions/CIK0001633978.json"}, {"label": "Lumentum releases", "url": "https://www.lumentum.com/en/newsroom/news-releases"}]}, {"scope": "Defense autonomy", "notice": "AVAV has US$1.183 billion of funded backlog, but fiscal-2026 operating cash flow was negative and BlueHalo integration clouds the underlying economics.", "prediction": "Demand should remain durable; the stock will depend more on profitable backlog conversion than headline contract wins.", "implication": "AVAV is a potential buy only if the next model shows positive free cash flow and acceptable downside.", "change": "Weak funded-backlog conversion, rising debt, or dilution would move it back to avoid.", "links": [{"label": "AVAV fiscal-2026 10-K", "url": "https://www.sec.gov/Archives/edgar/data/1368622/000110465926078906/avav-20260430x10k.htm"}]}, {"scope": "Biotech and gene therapy", "notice": "Ionis's CARDIO-TTRansform trial missed its primary endpoint. The read-through to other ATTR programs is not yet proven.", "prediction": "The group will stay highly event-driven; companies with long cash runways and independent clinical evidence should outperform weaker option-value stories.", "implication": "Do not average down on price alone. Rebuild each pipeline and cash value separately.", "change": "Regulatory support for a narrower eplontersen use or strong company-specific data would improve the view.", "links": [{"label": "Ionis event filing", "url": "https://www.sec.gov/Archives/edgar/data/874015/000114036126028092/ef20077664_ex99-1.htm"}, {"label": "Intellia filings", "url": "https://data.sec.gov/submissions/CIK0001652130.json"}]}, {"scope": "Canadian energy", "notice": "Physical oil supply is tight, but government releases and recovering exports can bridge the shortage before producers turn it into shareholder cash flow.", "prediction": "Base case: oil normalizes toward a 2027 surplus; EIA's July outlook places Brent near US$65 in 2027.", "implication": "Avoid leveraged producers that still burn cash near US$65–75 oil.", "change": "A sustained strip above US$75 plus positive free cash flow and falling debt would reopen the trade.", "links": [{"label": "EIA July outlook", "url": "https://www.eia.gov/outlooks/steo/"}, {"label": "IEA July oil report", "url": "https://www.iea.org/reports/oil-market-report-july-2026"}]}], "glossary": [{"term": "Research call", "definition": "Our view of the stock on its own: buy, conditional buy, watch, or avoid—independent of available cash."}, {"term": "Buy candidate", "definition": "The research looks attractive. It remains visible even if the account has no cash or the personal funding plan is undecided."}, {"term": "Current buy", "definition": "A buy that has passed the research gates and has an actionable entry plan. Available cash is reported separately."}, {"term": "Portfolio context", "definition": "Current holdings, account types, concentration, cash, and risk limits. These shape sequencing and funding but never hide an attractive idea."}, {"term": "Ideal allocation", "definition": "The initial, target, and maximum portfolio percentages justified by the thesis, shown independently of current capital."}, {"term": "Funding plan", "definition": "How an approved idea would actually be funded. Cash, sales, contributions, and any explicitly authorized borrowing are separate from the research call."}, {"term": "Catalyst", "definition": "An event that could move the stock or prove the thesis."}, {"term": "Thesis-breaker", "definition": "Evidence that would make us change or abandon the investment view."}, {"term": "Weighted return", "definition": "The average return across bear, base, and bull outcomes after applying their probabilities."}, {"term": "Realistic downside", "definition": "The loss in a plausible bad case—not the absolute worst imaginable outcome."}, {"term": "Upside / downside", "definition": "Credible upside divided by plausible downside. Roughly 3:1 is a strong hurdle."}], "reports": [{"id": "report-office-reports-daily-2026-07-13-md", "title": "Daily Executive Brief — 2026-07-13", "category": "Daily Brief", "date": "2026-07-13", "updated": "2026-07-13T09:31:45-04:00", "content": "# Daily Executive Brief — 2026-07-13\n\n## DECISION\n\n**Action required today:** NONE — no material change; no capital action  \n**Portfolio Gate 0:** FAIL  \n**Urgency:** Trigger-dependent\n\n## MATERIAL CHANGES\n\n- **No material change; no action.** portfolio data remains not yet connected. Positions, cash/liabilities, account and tax treatment, base currency, constraints, options, and margin terms remain non-authoritative. Authorized target/initial/max sizing and borrowed capital remain **0%**.\n- No new SEC filing was present after the 2026-07-11 weekly-IC cutoff for AVAV, IONS, NTLA, LITE, AAOI, TMDX, VST, KTOS, or the trigger watchlist issuers checked. No new price/volume alert was recorded after 2026-07-10; markets were closed over the weekend.\n- Official macro evidence did not change the regime call: the latest Treasury curve remains 2026-07-10, the latest available HY/CCC OAS observations remain 2026-07-09, and the Federal Reserve press feed contains no release after 2026-07-09.\n\n## PORTFOLIO ACTIONS\n\n| Instrument | Action | Current | Target | Initial/Max | Timing | Invalidation |\n|---|---|---:|---:|---:|---|---|\n| Portfolio-wide | INVESTIGATE | Unknown | 0% | 0% / 0% | Pending verified holdings | Gate 0 remains failed |\n\n## RISKS / CATALYSTS\n\n- **2026-07-14, 08:30 EDT — June CPI.** Owner: Macro Strategist. Reassess inflation-shock versus slowdown probabilities only after the official release; Gate 0 still prohibits a trade.\n- **2026-07-17 — AVAV forensic deadline.** Promote only if acquisition accounting, organic margins, working capital, net debt, dilution, and three valuation scenarios establish positive expected value and at least 3:1 upside/downside; otherwise return to Gate 2 or reject.\n\n## EVIDENCE CUTOFF\n\n- **2026-07-13 09:16 EDT.** Direct sources: [SEC company submissions](https://data.sec.gov/submissions/), [Federal Reserve press feed](https://www.federalreserve.gov/feeds/press_all.xml), [U.S. Treasury yield curve](https://home.treasury.gov/resource-center/data-chart-center/interest-rates/pages/xml?data=daily_treasury_yield_curve&field_tdr_date_value=2026), [FRED HY/CCC OAS](https://fred.stlouisfed.org/graph/fredgraph.csv?id=BAMLH0A0HYM2,BAMLH0A3HYC), and [BLS release calendar](https://www.bls.gov/schedule/news_release/bls.ics).\n- Missing input: authoritative current broker export and constraints.", "summary": "Action required today: NONE — no material change; no capital action Portfolio Gate 0: FAIL Urgency: Trigger-dependent", "tags": ["AAOI", "AVAV", "IONS", "KTOS", "LITE", "NTLA", "TMDX", "VST"], "links": [{"label": "SEC company submissions", "url": "https://data.sec.gov/submissions/"}, {"label": "Federal Reserve press feed", "url": "https://www.federalreserve.gov/feeds/press_all.xml"}, {"label": "U.S. Treasury yield curve", "url": "https://home.treasury.gov/resource-center/data-chart-center/interest-rates/pages/xml?data=daily_treasury_yield_curve&field_tdr_date_value=2026"}, {"label": "FRED HY/CCC OAS", "url": "https://fred.stlouisfed.org/graph/fredgraph.csv?id=BAMLH0A0HYM2,BAMLH0A3HYC"}, {"label": "BLS release calendar", "url": "https://www.bls.gov/schedule/news_release/bls.ics"}], "related_decisions": ["AAOI", "AVAV", "IONS", "KTOS", "LITE", "NTLA", "TMDX", "VST"]}, {"id": "report-office-reports-weekly-2026-07-11-weekly-ic-md", "title": "Weekly Investment Committee — 2026-07-11", "category": "Weekly IC", "date": "2026-07-11", "updated": "2026-07-11T11:07:27-04:00", "content": "# Weekly Investment Committee — 2026-07-11\n\n**Evidence cutoff:** 2026-07-11 11:20 EDT; market prices are delayed 2026-07-10 closes.  \n**Portfolio Gate 0:** **FAIL** — portfolio data remains not yet connected. Only `INVESTIGATE`/`AVOID`; all current/target/initial/max authorized allocations are **0%** and borrowed capital is **0%**.\n\n## CIO DECISIONS\n\n1. **AVAV — INVESTIGATE (5/10).** Current allocation unknown; target/initial/max **0% / 0% / 0%**. Advance from Gate 2 (74/100) to Gate 3 forensic work, due **2026-07-17**. Delayed close **US$144.58** and 50.608m dated shares imply **US$7.32bn market cap**; cash/debt imply **US$7.67bn EV**, **3.88x FY2026 sales**. Recognition path: US$1.183bn funded backlog, with issuer expecting about 85% recognized in FY2027. Invalidation: normalized funded-backlog conversion fails to produce positive FCF, dilution/debt erase the valuation edge, or conservative upside/downside remains below 3:1. **No trade.**\n2. **IONS — INVESTIGATE (2/10).** Current allocation unknown; target/initial/max **0% / 0% / 0%**. The CARDIO-TTRansform primary-endpoint failure is verified, but full data, regulator/partner strategy and pipeline SOTP are absent. Hard fail: no defensible EV or return distribution. Do not average down.\n3. **JOY.TO — INVESTIGATE (7/10 research conviction; 0% capital).** Existing model still yields roughly **−11.3% probability-weighted return** with **−53% realistic downside**. It remains preferred to OBE inside the oil slot, but not to cash/T-bills or AVAV for research priority. Re-open only on its registered price/operating/debt triggers.\n\nNo `BUY/ADD/HOLD/REDUCE/EXIT/HEDGE` cleared the gates.\n\n## REGIME AND PORTFOLIO\n\n| Regime | Probability | Evidence and implication |\n|---|---:|---|\n| Sticky inflation / soft growth | 45% | Fed remains 3.50%–3.75%; June payroll growth was soft; 3m/10y/30y Treasury yields were 3.85%/4.56%/5.06% on July 10. Prefer balance-sheet quality and near-duration cash flows. |\n| Energy/geopolitical inflation shock | 30% | Physical oil tightness is real, but July IEA/EIA evidence still allows normalization; USO fell 15.6% over the sampled month. Avoid levered producers that need a high strip. |\n| Disinflation with sharper slowdown | 25% | Long-duration Treasuries and defensives would improve, while weak credit/cyclicals deteriorate. TLT was down 1.8% over the sampled month, so this is not the priced base case. |\n\n**Cross-asset read:** delayed one-month proxies show SPY +2.3%, QQQ +1.2%, IWM +1.9%, XLF +5.9%, XLV +4.4%, EFA −0.4%, EEM −0.9%, TLT −1.8%, UUP +1.6%, GLD −2.4%, and USO −15.6%. This is consistent with resilient U.S. risk assets, stronger financials/healthcare, firm USD and pressure on duration/commodities—not a broad panic.\n\n**Portfolio risk:** exposures, concentrations, tax lots, FX, options, cash needs and margin terms remain unknown. Correlated-loss and forced-liquidation stress cannot be run. The only defensible risk budget is **0% new capital and 0% borrowed capital** pending Gate 0.\n\n## CANDIDATES THROUGH GATES\n\n| Candidate | Gate | Triage | EV | Downside | Catalyst | Red team | Portfolio fit | CIO action |\n|---|---:|---:|---:|---:|---|---|---|---|\n| AVAV | 3 | 74/100 | Not yet defensible | Not yet defensible | Normalized model by 2026-07-17; funded-backlog conversion thereafter | **REWORK:** acquisition accounting, cash conversion, debt/dilution | Blocked by Gate 0; compare with TMDX/KTOS and 3m T-bills | **INVESTIGATE, 0%** |\n| IONS | 2 | 58/100; hard fail | Not modeled | Unbounded pending SOTP | Full trial/regulatory strategy; date unverified | **BLOCK-INCOMPLETE:** subgroup/regulatory and pipeline value | Blocked | **INVESTIGATE, 0%** |\n| JOY.TO | 5 complete / 6 blocked | Prior pass | −11.3% weighted | −53% | Price ≤C$3.40 or verified Duvernay/power execution with stable debt | **REWORK:** commodity, execution, refinancing | Inferior to 3.85% 3m Treasury hurdle | **INVESTIGATE, 0%** |\n\n### AVAV specialist conflict reconciliation\n\n- **Industrials specialist steelman:** appropriated funded backlog rose to US$1.183bn; about 85% is expected to convert in FY2027, and the 21% one-month price decline may have reset expectations without destroying long-cycle demand.\n- **Forensic view:** FY2026 revenue was US$1.977bn, but GAAP operating loss was US$311m; CFO was −US$78m and capex US$63m. At 3.88x trailing sales EV, investors still pay for successful normalization.\n- **Independent red team:** BlueHalo integration, purchase accounting, cost-to-complete estimates, working-capital demands, debt and dilution can make backlog growth economically hollow. US$1.458bn unfunded backlog is not an ASC 606 obligation and receives no contracted-revenue credit.\n- **CIO reconciliation:** advance research, not capital. A 65% forecast is registered that at least US$1.00555bn of the April 2026 funded-backlog cohort is recognized in FY2027; margin and FCF still determine value.\n\n**Opportunity-cost comparison:** AVAV is the best promoted lead. Outside its sector, TMDX is the best retained research alternative because transplant logistics has a distinct demand driver, but its current commercial-volume, reimbursement, aircraft-capital and valuation work is incomplete and therefore it does not pass triage. Three-month Treasuries yield **3.85%** with materially lower underwriting risk; AVAV must show positive expected return and at least 3:1 upside/downside after debt/dilution to displace that hurdle. KTOS remains the direct-sector comparator but its May 2026 share count shows material expansion and its forensic comparison is unfinished.\n\n## REJECTED / DEFERRED\n\n- **OBE.TO — AVOID:** issuer guidance remains cash-negative even at US$75 WTI; prior weighted return −23% and bear downside −63%. Re-open only with positive FCF, sequential debt reduction and supportive strip.\n- **NTLA — deferred:** IONS read-through is not yet mapped to NTLA's mechanism, endpoint, comparator, cash runway and dilution; price sympathy is not evidence.\n- **LITE / AAOI — deferred:** large price moves and legacy AI-optics narratives do not replace current unit, margin, working-capital and dilution models. AAOI's sampled one-month decline was 30.6%; no falling-knife promotion.\n- **TMDX — deferred:** distinct healthcare opportunity, but primary commercial-volume, reimbursement, logistics-capital and current valuation evidence remain incomplete.\n- **VST — deferred:** positive power theme and sampled one-month strength (+8.5%), but contract economics, hedges, regulatory exposure and current valuation are not reconciled.\n- **KTOS — deferred:** direct AVAV alternative; funded economics, cash conversion and dilution-adjusted valuation are not yet comparable.\n- **Cash/T-bills — benchmark, not rejected:** 3m Treasury yield of 3.85% is the minimum opportunity-cost hurdle.\n\n## ZERO-BASED DISCOVERY\n\n**Coverage quota:** 14 of 16 lanes (87.5%) were outside the legacy AI-optics/compute focus; no current holdings could be used because the portfolio ledger is non-authoritative. Every mandated lane was searched; only AVAV advanced.\n\n| Lane searched | Evidence/screen | Result |\n|---|---|---|\n| Macro/rates/sovereigns | Fed releases; Treasury 1m–30y curve | Positive cash hurdle and long-end duration pressure; no sovereign trade advanced. |\n| Credit | HY/CCC spread ledger plus HYG/LQD price proxies | Aggregate credit not distressed enough for broad credit beta; weakest issuers remain vulnerable. |\n| FX | UUP proxy +1.6% sampled month | Firm USD is a headwind to unhedged foreign returns; no clean variant identified. |\n| Commodities | EIA/IEA oil evidence; USO/GLD proxies | Oil normalization risk defeats levered OBE/JOY; gold lacked a fresh catalyst. |\n| Broad equities | SPY/QQQ/IWM | U.S. equities resilient; no index dislocation versus T-bills. |\n| Consumer | XLY and generalist screen | No primary-source candidate cleared valuation/catalyst triage. |\n| Financials | XLF +5.9% sampled month; rate curve | Strength is visible, but no bank/insurer had a verified security-level variant in this cycle. |\n| Healthcare | XLV; IONS/NTLA event; TMDX | IONS is event work, NTLA is read-through diagnosis, TMDX deferred. None cleared underwriting. |\n| Software/internet | IGV proxy | No primary-source lead with a valuation reset and recognition path cleared triage. |\n| Industrials/defense | AVAV/KTOS; ITA proxy | **AVAV advanced** on funded backlog plus price reset; KTOS retained as comparator. |\n| Energy/materials | XLE/XLB; OBE/JOY; EIA/IEA | Levered producers fail downside/FCF tests; no new miner/materials lead passed. |\n| Real estate/infrastructure | XLRE; VST | Rate pressure limits broad REIT appeal; VST contract valuation remains incomplete. |\n| International/EM | EFA/EEM | Relative weakness alone is not a catalyst; currency and country-specific evidence absent. |\n| Small/mid caps | IWM; AVAV/KTOS/TMDX/OBE/JOY | AVAV only pass; financing/dilution and cash-conversion hard fails rejected others. |\n| Special situations | Current SEC/company-event queue | No merger, spin, tender, recap or forced-flow setup had verified legal terms and bounded break value. |\n| Contradiction search | Oil tightness versus IEA/EIA normalization; defense backlog versus cash burn | Both favored narratives have credible disconfirming evidence; conviction was capped accordingly. |\n\n## NEXT-WEEK CATALYSTS\n\n- **2026-07-14, 08:30 EDT — June CPI.** Owner: Macro Strategist. If sequential inflation re-accelerates versus May, raise the inflation-shock regime and keep duration/leverage research hurdles high; if broad disinflation arrives with weaker activity evidence, raise the slowdown scenario and re-screen duration/defensives. No trade is authorized from the release without Gate 0.\n- **2026-07-17 — AVAV forensic deadline.** Owner: Forensic Accounting and Valuation. Promote to variant/red-team only if organic margin, working capital, net debt, dilution and three valuation scenarios are reconciled; otherwise return it to Gate 2 or reject.\n- **2026-07-18 — next weekly IC.** Owner: CIO. Re-run all lanes, compare the surviving lead with the best outside-sector candidate and the then-current T-bill hurdle.\n\n## EVIDENCE AND DISSENT\n\nPrimary: [Federal Reserve FOMC statement, 2026-06-17](https://www.federalreserve.gov/newsevents/pressreleases/monetary20260617a.htm); [U.S. Treasury yield curve, observed 2026-07-10](https://home.treasury.gov/resource-center/data-chart-center/interest-rates/pages/xml?data=daily_treasury_yield_curve&field_tdr_date_value=2026); [AVAV FY2026 10-K, filed 2026-06-29](https://www.sec.gov/Archives/edgar/data/1368622/000110465926078906/avav-20260430x10k.htm); [IONS event filing, 2026-07-09](https://www.sec.gov/Archives/edgar/data/874015/000114036126028092/ef20077664_ex99-1.htm); [EIA July STEO](https://www.eia.gov/outlooks/steo/); [IEA July Oil Market Report](https://www.iea.org/reports/oil-market-report-july-2026).\n\nMarket prices and one-month changes are delayed Yahoo chart observations and are corroboration only, not primary evidence or executable quotes. The strongest dissent is that AVAV's FY2026 cash burn is acquisition-distorted and funded backlog makes the current multiple attractive; the unresolved answer is whether normalized organic FCF validates that claim. Managed web search was unavailable, so discovery used direct official endpoints, SEC filings, registered ledgers and deterministic delayed-price data; this limits discovery breadth and is one reason only one candidate advanced.", "summary": "Evidence cutoff: 2026-07-11 11:20 EDT; market prices are delayed 2026-07-10 closes. Portfolio Gate 0: FAIL — portfolio data remains not yet connected. Only INVESTIGATE/AVOID; all current/target/initial/max authorized allocations are 0% and borrowed capital is 0%.", "tags": ["AAOI", "AVAV", "IONS", "JOY.TO", "KTOS", "LITE", "NTLA", "OBE.TO", "TMDX", "VST"], "links": [{"label": "Federal Reserve FOMC statement, 2026-06-17", "url": "https://www.federalreserve.gov/newsevents/pressreleases/monetary20260617a.htm"}, {"label": "U.S. Treasury yield curve, observed 2026-07-10", "url": "https://home.treasury.gov/resource-center/data-chart-center/interest-rates/pages/xml?data=daily_treasury_yield_curve&field_tdr_date_value=2026"}, {"label": "AVAV FY2026 10-K, filed 2026-06-29", "url": "https://www.sec.gov/Archives/edgar/data/1368622/000110465926078906/avav-20260430x10k.htm"}, {"label": "IONS event filing, 2026-07-09", "url": "https://www.sec.gov/Archives/edgar/data/874015/000114036126028092/ef20077664_ex99-1.htm"}, {"label": "EIA July STEO", "url": "https://www.eia.gov/outlooks/steo/"}, {"label": "IEA July Oil Ma <script>
let DATA = null;
let activeDecisionFilter = "ALL";
let activeReportFilter = "Briefs & memos";
let reportSearch = "";
let selectedReportId = null;
let reportReading = false;

const $ = (selector, root = document) => root.querySelector(selector);
const $$ = (selector, root = document) => [...root.querySelectorAll(selector)];
const escapeHtml = (value = "") => String(value).replace(/[&<>'"]/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" }[char]));

const VIEW_META = {
  today: ["Executive brief", "Today"],
  decisions: ["Research ratings", "Ideas"],
  reports: ["Linked research notes", "Reports"],
  watch: ["Markets and catalysts", "Watch"],
  guide: ["Plain-language reference", "Guide"]
};

function md(text) {
  if (!text) return "";
  if (!window.marked || !window.DOMPurify) {
    return `<pre class="render-fallback">${escapeHtml(text)}</pre>`;
  }
  const html = window.marked.parse(text, { mangle: false, headerIds: false });
  return window.DOMPurify.sanitize(html, {
    USE_PROFILES: { html: true },
    FORBID_TAGS: ["script", "style", "iframe", "object", "embed", "form"],
    FORBID_ATTR: ["style", "srcdoc"]
  });
}

function inlineMd(text) {
  if (!text) return "";
  if (!window.marked || !window.DOMPurify) return escapeHtml(text);
  const html = window.marked.parseInline(text, { mangle: false, headerIds: false });
  return window.DOMPurify.sanitize(html, {
    USE_PROFILES: { html: true },
    ALLOWED_TAGS: ["strong", "em", "code", "a"],
    ALLOWED_ATTR: ["href", "title"]
  });
}

function decorateLinks(root = document) {
  $$('a[href^="http"]', root).forEach(link => {
    link.target = "_blank";
    link.rel = "noopener noreferrer";
  });
}

function fmtDate(value, options = {}) {
  if (!value) return "—";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return String(value);
  return date.toLocaleString(undefined, options);
}

function pct(value) {
  if (value === null || value === undefined || Number.isNaN(Number(value))) return "—";
  const number = Number(value);
  return `${number >= 0 ? "+" : ""}${number.toFixed(2)}%`;
}

function money(value, currency = "") {
  if (value === null || value === undefined || Number.isNaN(Number(value))) return "—";
  return `${Number(value).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}${currency ? ` ${currency}` : ""}`;
}

function actionClass(action) {
  return String(action || "unknown").toLowerCase().split(/\s|—/)[0].replace(/[^a-z]/g, "");
}

function actionHeadline(action) {
  const normalized = String(action || "NONE").toUpperCase();
  if (normalized.startsWith("NONE")) return "No trade cleared today";
  if (normalized.startsWith("BUY")) return "Buy action cleared";
  if (normalized.startsWith("ADD")) return "Add action cleared";
  return normalized.split("—")[0].trim();
}

function quoteFor(ticker) {
  return (DATA.quotes || []).find(quote => quote.ticker === String(ticker || "").toUpperCase());
}

function quoteMarkup(ticker) {
  const quote = quoteFor(ticker);
  if (!quote || quote.error || quote.price === null || quote.price === undefined) return "";
  const direction = Number(quote.changePct || 0) >= 0 ? "up" : "down";
  return `<span class="quote"><strong>${money(quote.price)}</strong><span class="${direction}">${pct(quote.changePct)}</span></span>`;
}

function navButtons() {
  return $$("[data-view]");
}

function currentHash() {
  const parts = location.hash.replace(/^#/, "").split("/").filter(Boolean);
  return { view: VIEW_META[parts[0]] ? parts[0] : "today", detail: parts.slice(1).join("/") || null };
}

function updateHeader(view) {
  const [eyebrow, title] = VIEW_META[view];
  $("#viewEyebrow").textContent = eyebrow;
  $("#viewTitle").textContent = title;
  document.title = `${title} — Gus Investment Office`;
}

function switchView(view, { updateHash = true, scroll = true } = {}) {
  if (!VIEW_META[view]) view = "today";
  navButtons().forEach(button => {
    const active = button.dataset.view === view;
    button.classList.toggle("active", active);
    button.setAttribute("aria-current", active ? "page" : "false");
  });
  $$(".view").forEach(section => section.classList.toggle("active", section.id === view));
  updateHeader(view);
  if (updateHash && location.hash !== `#${view}`) history.pushState(null, "", `#${view}`);
  if (view === "reports" && updateHash && !currentHash().detail && window.innerWidth < 820) {
    reportReading = false;
    renderReports();
  }
  if (scroll) window.scrollTo({ top: 0, behavior: "smooth" });
}

function reportById(id) {
  return (DATA.reports || []).find(report => report.id === id);
}

function openReport(id, { updateHash = true } = {}) {
  if (!reportById(id)) return;
  selectedReportId = id;
  reportReading = true;
  renderReports();
  switchView("reports", { updateHash: false });
  if (updateHash) history.pushState(null, "", `#reports/${id}`);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function closeReport() {
  reportReading = false;
  history.pushState(null, "", "#reports");
  renderReports();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function shareApp() {
  const shareData = { title: document.title, text: "Gus Investment Office", url: location.href };
  if (navigator.share) {
    navigator.share(shareData).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(location.href).then(() => {
      const button = $("#shareApp");
      const old = button.textContent;
      button.textContent = "Copied";
      setTimeout(() => { button.textContent = old; }, 1200);
    }).catch(() => {});
  }
}

function renderShell() {
  const updated = fmtDate(DATA.meta.generatedAt, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
  $("#mobileUpdated").textContent = `Updated ${updated}`;
  $("#railUpdated").textContent = `Updated ${updated}`;
  $("#railGateLabel").textContent = DATA.portfolio.status;
  $("#railGate").classList.toggle("pass", DATA.portfolio.authoritative);
  navButtons().forEach(button => button.addEventListener("click", () => switchView(button.dataset.view)));
  $("#shareApp").addEventListener("click", shareApp);
  window.addEventListener("hashchange", routeFromHash);
}

function priorityDecisionMarkup(decision) {
  const note = decision.note || {};
  const rating = decision.researchRating || "WATCH";
  return `<details class="decision-card ${actionClass(rating)}">
    <summary>
      <span class="decision-summary">
        <span class="ticker">${escapeHtml(decision.instrument)}</span>
        <span class="action-badge ${actionClass(rating)}">${escapeHtml(rating)}</span>
        ${quoteMarkup(decision.instrument)}
        <p class="decision-lede"><strong>${escapeHtml(note.call || "Research incomplete.")}</strong> ${escapeHtml(note.why || "")}</p>
      </span>
    </summary>
    ${decisionDetailMarkup(decision)}
  </details>`;
}

function decisionDetailMarkup(decision) {
  const profile = decision.return_profile || {};
  const allocation = decision.allocationPlan || {};
  const note = decision.note || {};
  const relatedReports = (decision.relatedReports || []).map(id => reportById(id)).filter(Boolean);
  const metrics = [
    [profile.probability_weighted_expected_return_pct, "Weighted return", value => pct(value)],
    [profile.realistic_downside_pct, "Realistic downside", value => pct(value)],
    [profile.upside_downside_ratio, "Upside / downside", value => `${value}:1`]
  ].filter(([value]) => value !== null && value !== undefined);
  const allocationMetrics = [
    [allocation.initialPct, "Initial", value => `${value}%`],
    [allocation.targetPct, "Target", value => `${value}%`],
    [allocation.maximumPct, "Maximum", value => `${value}%`]
  ].filter(([value]) => value !== null && value !== undefined && Number(value) > 0);
  return `<div class="decision-detail">
    ${metrics.length ? `<div class="metric-line">${metrics.map(([value, label, format]) => `<div><strong>${format(value)}</strong><span>${label}</span></div>`).join("")}</div>` : ""}
    ${allocationMetrics.length ? `<div class="allocation-plan"><span class="field-label">Ideal allocation · independent of available cash</span><div class="metric-line">${allocationMetrics.map(([value, label, format]) => `<div><strong>${format(value)}</strong><span>${label}</span></div>`).join("")}</div>${allocation.entryMethod ? `<p>${escapeHtml(allocation.entryMethod)}</p>` : ""}<small>Investment merit and ideal sizing are shown even when the account has no cash. Funding and margin are separate decisions.</small></div>` : ""}
    <div class="plain-note">
      <div><span>Call</span><p>${escapeHtml(note.call || "Research incomplete.")}</p></div>
      <div><span>Why</span><p>${escapeHtml(note.why || "Not yet established.")}</p></div>
      <div><span>Upside</span><p>${escapeHtml(note.upside || "Not yet modeled.")}</p></div>
      <div><span>Risk</span><p>${escapeHtml(note.risk || "Not yet established.")}</p></div>
      <div><span>Next check</span><p>${escapeHtml(note.next || "No dated check established.")}</p></div>
    </div>
    ${(decision.evidenceLinks || []).length ? `<div class="detail-field"><span class="field-label">Sources</span><ul class="source-list">${decision.evidenceLinks.map(link => `<li><a href="${escapeHtml(link.url)}">${escapeHtml(link.label)} ↗</a></li>`).join("")}</ul></div>` : ""}
    ${relatedReports.length ? `<div class="detail-field"><span class="field-label">Read more</span><div class="related-links">${relatedReports.map(report => `<button type="button" data-report="${escapeHtml(report.id)}">${escapeHtml(report.title)}</button>`).join("")}</div></div>` : ""}
  </div>`;
}

function bindDecisionLinks(root) {
  $$('[data-report]', root).forEach(button => button.addEventListener("click", event => {
    event.preventDefault();
    openReport(button.dataset.report);
  }));
  decorateLinks(root);
}

function marketNoteMarkup(item) {
  const links = item.links || [];
  return `<details class="market-note">
    <summary><span class="market-scope">${escapeHtml(item.scope || "Market")}</span><p>${escapeHtml(item.notice || "No material change.")}</p></summary>
    <div class="market-note-body">
      <div><span>Prediction</span><p>${escapeHtml(item.prediction || "No forecast established.")}</p></div>
      <div><span>Investment effect</span><p>${escapeHtml(item.implication || "No action implied.")}</p></div>
      <div><span>What changes the view</span><p>${escapeHtml(item.change || "New primary evidence.")}</p></div>
      ${links.length ? `<div><span>Sources</span><p>${links.map(link => `<a href="${escapeHtml(link.url)}">${escapeHtml(link.label)} ↗</a>`).join(" · ")}</p></div>` : ""}
    </div>
  </details>`;
}

function portfolioActionMarkup(item) {
  return `<article class="portfolio-action ${actionClass(item.action)}">
    <div class="portfolio-action-head"><span><strong>${escapeHtml(item.instrument)}</strong><small>${escapeHtml(item.scope || "Portfolio")}</small></span><span class="action-badge ${actionClass(item.action)}">${escapeHtml(item.action)}</span></div>
    <p>${escapeHtml(item.reason || "No context note recorded.")}</p>
    <div class="portfolio-action-detail"><span>Target</span><p>${escapeHtml(item.target || "No target established.")}</p><span>Next check</span><p>${escapeHtml(item.next || "No dated check established.")}</p></div>
  </article>`;
}

function renderToday() {
  const root = $("#today");
  const executive = DATA.executive || {};
  const portfolioActions = DATA.portfolio.actions || [];
  const ratingOrder = { "BUY": 0, "CONDITIONAL BUY": 1, "WATCH": 2, "AVOID": 3 };
  const decisions = (DATA.decisions || []).slice().sort((a, b) => (ratingOrder[a.researchRating] ?? 9) - (ratingOrder[b.researchRating] ?? 9)).slice(0, 3);
  const action = executive.action || "NONE";
  const buyText = (DATA.currentBuys || []).length ? `${DATA.currentBuys.length} cleared` : "None";
  const candidateText = (DATA.buyCandidates || []).length ? `${DATA.buyCandidates.length}` : "None yet";
  const sizingText = DATA.portfolio.authoritative ? "Context ready" : "Research only";
  const report = reportById(executive.reportId);

  root.innerHTML = `<div class="page-intro"><span class="eyebrow">Executive investment note</span><h2>Today</h2><p>The call, the best ideas, and what could change next.</p></div>
    <section class="decision-banner ${actionClass(action)}">
      <div class="banner-top"><div><span class="section-label">Today’s trade decision · ${escapeHtml(executive.date || "Current edition")}</span><h2>${escapeHtml(actionHeadline(action))}</h2></div><span class="urgency">${escapeHtml(executive.urgency || "Trigger-dependent")}</span></div>
      <p class="banner-note">Research calls, rankings, and ideal allocation ranges are shown regardless of available cash. Your portfolio only changes concentration actions and the personal funding plan. ${escapeHtml(DATA.portfolio.margin?.message || "Margin is never treated as cash.")}</p>
      <div class="banner-links">${report ? `<button type="button" class="link-button" data-report="${escapeHtml(report.id)}">Read the brief →</button>` : ""}<button type="button" class="link-button" data-go="guide">How calls and funding differ →</button></div>
    </section>

    <div class="status-strip" aria-label="Executive status">
      <div class="status-cell"><span class="status-value text">${escapeHtml(candidateText)}</span><span class="status-label">Buy candidates</span></div>
      <div class="status-cell"><span class="status-value text">${escapeHtml(buyText)}</span><span class="status-label">Current buys</span></div>
      <div class="status-cell"><span class="status-value text">${escapeHtml(sizingText)}</span><span class="status-label">Portfolio context</span></div>
    </div>

    <div class="today-grid">
      <div class="today-main">
        ${portfolioActions.length ? `<section class="section">
          <div class="section-head"><div><span class="section-label">Your portfolio context</span><h3>Hold / trim plan</h3></div><p>Account-aware, but never a capital gate on research</p></div>
          <div class="portfolio-action-list">${portfolioActions.map(portfolioActionMarkup).join("")}</div>
        </section>` : ""}
        <section class="section">
          <div class="section-head"><div><span class="section-label">Opportunity list</span><h3>Best ideas now</h3></div><p>Ranked on investment merit—even with $0 available</p></div>
          <div class="decision-list compact">${decisions.length ? decisions.map(priorityDecisionMarkup).join("") : `<div class="empty-state">No current research ratings.</div>`}</div>
          <button type="button" class="link-button" data-go="decisions">See all ideas →</button>
        </section>
      </div>

      <aside class="today-side">
        ${(DATA.marketNotes || []).length ? `<section class="section">
          <div class="section-head"><div><span class="section-label">Market and industries</span><h3>Current view</h3></div></div>
          <div class="market-note-list">${DATA.marketNotes.slice(0, 3).map(marketNoteMarkup).join("")}</div>
          <button type="button" class="link-button" data-go="watch">See all market notes →</button>
        </section>` : ""}
        <section class="section">
          <div class="section-head"><div><span class="section-label">Since prior brief</span><h3>What changed</h3></div></div>
          <ul class="change-list">${(executive.materialChanges || []).map(item => `<li>${inlineMd(item)}</li>`).join("") || "<li>No decision-relevant change recorded.</li>"}</ul>
        </section>
        <section class="section">
          <div class="section-head"><div><span class="section-label">Next checks</span><h3>Catalysts</h3></div></div>
          <ul class="catalyst-list">${(executive.catalysts || []).map(item => `<li>${inlineMd(item)}</li>`).join("") || "<li>No dated catalyst recorded.</li>"}</ul>
        </section>
      </aside>
    </div>`;

  $$('[data-report]', root).forEach(button => button.addEventListener("click", () => openReport(button.dataset.report)));
  $$('[data-go]', root).forEach(button => button.addEventListener("click", () => switchView(button.dataset.go)));
  bindDecisionLinks(root);
}

function decisionFilters() {
  const available = ["ALL", "BUY", "CONDITIONAL BUY", "WATCH", "AVOID"]
    .filter(rating => rating === "ALL" || (DATA.decisions || []).some(item => item.researchRating === rating));
  return available.map(rating => {
    const count = (DATA.decisions || []).filter(item => item.researchRating === rating).length;
    return `<button type="button" class="filter-chip ${activeDecisionFilter === rating ? "active" : ""}" data-decision-filter="${rating}">${rating === "ALL" ? "All ideas" : `${rating} ${count}`}</button>`;
  }).join("");
}

function renderDecisions() {
  const root = $("#decisions");
  const decisions = (DATA.decisions || []).filter(item => activeDecisionFilter === "ALL" || item.researchRating === activeDecisionFilter);
  root.innerHTML = `<div class="page-intro"><span class="eyebrow">Current research ratings</span><h2>Ideas</h2><p>Simple calls first. Tap an idea for the upside, risk, next check, and sources.</p></div>
    <div class="rating-key"><strong>Research rating</strong> answers “is the stock attractive?” <strong>Trade sizing</strong> answers “how much belongs in your accounts?”</div>
    <div class="filters" aria-label="Idea filters">${decisionFilters()}</div>
    <div class="decision-list">${decisions.length ? decisions.map(priorityDecisionMarkup).join("") : `<div class="empty-state">No ideas match this filter.</div>`}</div>`;
  $$('[data-decision-filter]', root).forEach(button => button.addEventListener("click", () => {
    activeDecisionFilter = button.dataset.decisionFilter;
    renderDecisions();
  }));
  bindDecisionLinks(root);
}

function reportCategories() {
  return ["Briefs & memos", ...new Set((DATA.reports || []).map(report => report.category))];
}

function filteredReports() {
  const query = reportSearch.toLowerCase().trim();
  return (DATA.reports || []).filter(report => {
    const categoryMatch = activeReportFilter === "Briefs & memos" ? report.category !== "Market Signal" : report.category === activeReportFilter;
    const queryMatch = !query || [report.title, report.summary, report.category, ...(report.tags || [])].join(" ").toLowerCase().includes(query);
    return categoryMatch && queryMatch;
  });
}

function reportListMarkup() {
  const reports = filteredReports();
  return reports.length ? reports.map(report => `<button type="button" class="report-row ${selectedReportId === report.id ? "active" : ""}" data-open-report="${escapeHtml(report.id)}">
    <span class="report-row-top"><span>${escapeHtml(report.category)}</span><time>${escapeHtml(report.date)}</time></span>
    <strong>${escapeHtml(report.title)}</strong>
    <p>${escapeHtml(report.summary)}</p>
  </button>`).join("") : `<div class="empty-state">No reports match this search.</div>`;
}

function reportReaderMarkup(report) {
  if (!report) return `<div class="empty-state">Select a report to read it.</div>`;
  const decisions = (report.related_decisions || []).map(ticker => (DATA.decisions || []).find(item => item.instrument === ticker)).filter(Boolean);
  return `<div class="reader-toolbar"><button type="button" class="back-button" id="closeReport">← Reports</button><span class="reader-meta">${escapeHtml(report.category)} · ${escapeHtml(report.date)}</span></div>
    <header class="reader-header"><span class="section-label">${escapeHtml(report.category)}</span><h2>${escapeHtml(report.title)}</h2><p>Updated ${fmtDate(report.updated, { dateStyle: "medium", timeStyle: "short" })}</p>${report.tags.length ? `<div class="tag-row">${report.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>` : ""}</header>
    <article class="markdown-body">${md(report.content)}</article>
    ${(report.links || []).length ? `<section class="backlinks"><span class="section-label">Direct sources</span><h3>Links in this report</h3><ul class="source-list">${report.links.map(link => `<li><a href="${escapeHtml(link.url)}">${escapeHtml(link.label)} ↗</a></li>`).join("")}</ul></section>` : ""}
    ${decisions.length ? `<section class="backlinks"><span class="section-label">Backlinks</span><h3>Related decisions</h3><div class="related-links">${decisions.map(decision => `<button type="button" data-decision="${escapeHtml(decision.instrument)}">${escapeHtml(decision.instrument)} · ${escapeHtml(decision.researchRating || "WATCH")}</button>`).join("")}</div></section>` : ""}`;
}

function renderReports() {
  const root = $("#reports");
  root.classList.toggle("reading-mode", reportReading);
  if (!selectedReportId) selectedReportId = (DATA.reports || [])[0]?.id || null;
  const selected = reportById(selectedReportId);
  root.innerHTML = `<div class="page-intro"><span class="eyebrow">Linked research notes</span><h2>Reports</h2><p>Daily briefs, weekly investment committee notes, investment memos, and material market signals. Raw ledgers and system files are intentionally excluded.</p></div>
    <div class="reports-layout ${reportReading ? "reading" : ""}">
      <div class="report-browser">
        <div class="search-row"><label for="reportSearch">Search reports</label><input id="reportSearch" type="search" value="${escapeHtml(reportSearch)}" placeholder="Ticker, decision, catalyst…" /></div>
        <div class="filters">${reportCategories().map(category => `<button type="button" class="filter-chip ${activeReportFilter === category ? "active" : ""}" data-report-filter="${escapeHtml(category)}">${escapeHtml(category)}</button>`).join("")}</div>
        <div class="report-list">${reportListMarkup()}</div>
      </div>
      <div class="report-reader">${reportReaderMarkup(selected)}</div>
    </div>`;

  $("#reportSearch")?.addEventListener("input", event => {
    reportSearch = event.currentTarget.value;
    const list = $(".report-list", root);
    list.innerHTML = reportListMarkup();
    bindReportRows(root);
  });
  $$('[data-report-filter]', root).forEach(button => button.addEventListener("click", () => {
    activeReportFilter = button.dataset.reportFilter;
    renderReports();
  }));
  bindReportRows(root);
  $("#closeReport")?.addEventListener("click", closeReport);
  $$('[data-decision]', root).forEach(button => button.addEventListener("click", () => {
    activeDecisionFilter = "ALL";
    renderDecisions();
    switchView("decisions");
    const target = (DATA.decisions || []).findIndex(item => item.instrument === button.dataset.decision);
    const cards = $$("#decisions .decision-card");
    if (target >= 0 && cards[target]) {
      cards[target].open = true;
      cards[target].scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }));
  decorateLinks(root);
}

function bindReportRows(root) {
  $$('[data-open-report]', root).forEach(button => button.addEventListener("click", () => openReport(button.dataset.openReport)));
}

function watchCardMarkup(item) {
  return `<details class="watch-card">
    <summary><span class="watch-head"><span class="ticker">${escapeHtml(item.instrument)}</span><span class="watch-theme">${escapeHtml(item.theme || item.sector || "")}</span><span class="priority">${escapeHtml(String(item.research_priority || "priority open").replaceAll("_", " "))}</span><span class="watch-stage">${escapeHtml(String(item.stage || "").replaceAll("_", " "))}</span></span></summary>
    <div class="watch-detail"><div class="detail-grid">
      <div class="detail-field"><span class="field-label">Action trigger</span><p>${escapeHtml(item.trigger || "Not established")}</p></div>
      <div class="detail-field"><span class="field-label">Invalidation</span><p>${escapeHtml(item.invalidation || "Not established")}</p></div>
      <div class="detail-field"><span class="field-label">Next event</span><p>${escapeHtml(item.next_event || "Trigger-dependent")}</p></div>
      <div class="detail-field"><span class="field-label">Current status</span><p><span class="action-badge ${actionClass(item.action)}">${escapeHtml(item.action || "INVESTIGATE")}</span></p></div>
    </div></div>
  </details>`;
}

function renderWatch() {
  const root = $("#watch");
  const alerts = DATA.alerts || [];
  root.innerHTML = `<div class="page-intro"><span class="eyebrow">Markets and catalysts</span><h2>Watch</h2><p>Broad market, industry outlooks, and the events that can change an investment call.</p></div>
    ${(DATA.marketNotes || []).length ? `<section class="section">
      <div class="section-head"><div><span class="section-label">Outlook</span><h3>Market and industry notes</h3></div><p>Notice → prediction → investment effect</p></div>
      <div class="market-note-list full">${DATA.marketNotes.map(marketNoteMarkup).join("")}</div>
    </section>` : ""}
    <section class="section">
      <div class="section-head"><div><span class="section-label">Action conditions</span><h3>Watchlist</h3></div><p>${DATA.watchlist.length} current instruments</p></div>
      <div class="watch-list">${DATA.watchlist.map(watchCardMarkup).join("") || `<div class="empty-state">No watchlist entries.</div>`}</div>
    </section>
    <section class="section">
      <div class="section-head"><div><span class="section-label">Recent triggers</span><h3>Market signals</h3></div><p>Tap a signal to read the report</p></div>
      <div class="signal-list">${alerts.map(alert => `<button type="button" class="signal-row" data-report="${escapeHtml(alert.reportId)}"><span class="signal-level ${alert.level >= 3 ? "high" : ""}">L${alert.level || "—"}</span><strong>${escapeHtml(alert.title)}</strong><time>${escapeHtml(alert.date)}</time></button>`).join("") || `<div class="empty-state">No recent market signals.</div>`}</div>
    </section>`;
  $$('[data-report]', root).forEach(button => button.addEventListener("click", () => openReport(button.dataset.report)));
  decorateLinks(root);
}

function renderGuide() {
  const root = $("#guide");
  const missing = DATA.portfolio.missing || [];
  root.innerHTML = `<div class="page-intro"><span class="eyebrow">Plain-language reference</span><h2>Guide</h2><p>How research calls, portfolio context, and funding fit together.</p></div>
    <section class="guide-lead">
      <span class="section-label">Capital never hides an idea</span>
      <h3>${escapeHtml(DATA.portfolio.status)}</h3>
      <p><strong>Simple answer:</strong> Buy, hold, trim, watch, and avoid calls are based on investment merit. Ideal percentage sizing is also shown without regard to current cash. Your finances are used only for concentration, account fit, sequencing, and the separate funding plan.</p>
      <p><strong>Margin:</strong> ${escapeHtml(DATA.portfolio.margin?.message || "Borrowing capacity is excluded unless explicitly authorized and stress-tested.")}</p>
      ${missing.length ? `<div class="missing-list">${missing.map(item => `<span>${escapeHtml(item)}</span>`).join("")}</div>` : ""}
    </section>
    <section class="section">
      <div class="section-head"><div><span class="section-label">Note format</span><h3>How to read an idea</h3></div></div>
      <div class="plain-note guide-format">
        <div><span>Call</span><p>Buy, conditional buy, watch, or avoid.</p></div>
        <div><span>Why</span><p>The one fact that matters most.</p></div>
        <div><span>Upside / risk</span><p>What can go right and the main way we lose.</p></div>
        <div><span>Next check</span><p>The evidence or event that can change the call.</p></div>
      </div>
    </section>
    <section class="section">
      <div class="section-head"><div><span class="section-label">Glossary</span><h3>Terms in this app</h3></div></div>
      <dl class="glossary-list">${(DATA.glossary || []).map(item => `<div><dt>${escapeHtml(item.term)}</dt><dd>${escapeHtml(item.definition)}</dd></div>`).join("")}</dl>
    </section>`;
}

function routeFromHash() {
  const route = currentHash();
  if (route.view === "reports" && route.detail && reportById(route.detail)) {
    selectedReportId = route.detail;
    reportReading = true;
    renderReports();
  } else if (route.view === "reports") {
    reportReading = false;
    renderReports();
  } else {
    reportReading = false;
  }
  switchView(route.view, { updateHash: false, scroll: false });
}

async function load() {
  if (window.__SITE_DATA__) {
    DATA = window.__SITE_DATA__;
  } else {
    const response = await fetch("data/site-data.json", { cache: "no-store" });
    if (!response.ok) throw new Error(`Dashboard data request failed: ${response.status}`);
    DATA = await response.json();
  }
  selectedReportId = (DATA.reports || [])[0]?.id || null;
  renderShell();
  renderToday();
  renderDecisions();
  renderReports();
  renderWatch();
  renderGuide();
  routeFromHash();
  decorateLinks();
  if (!window.__STANDALONE__ && "serviceWorker" in navigator && location.protocol.startsWith("http")) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
}

load().catch(error => {
  document.body.innerHTML = `<main class="load-error"><h1>Investment Office failed to load</h1><pre>${escapeHtml(error.stack || error)}</pre></main>`;
});

</script>
</body>
</html>
