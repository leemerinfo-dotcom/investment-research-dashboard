 in puts, ~28.2% common stock, ~10.0% calls. Total reported value ~$13.68B.\n- **Notable:** Exit from **Lumentum** and **Coherent** common stock in Q1. Long book concentrated in power/hosting/miners: Bloom Energy, SanDisk, CoreWeave, IREN, Core Scientific, Applied Digital. Large put exposure on SMH/NVDA/ORCL/AVGO/AMD/MU/TSM/ASML.\n- **Interpretation:** Current public Aschenbrenner/Situational Awareness LP book reads as **long physical infra + hosting optionality while hedging expensive broad AI semis**. Do not copy; treat as **crowding/intel signal** only. 13F is stale, options are notional-underlying, and the book could be relative-value rather than directional.\n\n### B. Corning / GLW: harder contractual evidence for AI fiber\n- **Primary sources:** Official Corning + NVIDIA release (U.S. optical manufacturing expansion), official Corning + Amazon release, official Corning + Meta multiyear, up-to-$6B agreement.\n- **Interpretation:** GLW should be considered a primary watchlist candidate for AI fiber/connectivity scarcity. Need revenue-bridge diligence before sizing.\n\n### C. Cisco / CSCO: official AI-order trajectory is real\n- **Company evidence:** Cisco Q2 FY26 reported ~$2.1B AI infrastructure orders from hyperscalers; Q3 FY26 raised FY26 AI orders to ~$9B and AI revenue to ~$4B. Data-center switching orders up >40% YoY.\n- **Interpretation:** CSCO is a cleaner “AI networking order conversion” candidate than many social photonics microcaps; needs backlog/margin analysis.\n\n### D. SemiAnalysis / Dylan Patel: still the highest-signal paid technical source\n- Available public search confirms SemiAnalysis remains core for datacenter power and bottleneck mapping; do not bypass paywall. Use free page/audio references only for framing.\n\n### E. Crowding / macro overlays\n- Q2 2026 hedge-fund commentary indicates record semiconductor long weights; AI infrastructure theme crowded on the long side for crowded names.\n- July 7-8 alert cluster: major down days for VRT, GEV, COHR, AAOI, MRVL, MU, CRDO, followed by sharp ±6%+ snapback in ANET, AVGO, CRDO. This pattern is consistent with crowding/rotation, not thesis invalidation.\n\n### F. New lead generators worth watching, not leading positions\n- **Damnang2:** “Aschenbrenner-style” optics basket maps remain useful for theme mapping; no new primary evidence today.\n- **PhotonEra:** CSCO thesis partially corroborated by Cisco orders; remaining thesis uncertainties are valuation and margin.\n- **Lithos Graphein:** ASML/DUV export-control narrative remains relevant; verify against actual legislation text and ASML disclosures.\n- **Conflict Radar:** Geopolitical risk remains elevated, including energy/shipping chokepoint conditions; use as early warning only.\n\n---\n\n## 3. What it means for Leemer\n\n- **Optics / AI networking:** Do not chase after crowded “all optics up” trades. GLW and CSCO deserve more serious diligence than most social-photonics names because the customer evidence is contractual. AAOI remains the high-torque but higher-risk name; next catalyst is Q2 and GM/order conversion proof.\n- **Positioning discipline:** crowding in VRT/GEV/AO-names after theme spikes is the wrong risk/reward. The desk note said this explicitly; the alert cluster confirms it.\n- **Source hierarchy today:** Cignal AI > official company releases > Goldman/Morgan Stanley public pages > specialist technical sources > social/Substack lead generators.\n\n---\n\n## 4. Best ideas / avoid\n\n| Rank | Name/Input | Verdict | Why |\n|---|---|---|---|\n| 1 | GLW | Watch/add | NVIDIA/Amazon/Meta fiber/connectivity contracts provide harder evidence than most optics names. |\n| 2 | CSCO | Watch/add | Official hyperscaler AI-order trajectory and disclosed growth path; clean relative to microcaps. |\n| 3 | Cignal AI | Add/watch | Best optical-component market maps/startup visibility; use to sanity-check social photonics claims. |\n| 4 | Goldman/Morgan Stanley public AI infra pages | Use/watch | Useful TAM/financing bottleneck math inputs; do not treat named stock framing as independent proof. |\n| 5 | Official company releases | Primary | Corning, Cisco, NVIDIA, Amazon, Meta releases are the day’s highest-evidence items. |\n| — | @aleabitoreddit / Serenity | Watch only | Early theme map, not conviction source; CPO claims still social interpretation. |\n| — | Damnang2 basket | Watch only | Good research map; not a portfolio to copy without primary checks. |\n| — | Conflict Radar tweets | Watch only/early warning | Geopolitical energy/shipping leads require corroboration with AP/Reuters/Kpler/Windward. |\n| — | @marcusmilione | Ignore for now | No new primary-data edge found today. |\n\n---\n\n## 5. Math / checks that matter today\n\n- **GLW:** Segment revenue bridge from fiber/optical segment; contract minimums; capex needed to service Amazon/Meta/NVIDIA commitments; customer concentration; margin uplift versus bundle.\n- **CSCO:** AI revenue vs. total revenue mix; gross margin on AI orders; Acacia/Silicon One competitive position vs. ANET/NVDA/MRVL/AVGO; backlog conversion schedule.\n- **Crowding check:** July 7 sharp selloff in AAOI/MRVL/MU/CRDO/VRT + July 8 bounce in ANET/AVGO/CRDO. Treat ±6% theme days as **sentiment/crowding indicators, not thesis signals**.\n- **13F lag:** Situational Awareness book is as of 03/31/26. Options skew and put-notional means labeled as a position can distort perceived long exposure. Do not use as trade input.\n\n---\n\n## 6. Green lights and thesis-breakers\n\n| Signal | Status |\n|---|---|\n| GLW official hyperscaler fiber/connectivity contracts | ✅ Contractual evidence |\n| CSCO official AI order disclosure | ✅ Official evidence |\n| Cignal AI optical component TAM/framework | ✅ Useful model input |\n| Crowding confirmation from alert action | ✅ Sentiment signal |\n| Serenity/CPO delay claims remain uncorroborated | ❌ Still social only |\n| Damnang basket composition claims | ❌ Needs primary checks before sizing |\n\n---\n\n## 7. Evidence quality\n\n| Source | Score | Bias/conflict risk | Use today |\n|---|---|---|---|\n| SEC EDGAR 13F | 5 | low | Primary position intelligence |\n| Official company releases | 5 | medium | Primary demand/customer evidence |\n| SemiAnalysis | 4 | medium | High-signal technical framing; paid-wall |\n| Cignal AI | 4 | medium | Best found optical component source |\n| Goldman Sachs public pages | 4 | high | Model anchor, not gospel |\n| Morgan Stanley public report | 4 | high | Financing/capex input |\n| PhotonEra | 3 | medium | Technical explainer, limited primary data |\n| Lithos Graphein | 3 | medium | Export-control lead generator |\n| Damnang2 | 3 | high | Theme map, not portfolio |\n| Serenity / @aleabitoreddit | 3 | high | Lead generator only |\n| Conflict Radar | 2 | high | Early-warning only |\n\n**Bottom line:** Best new **decision-relevant source lead** today is **Cignal AI** for optical components and **public bank/hyperscaler official research** for capex/financing math. Best new **equity diligence leads** from sources: **GLW** and **CSCO** for the AI networking/optics watchlist. Best **positioning signal**: the fund community is crowded long AI semis/infra while a sophisticated AI infrastructure book is hedging or rotating into physical infra/hosting; that matters for risk control more than for trade direction.\n\n(Sources consulted: prior source-intel note 2026-07-07, prior semis/HBM desk note 2026-07-09, prior hyperscaler financing note 2026-07-09, alert files 2026-07-06 through 2026-07-08, source_ledger.json, sources.json, and publicly accessible official company/financial research pages.)", "summary": "Source / Funds / Social Intelligence — Analyst Note Date: Wednesday, July 9, 2026 Desk: Source / funds / social intelligence 1. Desk conclusion"}, {"id": "job-36becd52f823", "title": "Biotech / Health / Longevity / Tools", "category": "Desk Outputs", "source": "cron/36becd52f823/2026-07-09_06-52-02.md — final response only", "updated": "2026-07-09T07:52:02", "content": "## Biotech / health-tech public-market scan — 2026-07-09\n\n**Bottom line:** I see **7 names/themes worth desk coverage**, but only a few are “clean” asymmetry. The best balance of upside + evidence + survivability is **TMDX, NTLA, BEAM, TEM**. The highest upside but most binary are **VKTX and RXRX**. **Life-science tools remain mostly below bar** for now: TXG has an interesting Atera launch, but growth is too flat for the valuation; PACB still looks like a dilution trap unless instrument demand turns.\n\n**PoS note:** probabilities below are rough odds that the named catalyst becomes value-creating without thesis damage over ~12–24 months — not odds of stock return.\n\n---\n\n### 1) Intellia Therapeutics — **NTLA**\n**Theme:** first-wave in vivo CRISPR commercialization / platform validation  \n**Type:** platform biotech, but still binary-regulatory\n\n- **Catalyst:** rolling BLA completion for **lonvo-z in hereditary angioedema** in 2H26; possible U.S. launch in 1H27; ATTR Phase 3 restart/enrollment progress after FDA holds lifted.\n- **Evidence quality:** **High for HAE efficacy, still incomplete for long-term irreversible editing safety.** Phase 3 HAELO: **87% attack reduction vs placebo**, **62% attack-free and therapy-free vs 11% placebo**, no serious AEs in lonvo-z arm through cutoff.\n- **PoS:** **60–70%** for HAE regulatory path staying intact; **40–50%** for strong commercial uptake.\n- **Cash/runway/dilution:** $517M cash/securities at 3/31/26 plus ~$207M gross April equity offering; runway guided **at least into 2028**. Dilution risk **medium** — recent raise helps but commercial launch + ATTR trials remain expensive.\n- **Valuation:** market cap about **$2.4B**; cash-adjusted EV roughly **$1.7B** using post-offering cash estimate.\n- **Thesis-breaker:** FDA asks for more long-term off-target/genotoxicity/durability data; payer/patient resistance to irreversible one-time editing vs established HAE prophylaxis; ATTR safety issue returns.\n\n**Desk view:** **High-priority deep dive.** This is probably the cleanest “first in vivo gene-editing approval” public setup.\n\n---\n\n### 2) Beam Therapeutics — **BEAM**\n**Theme:** base-editing platform with multiple shots on goal  \n**Type:** platform biotech; less single-asset binary than NTLA/VKTX, but still clinical/regulatory binary\n\n- **Catalyst:** **BEAM-302 AATD pivotal cohort** expected 2H26; updated BEAM-302 data in 2026; BEAM-304 PKU IND; BEAM-301 GSDIa data; risto-cel sickle-cell BLA as early as year-end 2026.\n- **Evidence quality:** **Medium.** BEAM-302 data are biologically compelling but still mostly open-label biomarker evidence: 29 patients, total/functional AAT increases, mutant Z-AAT decreases, corrected M-AAT production, 60mg selected. FDA feedback supports an accelerated approval pathway, but clinical outcomes remain unproven.\n- **PoS:** **35–45%** for BEAM-302 accelerated-approval thesis; **55–65%** for risto-cel regulatory progress, though commercial differentiation in SCD is less exciting.\n- **Cash/runway/dilution:** **$1.21B** cash/securities at 3/31/26; runway guided **into mid-2029**. Near-term dilution risk **low to medium**.\n- **Valuation:** market cap about **$3.6B**; cash-adjusted EV roughly **$2.4B**.\n- **Thesis-breaker:** AATD biomarker package fails to satisfy regulators or does not translate into lung/liver outcomes; liver LNP/base-editing safety issue; off-target/editing durability concern; SCD commercial launch underwhelms due existing gene-therapy competition.\n\n**Desk view:** **High-priority platform watch.** Better financed than most clinical biotech and has real platform optionality, but BEAM-302 is not yet outcome-de-risked.\n\n---\n\n### 3) Viking Therapeutics — **VKTX**\n**Theme:** second-wave obesity/metabolic challenger  \n**Type:** **binary biotech gambling**, despite a huge market\n\n- **Catalyst:** VK2735 maintenance dosing data expected **3Q26**; oral VK2735 Phase 3 start expected **4Q26**; subcutaneous VANQUISH-1 and VANQUISH-2 Phase 3 trials fully enrolled and progressing; amylin agonist VK3019 Phase 1 start.\n- **Evidence quality:** **Medium.** SubQ Phase 2 showed up to **14.7% mean weight loss after 13 weekly doses**; oral Phase 2 showed up to **12.2% after 13 weeks** without plateau. Good signals, but not yet long-duration Phase 3 or outcomes data.\n- **PoS:** **45–55%** for subQ Phase 3 producing usable efficacy/safety; **25–35%** for oral formulation becoming commercially differentiated.\n- **Cash/runway/dilution:** **$603M** cash/ST investments at 3/31/26, down from $706M at year-end. Phase 3 + commercial/manufacturing scale are expensive. Dilution/partnering risk **medium-high**.\n- **Valuation:** market cap about **$4.3–4.6B**; no revenue; cash-adjusted EV roughly **$3.7–4.0B**.\n- **Thesis-breaker:** efficacy/tolerability not differentiated vs Lilly/Novo/Roche/Amgen pipeline; GI discontinuations; CMC/supply constraints; payer pressure; oral GLP-1/GIP competition catches up; long-term safety or lean-mass concerns.\n\n**Desk view:** **Speculative watch only.** Huge upside if differentiation holds, but this is not a compounder yet. Treat as event-risk exposure, not core.\n\n---\n\n### 4) TransMedics — **TMDX**\n**Theme:** organ-transplant device + logistics platform  \n**Type:** repeatable medtech compounder candidate\n\n- **Catalyst:** ENHANCE Heart and DENOVO Lung trial execution; CHOPS FDA amendment; OCS Kidney expansion; Europe NOP/PAD Aviation rollout; proof that 2026 growth/margins can reaccelerate.\n- **Evidence quality:** **High commercial evidence, medium expansion evidence.** Q1 revenue **$173.9M**, +21% y/y; 2026 guide **$727–757M**, +20–25%; profitable in Q1; FDA granted full IDE approval for ENHANCE Heart and DENOVO Lung.\n- **PoS:** **60–70%** for continued compounder trajectory if logistics/margins stabilize.\n- **Cash/runway/dilution:** **$461.7M cash** at 3/31/26; not a classic runway problem. Dilution risk **low**, but aircraft/logistics capex and convertible debt matter.\n- **Valuation:** market cap about **$2.46B**; ~**3.3x** 2026 guided sales; cash-adjusted sales multiple roughly **2.7x** before debt adjustments.\n- **Thesis-breaker:** utilization plateau; hospital economics/reimbursement friction; aircraft/logistics execution issues; adverse clinical data in new trials; margin compression from scaling the National OCS Program.\n\n**Desk view:** **Best repeatable/compounder setup in this scan.** Needs margin diligence, but valuation looks much more forgiving than diagnostics/software peers.\n\n---\n\n### 5) Tempus AI — **TEM**\n**Theme:** precision diagnostics + multimodal data/AI applications  \n**Type:** repeatable growth platform, not binary biotech\n\n- **Catalyst:** MRD volume ramp; oncology diagnostic growth; data/applications revenue; Merck/Gilead/health-system collaborations; proof that data licensing/modeling can become high-margin recurring growth.\n- **Evidence quality:** **High for business momentum, medium for durable AI moat.** Q1 revenue **$348.1M**, +36% y/y; diagnostics +34.7%; data/applications +40.5%; MRD volume +~500% y/y; FY26 guide raised to **$1.59–1.60B** revenue and ~$65M adjusted EBITDA.\n- **PoS:** **55–65%** for continued growth compounder path; lower for “AI moat” premium being fully justified.\n- **Cash/runway/dilution:** **$643.8M cash/securities** at 3/31/26. Adjusted EBITDA improving, but GAAP losses and stock comp remain material. Dilution risk **low-medium**.\n- **Valuation:** market cap about **$10.8B**; ~**6.8x** FY26 guided sales.\n- **Thesis-breaker:** reimbursement pressure; MRD clinical utility/guideline uptake lags; data business proves services-like rather than software-like; privacy/LDT/FDA regulatory overhang; competition from NTRA/GH/EXAS and hospital-native data networks.\n\n**Desk view:** **Worth coverage, but valuation discipline required.** Better as a platform compounder watch than an “AI drug discovery” bet.\n\n---\n\n### 6) Guardant Health — **GH**\n**Theme:** liquid biopsy + CRC blood-screening adoption  \n**Type:** repeatable diagnostics growth, but valuation is aggressive\n\n- **Catalyst:** Shield CRC screening ramp; Quest access; UnitedHealth coverage announced July 1; commercial payer expansion; oncology testing growth.\n- **Evidence quality:** **High for adoption/revenue growth, mixed for screening superiority.** Q1 revenue **$301.7M**, +48% y/y; oncology tests +47%; Shield screening tests ~44k vs ~9k prior year; FY26 guide raised to **$1.30–1.32B**. Shield has FDA approval and guideline inclusion, but clinical profile matters: CRC sensitivity around **83%**, specificity around **90%**, advanced adenoma sensitivity only around **13%**.\n- **PoS:** **50–60%** for strong Shield adoption; lower for valuation-supported margin outcome.\n- **Cash/runway/dilution:** **$1.2B cash/securities**; Q1 free cash flow **- $71M**. Dilution risk **medium** if commercial spend remains heavy.\n- **Valuation:** market cap roughly **$21–22B**; ~**16x** FY26 guided sales.\n- **Thesis-breaker:** Shield adoption slower than expected; advanced adenoma sensitivity becomes guideline/payer sticking point; payer rates pressure unit economics; competition from stool DNA, colonoscopy, multi-cancer tests, NTRA/EXAS/GRAIL.\n\n**Desk view:** **Track, but not clean asymmetry at current valuation.** Great business momentum; stock already prices a lot.\n\n---\n\n### 7) Recursion Pharmaceuticals — **RXRX**\n**Theme:** AI-enabled drug discovery / TechBio platform  \n**Type:** platform biotech, but currently still speculative\n\n- **Catalyst:** REC-4881 FDA registrational-path update in 2H26; additional REC-1245 dose-escalation data in 2H26; Sanofi/partnered program milestones.\n- **Evidence quality:** **Low-medium.** REC-1245 early Phase 1/2: n=16, no DLTs, target engagement and dose-dependent PK — encouraging safety/PK, not efficacy proof. REC-4881 FAP signal: median polyp burden reduction 43% at week 13 and 53% at week 25 after break, but registrational path still uncertain. The “AI platform advantage” remains unproven clinically.\n- **PoS:** **35–45%** for at least one helpful 2026 milestone; **20–30%** for true platform validation over 12–24 months.\n- **Cash/runway/dilution:** **$665M cash/restricted cash** at 3/31/26; 2026 operational burn guided below $390M; runway into early 2028. Dilution risk **medium**.\n- **Valuation:** market cap about **$2.1B**; cash-adjusted EV roughly **$1.4B**.\n- **Thesis-breaker:** platform produces ordinary drug attrition; no efficacy signal; partner milestones slip; burn remains high; market stops paying for “AI discovery” without clinical proof.\n\n**Desk view:** **Monitor, don’t overweight.** Interesting asymmetry because EV has compressed, but evidence is still early.\n\n---\n\n## Binary biotech vs repeatable opportunities\n\n### Binary / event-driven\n- **VKTX:** highest obesity upside, highest single-asset risk.\n- **NTLA:** de-risked relative to most biotech because Phase 3 HAE data are strong, but first-in-vivo-editing regulatory/commercial risk is real.\n- **BEAM:** multiple shots and long runway reduce pure binary risk, but core value still depends on clinical/regulatory acceptance of base-editing programs.\n- **RXRX:** platform story remains mostly unvalidated; needs real clinical efficacy.\n\n### Repeatable / compounder candidates\n- **TMDX:** best risk-adjusted compounder candidate; real revenue/profitability, reasonable multiple, tangible medtech moat.\n- **TEM:** high-growth diagnostics/data platform; not cheap, but business quality improving.\n- **GH:** strong commercial ramp but valuation already demanding; asymmetric only if Shield becomes a very large covered screening channel with improving margins.\n\n---\n\n## Names/themes scanned but below bar today\n\n- **10x Genomics — TXG:** Atera launch in 2H26 is interesting, cash ~$540M, but FY26 guide of **$600–625M** implies only **0–4% growth ex one-time 2025 settlement revenue**. At ~$4.8B market cap / ~7.8x sales, not enough margin of safety.\n- **PacBio — PACB:** FY26 revenue guide **$165–175M**, soft instrument demand, likely dilution/financing overhang. Avoid unless demand inflects.\n- **Natera — NTRA:** operationally excellent — Q1 revenue **$696.6M**, +39%, FY26 guide **$2.74–2.82B**, positive cash inflow — but ~$40B market cap / ~14x sales makes it less asymmetric.\n- **Illumina — ILMN:** improving, cash-generative sequencing incumbent, but not a hypergrowth/asymmetric setup at ~$29B market cap.\n- **Pure longevity public names:** still mostly too promotional or too thinly evidenced. Better to express longevity-adjacent exposure through metabolic, diagnostics, transplant tech, and validated platform biotech.\n\n---\n\n## Coverage recommendation\n\n**Increase coverage, but do not buy the broad biotech basket.** This vertical deserves **more desk time** because several catalysts are genuine and non-AI-infra: first in vivo gene editing approval, obesity second-wave assets, liquid biopsy reimbursement, and medtech/device logistics. But the opportunity set is barbell-shaped:\n\n1. **Core coverage / deep-dive:** TMDX, NTLA, BEAM, TEM.  \n2. **Speculative catalyst coverage:** VKTX, RXRX.  \n3. **Diagnostics valuation watch:** GH, NTRA, EXAS if valuation resets.  \n4. **Less coverage for now:** research tools unless TXG/PACB show sustained order recovery.\n\nBest current asymmetric setup by category:\n- **Best compounder:** TMDX  \n- **Best platform-biotech validation setup:** NTLA  \n- **Best financed multi-shot gene-editing platform:** BEAM  \n- **Best speculative metabolic upside:** VKTX  \n- **Most overhyped-risk but still worth monitoring:** RXRX  \n- **Best diagnostics/data growth platform:** TEM  \n- **Best adoption story but valuation-stretched:** GH", "summary": "Biotech / healthtech publicmarket scan — 20260709 Bottom line: I see 7 names/themes worth desk coverage, but only a few are “clean” asymmetry. The best balance of upside + evidence + survivability is TMDX, NTLA, BEAM, T…"}, {"id": "job-2cc52e4f25e7", "title": "Research Desk Manager", "category": "Desk Outputs", "source": "cron/2cc52e4f25e7/2026-07-09_06-58-45.md — final response only", "updated": "2026-07-09T07:58:45", "content": "# Research Desk Manager Memo — 2026-07-09\n\n**Bottom line:** The research apparatus is better than last week, but it is still too AI-infra shaped and too AAOI-sensitive. The strongest evidence is now in **power/grid**, **AI capex financing**, and **defense/autonomy + AI apps/cyber**. Optical and semis should stay covered, but they should not dominate attention unless fresh shipment, margin, backlog, or customer evidence appears.\n\nI updated the meta-research queue here:  \n`investment-research/meta_research_queue.md`\n\n---\n\n## 1. Current desk ranking — usefulness / alpha potential\n\n| Rank | Desk | Verdict |\n|---:|---|---|\n| 1 | **Power / grid / data-center infrastructure** | Best hard-evidence desk. Orders, backlog, lead times, PPAs, tariffs, and interconnection constraints are real. Risk: crowded and valuation-sensitive. |\n| 2 | **Hyperscaler capex + neocloud financing** | Critical leading indicator for every AI-infra trade. Needs split: hyperscaler demand vs. neocloud/project-finance fragility are different jobs. |\n| 3 | **AI apps / autonomy / defense** | Best non-infra expansion area. RBRK/APP/PLTR/KTOS/AVAV/AXON-style coverage deserves more weight. Split defense procurement from software metrics. |\n| 4 | **Source / funds / social intelligence** | High process alpha. It correctly demotes social posts to lead-gen and surfaces 13F/crowding signals. Keep, but automate claim tracking. |\n| 5 | **Biotech / health-tech / longevity tools** | Useful diversification if kept small and evidence-first. Stronger when focused on cash runway, regulatory catalysts, and platform vs. binary separation. |\n| 6 | **Optical / AI networking** | Thesis alive, but overfit/crowded. AAOI remains high torque, not a core apparatus obsession. Reweight only after Q2/Q3 shipment + GM proof. |\n| 7 | **Semis / HBM / accelerator supply chain** | Necessary but less differentiated. Keep as bottleneck/thesis-breaker desk, not a generic chip-bull desk. |\n| 8 | **Broad hypergrowth scout** | Essential anti-overfit function, but output needs a stricter primary-source gate before ideas influence positioning priorities. |\n\n---\n\n## 2. Reweight / hire / fire decisions\n\n### Target weights after reorg\n\n| Desk / function | Target weight | Decision |\n|---|---:|---|\n| Power / grid / data-center infrastructure | **17%** | Keep P0; enforce valuation/crowding discipline |\n| Defense autonomy / counter-UAS / national-security software | **13%** | **Hire / split immediately** |\n| Neocloud + AI data-center financing / private credit | **11%** | **Split from hyperscaler desk** |\n| Hyperscaler capex / demand / ROI stress | **9%** | Keep, narrower mandate |\n| AI apps / cyber / monetization | **9%** | **Split from defense/autonomy** |\n| Source / funds / social / crowding intelligence | **8%** | Keep as risk-control, not conviction desk |\n| Biotech / health-tech / longevity tools | **8%** | Keep small specialist sleeve |\n| Broad hypergrowth scout | **8%** | Keep, raise evidence bar |\n| Optical / AI networking | **6%** | Deweight until shipment/margin proof |\n| Semis / HBM / accelerator supply chain | **6%** | Reduce from center; keep as thesis-breaker desk |\n| Stablecoin / tokenization / fintech rails | **5%** | Hire scout, not conviction desk yet |\n\nWeights sum to 100%.\n\n---\n\n## 3. Blunt apparatus critique\n\n### The desk is still overfitting to AAOI / semis\nAAOI is getting too much gravitational pull relative to its proof. The optical note itself now says the right thing: demand is real, but AAOI has customer concentration, dilution, low-ish gross margin, and 800G/1.6T revenue proof still pending. Until Q2/Q3 data confirms the ramp, AAOI should be monitored, not allowed to dominate the research stack.\n\n### Semis are useful, but no longer where the easiest alpha is\nThe semis desk is good, but much of the market already understands HBM, CoWoS, TSMC, NVDA, AVGO, and MU. The desk should focus on **cycle breakpoints**: MU capex/depreciation risk, Samsung HBM supply normalization, ASML China/service exposure, CoWoS capacity relief, and custom ASIC margin/customer concentration.\n\n### Power/grid is strongest, but crowded\nPower infrastructure is the best hard-evidence desk today, but the easy narrative trade is mature. The work now needs to be valuation and backlog conversion: VRT/GEV/PWR/ETN/NVT/CEG/VST cannot be treated as one basket.\n\n### Defense/autonomy deserves its own desk\nThis is the clearest “new hire.” It has revenue, backlog, procurement, warfighting urgency, and public tickers. Do not bury KTOS/AVAV/AXON/PLTR under generic AI apps.\n\n### AI apps/cyber also deserves separation\nRBRK, APP, PLTR, AXON, PANW/CRWD/ZS-type names need ARR/RPO/NRR/FCF/SBC work, not defense procurement work. One combined “AI apps/autonomy/defense” desk is too broad.\n\n---\n\n## 4. New desks / coverage gaps\n\n### Hire now\n1. **Defense autonomy / counter-UAS / national-security software**\n   - Coverage: AVAV, KTOS, AXON, PLTR, RTX, LHX, NOC, RKLB where defense-linked.\n   - Watch private IPO path: Anduril, Shield AI, Saronic.\n   - Must track: funded backlog, DoD budget lines, task-order conversion, margins, book-to-bill.\n\n2. **Neocloud / AI data-center financing**\n   - Coverage: CRWV, NBIS, IREN, CORZ, APLD, BE, ORCL project finance.\n   - Must track: capacity handoffs, utilization, leases/debt, interest/revenue, GPU depreciation, customer concentration.\n\n3. **AI apps / cyber / monetization**\n   - Coverage: RBRK, APP, PLTR, AXON, PANW, CRWD, ZS, NET, DDOG where evidence warrants.\n   - Must track: ARR/RPO, NRR, FCF, SBC, margin, product-level AI revenue, valuation vs. deceleration.\n\n4. **Stablecoin / tokenization / fintech rails scout**\n   - Coverage: CRCL, COIN, HOOD, GLXY.\n   - Gate: stablecoin float, reserve-yield economics, payment volume, regulatory durability, tokenization revenue.\n   - Explicitly **not** a generic crypto desk.\n\n### Add as overlay, not full desk yet\n- **Energy/geopolitics/resource overlay:** gas/LNG, copper, water/cooling, shipping chokepoints, only when tied to AI power, defense, or commodity shocks.\n\n---\n\n## 5. Pause / fire / reduce\n\n- **Reduce AAOI-only loops** until the model is populated and Q2/Q3 proves shipment + margin inflection.\n- **Pause humanoid/generic robotics** unless public revenue/customer-contract evidence appears.\n- **Keep AI drug discovery watch-only** unless clinical translation or partner milestones appear. Platform rhetoric is not enough.\n- **Do not create a generic crypto desk.** Stablecoin/tokenization rails only.\n- **Fire any source/mini-desk** that cannot produce primary evidence, valuation math, and thesis-breakers.\n\n---\n\n## 6. Meta-research build queue for Gus\n\n1. **Evidence / claim ledger**\n   - Machine-readable file with claim, ticker/theme, source score, primary evidence, date, next verification date, status, and investment impact.\n\n2. **Desk scorecard**\n   - Score each desk on primary evidence density, novelty, math quality, thesis-breaker clarity, valuation discipline, anti-overfit value, and source discipline.\n\n3. **Company model auto-refresh**\n   - Priority models: AAOI/LITE/CRDO/GLW; VRT/GEV/PWR/ETN/VST/CEG; PLTR/RBRK/APP/AXON/AVAV/KTOS; CRWV/NBIS/IREN/CORZ; NTLA/BEAM/VKTX/TEM/TMDX/GH.\n\n4. **Trigger system upgrade**\n   - Add filing/news triggers: dilution, guidance, customer pushout, backlog/RPO changes, FDA events, DoD awards, utility tariff/PPA/interconnection filings, and data-center ABS/CMBS issuance.\n\n5. **13F / fund / crowding process**\n   - Track Situational Awareness LP and other AI-infra/defense funds, with options/staleness caveats.\n\n6. **Coverage map refresh**\n   - Dashboard/prompts should reflect the new center of gravity: power/grid, financing fragility, defense autonomy, AI apps/cyber, biotech selectivity, and stablecoin rails. Semis/optics stay active but no longer dominate.", "summary": "Research Desk Manager Memo — 20260709 Bottom line: The research apparatus is better than last week, but it is still too AIinfra shaped and too AAOIsensitive. The strongest evidence is now in power/grid, AI capex financi…"}, {"id": "job-04aa99181e16", "title": "Market Trigger Watcher", "category": "Desk Outputs", "source": "cron/04aa99181e16/2026-07-10_01-37-23.md — final response only", "updated": "2026-07-10T02:37:23", "content": "# Cron Job: Investment market trigger watcher\n\n**Job ID:** 04aa99181e16\n**Run Time:** 2026-07-10 01:37:23\n**Mode:** no_agent (script)\n**Status:** silent (empty output)", "summary": "Cron Job: Investment market trigger watcher Job ID: 04aa99181e16 Run Time: 20260710 01:37:23 Mode: no_agent (script)"}]};</script>
<script>
let DATA = null;

const $ = (sel) => document.querySelector(sel);
const el = (tag, cls, html) => { const n = document.createElement(tag); if (cls) n.className = cls; if (html !== undefined) n.innerHTML = html; return n; };
function md(text){ if(!text) return ""; const html = window.marked ? marked.parse(text,{mangle:false,headerIds:false}) : text.replace(/\n/g,"<br>"); return window.DOMPurify ? DOMPurify.sanitize(html) : html; }
function fmtDate(s){ if(!s) return ""; try{return new Date(s).toLocaleString()}catch{return s} }
function pct(v){ if(v===null||v===undefined||Number.isNaN(v)) return "—"; return `${v>=0?"+":""}${Number(v).toFixed(2)}%`; }
function money(v){ if(v===null||v===undefined||Number.isNaN(v)) return "—"; return Number(v).toLocaleString(undefined,{maximumFractionDigits:2,minimumFractionDigits:2}); }
function quoteColor(q){ return (q.changePct||0) >= 0 ? "up" : "down"; }

function sparkline(values, cls=""){ if(!values||values.length<2) return `<svg class="spark ${cls}" viewBox="0 0 120 42"><path d="M0 22 L120 22"/></svg>`; const min=Math.min(...values), max=Math.max(...values), span=max-min||1; const pts=values.map((v,i)=>{const x=(i/(values.length-1))*120; const y=38-((v-min)/span)*34; return `${i?"L":"M"}${x.toFixed(1)} ${y.toFixed(1)}`}).join(" "); return `<svg class="spark ${cls}" viewBox="0 0 120 42" preserveAspectRatio="none"><path d="${pts}"/></svg>`; }
function quoteCard(q){ const color=quoteColor(q); if(q.error) return `<div class="quote-card"><div class="quote-top"><span class="ticker">${q.ticker}</span><span class="price">n/a</span></div><div class="quote-time">${q.error}</div></div>`; return `<div class="quote-card ${color}"><div class="quote-top"><span class="ticker">${q.ticker}</span><span class="price">${money(q.price)}</span></div><div class="change ${color}">${pct(q.changePct)}</div>${sparkline(q.sparkline,color)}<div class="quote-time">${q.exchange||""} · ${q.quoteTime?fmtDate(q.quoteTime):"snapshot"}</div></div>`; }

function renderShell(){ $("#generated").textContent=`Generated ${fmtDate(DATA.meta.generatedAt)} · ${DATA.stats.quotes||0} quote snapshots · public-safe export`; document.querySelectorAll(".nav button").forEach(btn=>btn.onclick=()=>switchView(btn.dataset.view)); $("#search").addEventListener("input",renderFileList); $("#copyLink").onclick=async()=>{await navigator.clipboard.writeText(location.href); $("#copyLink").textContent="Copied"; setTimeout(()=>$("#copyLink").textContent="Copy dashboard link",1200)}; renderFileList(); }
