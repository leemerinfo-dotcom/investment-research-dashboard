resh market-trigger alert since the last watcher run; today’s change is desk-level reweighting, not a single ticker event.\n\n## 2. My analyst stance today\n\n**Aggressive research target**\n1. **Power/grid/data-center infra** — VRT, GEV, PWR, ETN, selective VST/CEG. Best hard-evidence bottleneck.\n2. **Defense autonomy + AI apps/cyber** — RBRK, APP, PLTR, KTOS/AVAV, AXON. Best non-infra expansion.\n3. **Neocloud/project finance** — CRWV, NBIS, IREN, CORZ. Huge upside, but this is credit-underwriting, not simple growth investing.\n\n**Hold thesis / do not chase**\n- **AAOI / optical networking:** thesis intact, but price volatility is ahead of proof.\n- **VRT/GEV/ETN:** high quality, but crowded after sharp theme moves.\n- **TSM/AVGO:** still strong scarcity/evidence names, but not “cheap AI beta.”\n\n**Add only if X happens**\n- **AAOI:** add only if Q2/Q3 show datacenter revenue acceleration, GM moving above **30–32%**, no AR/inventory blowout, no new dilution, and 1.6T shipment proof.\n- **CRDO/LITE/GLW:** add only on order/revenue confirmation or pullback; they now screen cleaner than AAOI inside optics.\n- **MU:** add only if HBM pricing and capex discipline stay intact despite Samsung HBM4 supply coming online.\n\n**Risk-reduce if Y happens**\n- AAOI GM stays sub-30%, share count rises again, AR/customer concentration worsens, or 1.6T slips.\n- Power names miss backlog-to-revenue conversion while multiples remain extreme.\n- Neocloud financing spreads widen / customer handoffs slip / interest burden rises faster than revenue.\n\n**Avoid for now**\n- Generic humanoid robotics.\n- Generic crypto/tokens.\n- Social-media photonics baskets without filings/order proof.\n- AI drug discovery “platform” claims without clinical translation.\n\n## 3. What this means for your concentrated active sleeve\n\nIf AAOI is still the concentrated active reference point, I’d treat it as **thesis alive but no longer center-of-gravity**. The sleeve risk is not “AI infra is fake.” It’s that AAOI could be the wrong public expression of a real buildout if margins, dilution, or customer concentration eat the upside.\n\nMy analyst view: **new active-sleeve capital should wait for either AAOI proof or a better risk/reward pullback in power/defense/apps.** The S&P/core sleeve can stay left alone. The active sleeve should become less single-name optics-dependent and more exposed to **multiple bottlenecks with hard evidence**: power equipment, grid construction, AI app monetization, defense procurement, and maybe TSM/AVGO scarcity economics.\n\n## 4. Ranked opportunities today\n\n1. **Power/grid/data-center infra — VRT, GEV, PWR, ETN; selective VST/CEG**  \n   Best evidence. Real orders/backlog, real lead-time constraints. Don’t chase theme spikes.\n\n2. **AI apps/cyber + defense autonomy — RBRK, APP, PLTR, KTOS, AVAV, AXON**  \n   Moved up. This is the cleanest anti-overfit bucket. RBRK/APP show actual AI monetization; KTOS/AVAV have funded procurement/backlog.\n\n3. **Neocloud/project finance — CRWV, NBIS, IREN, CORZ/APLD**  \n   Moved up as a fragility + upside desk. Needs debt/MW/utilization modeling before conviction.\n\n4. **Advanced packaging/custom silicon — TSM, AVGO; MU with caveat; ASML discounted**  \n   TSM is the cleaner scarcity-rent holder. AVGO AI revenue is proving real. MU is high torque but more cyclical now. ASML has a sharper China/MATCH Act overhang.\n\n5. **Optical/networking — LITE, CRDO, GLW, CSCO, AAOI**  \n   Demand is real. AAOI is highest torque but weakest proof-to-valuation. LITE/CRDO/GLW moved up versus AAOI.\n\n6. **Selective biotech/health-tech — TMDX, NTLA, BEAM, TEM; VKTX/RXRX speculative**  \n   Keep small. Good asymmetry, but binary/dilution risk needs strict sizing.\n\n7. **Stablecoin/tokenization rails — CRCL, COIN, HOOD**  \n   Watch/scout, not conviction yet. Needs regulation + float/take-rate math.\n\n## 5. Scorecard moves\n\n**Moved up**\n- **Power/grid** stays P0.\n- **Defense autonomy / AI apps / cyber** moved up meaningfully.\n- **Neocloud financing** moved up as its own desk.\n- **GLW/CSCO/LITE/CRDO** moved up inside optics because evidence is cleaner.\n- **TSM/AVGO** remain best semis/AI supply-chain quality.\n\n**Moved down / deweighted**\n- **AAOI** deweighted until shipment + margin proof.\n- **MU** slightly down/conditional: execution strong, but >$25B capex and Samsung HBM4 raise 2027 oversupply risk.\n- **ASML** down/discounted because MATCH Act servicing-ban risk could hit China revenue.\n- **Generic robotics / generic crypto / social photonics baskets** remain below bar.\n\n## 6. Decision math that matters\n\n- Hyperscaler capex envelope near **$725B in 2026**, roughly **+77% vs 2025**. Demand is not broadly digesting yet.\n- AAOI Q1: **$151.1M revenue**, data center **53.9%**, but 800G was only **$4.6M** — just **5.6% of data-center revenue**. Q2 guide GM only **29–30%**.\n- AAOI dilution: Q1 ATM raised **$382M net**; share count moved to ~**80.7M** guide assumption, about **7%+ expansion** in one quarter.\n- Power evidence: VRT backlog **+109% YoY**, orders **+81%**; GEV Q1 orders **+71% organic**, data-center electrification orders **$2.4B in Q1**, more than all 2025.\n- Semis: CoWoS 2026 demand near **1.0M wafers**, NVIDIA ~**60%**; MU capex now **>$25B**, and Samsung HBM4 commercial shipment since Feb raises 2027 supply risk.\n\n## 7. Green lights / thesis-breakers\n\n**Green lights**\n- AAOI GM >32%, no dilution, clean AR/inventory, 1.6T shipments.\n- VRT/GEV/PWR/ETN convert backlog into margin, not just revenue.\n- RBRK/APP/PLTR sustain growth without valuation/margin cracks.\n- Neoclouds hit MW handoff dates with financing still available.\n- TSM keeps CoWoS pricing/allocation tight.\n\n**Thesis-breakers**\n- Hyperscaler capex cuts driven by ROI stress, not timing.\n- Private-credit/ABS market reprices data-center financing.\n- AAOI margin fails to expand despite mix shift.\n- MU/Samsung/SK Hynix supply growth breaks HBM pricing in 2027.\n- Defense names’ funded backlog fails to convert under continuing resolutions.\n\n## 8. Best next move\n\n**Best next move:** Gus should build a one-page active-sleeve replacement/expansion grid: **AAOI vs VRT/GEV/PWR/ETN vs RBRK/APP/KTOS/AVAV vs TSM/AVGO**, with add-only-if thresholds and risk-reduce triggers. For you, I’d treat today as **no-chase / prepare-to-act-on-proof-or-pullback**.\n\n## 9. Desk reweight\n\nHire/split: **defense autonomy**, **AI apps/cyber**, **neocloud/project finance**, **stablecoin rails scout**.  \nKeep high: **power/grid**.  \nKeep but deweight: **optics**, **semis/HBM**.  \nPause: **generic humanoid robotics**, **generic crypto**, **AAOI-only loops**.", "summary": "1. The actual read Stance: AI infra demand is still real and accelerating, but the best capital allocation read is not “chase AAOI/semis.” The hard evidence has shifted toward power/grid backlog, defense/autonomy + AI a…"}, "latestSynthesis": {"id": "job-08120c9a9378", "title": "Daily Synthesis", "category": "Desk Outputs", "source": "cron/08120c9a9378/2026-07-09_08-05-44.md — final response only", "updated": "2026-07-09T09:05:44", "content": "# Daily Investment Research Synthesis — 2026-07-09\n\n## 1. What you should believe / watch differently today\n\n1. **AI infra demand is still real, but the main risk has moved from “will they build?” to “can the financing/capacity handoff convert cleanly?”** New DCD item: **$520M CMBS/ABS backed by a fully leased 80MW Loudoun data center**. This confirms the securitization/private-credit rail is now core plumbing for AI/data-center growth.\n\n2. **AAOI remains convex, but the SEC math argues “do not chase without Q2/Q3 proof.”** Q1 data center revenue was strong, but gross margin fell, AR/inventory ballooned, and customer concentration is extreme. AAOI is thesis-alive, not yet a clean compounder.\n\n3. **Research attention should rotate up toward power/grid, defense autonomy, AI apps/cyber, and neocloud finance.** Optics and semis still matter, but they are crowded and already heavily studied. The best anti-overfit expansion is **defense/counter-UAS + AI software monetization**.\n\n4. **Stablecoin/tokenization rails deserve a scout now.** The OCC’s 2026 GENIUS Act proposed rulemaking makes this a regulated fintech-rails theme, not generic crypto. Still no conviction until we model float, reserve yield, take-rate, regulation, and rate sensitivity.\n\n5. **Price-action alerts from July 7–8 look like crowding/rotation, not evidence.** AVGO/ANET/CRDO snapped back +6% after power/optics selloffs. Treat that as sentiment heat, not thesis validation.\n\n---\n\n## 2. Active sleeve scorecard — moved up/down\n\n### Moved up\n- **Neocloud / project finance:** DCD’s $520M data-center ABS is direct evidence that securitized data-center financing is scaling. This desk should be split out from hyperscaler demand.\n- **Defense autonomy / counter-UAS:** official Replicator 2 purchase + FY2027 NDAA/counter-drone provisions make this a real procurement theme. Public exposures: **AVAV, KTOS, PLTR, AXON**, plus primes.\n- **AI apps/cyber monetization:** **RBRK, APP, PLTR** have more direct monetization evidence than generic “AI software” baskets.\n- **Stablecoin/tokenization rails:** upgraded from vague watch to **dedicated scout** because regulatory implementation is now concrete.\n\n### Held high\n- **Power/grid/data-center infra:** still the best hard-evidence bottleneck, but crowded. Best quality: **VRT, GEV, ETN, PWR**. More asymmetric but needs diligence: **VST/CEG/NVT/GNRC/gas-midstream**.\n\n### Moved down / risk up\n- **AAOI as center-of-gravity:** deweighted until Q2/Q3 GM + 800G/1.6T shipment proof.\n- **MU:** still strong HBM execution, but Samsung HBM4 shipping + MU capex >$25B raises 2027 oversupply/depreciation risk.\n- **ASML:** structural monopoly intact, but MATCH Act / China servicing-ban risk is now a real medium-term overhang.\n- **Generic robotics/humanoid names:** still too little public revenue evidence.\n\n---\n\n## 3. Ranked hypergrowth opportunity set\n\n| Rank | Theme / tickers | Evidence quality | Asymmetry / probability | Catalyst window | Analyst stance |\n|---:|---|---|---|---|---|\n| 1 | **Power/grid/data-center infrastructure** — VRT, GEV, PWR, ETN, VST, CEG, NVT | High | High probability, medium asymmetry after crowding | Q2 earnings, utility tariffs, PPAs, backlog conversion | Highest-conviction research target; do not chase spikes |\n| 2 | **Defense autonomy / counter-UAS / national-security AI** — AVAV, KTOS, PLTR, AXON | Medium-high | High asymmetry, improving probability | FY2027 NDAA, task orders, backlog conversion | Expand desk immediately |\n| 3 | **Neocloud + AI data-center financing** — CRWV, NBIS, IREN, CORZ, APLD, ORCL | Medium-high | Very high asymmetry, high fragility | Q2 utilization, MW handoffs, financing spreads | Dedicated project-finance desk |\n| 4 | **AI apps / cyber monetization** — RBRK, APP, PLTR, AXON, PANW | Medium-high | Strong probability-adjusted upside if growth holds | Q2 ARR/RPO, FCF, margins | Better non-infra candidate set than generic semis |\n| 5 | **Advanced packaging / custom silicon** — TSM, AVGO, NVDA, MRVL, MU | High | High quality, less asymmetric after rerating | TSM Q2, hyperscaler capex, HBM pricing | Keep as bottleneck/risk desk |\n| 6 | **Optical/fiber/networking** — LITE, CRDO, GLW, CSCO, AAOI, ANET | Medium-high | Still asymmetric, but crowded and proof-dependent | AAOI Q2, LITE/CRDO earnings, GLW contract economics | Prefer LITE/CRDO/GLW quality over AAOI chase |\n| 7 | **Stablecoin/tokenization fintech rails** — CRCL, COIN, HOOD | Medium | Potentially large, economics not underwritten | OCC final rules, float growth, rate path | Hire scout; no generic crypto conviction |\n| 8 | **Selective biotech/health-tech** — TMDX, NTLA, BEAM, TEM, VKTX, RXRX | Medium | High asymmetry, idiosyncratic risk | FDA/clinical/commercial catalysts | Keep small specialist sleeve |\n\n---\n\n## 4. AAOI / optical watch — hard SEC read\n\n**Evidence from AAOI Q1 2026 10-Q:**\n- Revenue: **$151.1M**, +51.4% y/y.\n- Data center revenue: **$81.4M**, +154% y/y, **53.9%** of revenue.\n- Gross margin: **29.1%**, down from 30.6% y/y.\n- Cash + restricted cash: **$449.4M**.\n- Debt + convertible notes: roughly **$170.7M** carrying value.\n- Shares outstanding: **80.24M** as of May 5, 2026.\n- ATM: completed **~4.8M shares** at **$103.51** weighted average, about **$490M net proceeds**.\n- AR: **$299.0M**, nearly **2.0x Q1 revenue**.\n- Inventory: **$206.2M**, **1.36x Q1 revenue**.\n- Digicomm: **74.5% of AR**, **44.1% of revenue**.\n- Operating cash burn: **$85.4M** in Q1.\n- Capex: **$58.2M** in Q1; management expects materially higher 2026 capex.\n\n**Valuation math using the specialist note’s ~$113 price reference** — current quote fetch was not reliable:\n- Market cap at $113 and 80.24M shares: **~$9.1B**.\n- Rough EV after cash/debt: **~$8.8B**.\n- EV/sales: **~14.5x Q1 annualized**, **~11.6x Q2 guide midpoint annualized**, **~8.0x if FY26 revenue clears $1.1B**.\n- Fully diluted including all Amazon warrants + convertible shares: **~91.1M shares**, or **~$10.3B market cap at $113**.\n\n**Analyst read:** AAOI’s demand setup is real, but the underwriting problem is now execution quality:\n- GM needs to move **above 30–32%**, not hover at 29%.\n- AR concentration needs to decline.\n- 800G/1.6T revenue must become material, not just announced.\n- No further dilution/ATM overhang should appear before operating leverage shows up.\n\n**AAOI stance:** thesis alive, but **add-only-on-confirmation / do-not-chase**. If Q2 shows sub-30% GM, AR/inventory growth faster than revenue, or 1.6T slips, AAOI moves from “convex optics exposure” to “crowded execution trap.”\n\n---\n\n## 5. Highest-signal developments today\n\n### A. Data-center ABS confirms financing layer\n- **Source:** DCD + KBRA-linked pre-sale info.\n- **Evidence quality:** 4/5.\n- **Fact:** Cloud Capital-linked Lohrasp Enterprise II issued **$520M** CMBS/ABS secured by **LC3, an 80MW Loudoun County data center**, fully leased to an **AA-rated hyperscale tenant** under long-term NNN lease.\n- **Math:** **$6.5M debt/MW**, **$65.1M annual adjusted base rent**, **~$814k rent/MW/year**, debt/rent **~8.0x**.\n- **Implication:** Data-center securitization is investable plumbing. This strengthens the neocloud/project-finance desk.\n\n### B. Defense/counter-UAS evidence is now official enough to staff\n- **Source:** War.gov official Replicator 2 release; Holland & Knight FY2027 NDAA/counter-UAS legal summary.\n- **Evidence quality:** 5/5 for official purchase; 3/5 for legal/regulatory summary.\n- **Fact:** Replicator 2’s first purchase is DroneHunter F700 counter-UAS systems; FY2027 bills contain counter-UAS/drone security provisions.\n- **Implication:** This is no longer just “drones are hot.” It is funded procurement plus regulatory urgency.\n\n### C. Stablecoin rails moved from “legislation rumor” to implementation\n- **Source:** OCC Bulletin 2026-3.\n- **Evidence quality:** 5/5.\n- **Fact:** OCC proposed rules implementing the GENIUS Act: reserves, redemption, risk management, audits, custody, issuer applications, foreign issuer supervision.\n- **Implication:** Build the **CRCL/COIN/HOOD** model around float, reserve yield, compliance costs, take-rate, custody, and rate sensitivity. Do not underwrite as crypto beta.\n\n### D. NVIDIA/FuriosaAI items are strategically useful, not trade-moving\n- **FuriosaAI at Equinix Lisbon:** scale not disclosed; private company; Broadcom partnership for 2nm/HBM4 inference chips is a lead for **AVGO/EQIX**, not a conviction point.\n- **NVIDIA Vera CPU blog:** vendor-biased but important framing — agentic workloads shift bottlenecks to CPU-side tool execution and GPU utilization. Supports NVDA platform story, but not enough to change position stance.\n\n---\n\n## 6. Source quality / missing evidence\n\n**Best sources today**\n- **AAOI SEC 10-Q — 5/5:** hard financials, dilution, AR, inventory, customer concentration.\n- **OCC GENIUS Act NPR — 5/5:** primary regulatory evidence for stablecoin rails.\n- **War.gov Replicator 2 release — 5/5:** official procurement evidence.\n- **DCD + KBRA-linked data-center ABS reporting — 4/5:** strong financing signal; full KBRA deal docs still needed.\n\n**Weakest inputs**\n- Social/substack optics/infra maps: useful leads, not conviction.\n- NVIDIA blog: strategic vendor framing, high bias.\n- Broad scout data: useful for anti-overfit, but some claims still need primary-source verification.\n\n**Claims still needing verification**\n- Exact GLW contract economics and revenue bridge from NVIDIA/Amazon/Meta.\n- AAOI 800G/1.6T shipment cadence and customer-level order conversion.\n- CoreWeave/Nebius/IREN utilization, cancellation rights, debt covenants, GPU depreciation.\n- Defense budget line-item mapping to **AVAV/KTOS/AXON/PLTR** revenue.\n- CRCL stablecoin float economics, reserve sensitivity, and post-GENIUS compliance burden.\n- TMDX/NTLA/BEAM/TEM current market caps, cash runway, and regulatory catalyst dates from fresh filings.\n\n---\n\n## 7. Desk-management verdict\n\n### Expand / hire\n1. **Defense autonomy / counter-UAS desk** — AVAV, KTOS, AXON, PLTR, RTX/LHX/NOC; focus on funded backlog, NDAA lines, task-order conversion.\n2. **AI apps / cyber monetization desk** — RBRK, APP, PLTR, AXON, PANW/ZS/NET/DDOG; focus ARR/RPO, FCF, SBC, valuation vs decel.\n3. **Neocloud / project-finance desk** — CRWV, NBIS, IREN, CORZ, APLD, ORCL; focus MW handoffs, ABS/CMBS, interest/revenue, utilization.\n4. **Stablecoin/tokenization rails scout** — CRCL, COIN, HOOD; no token speculation.\n\n### Keep but discipline\n- **Power/grid:** keep P0, but enforce valuation/crowding discipline.\n- **Source/funds/social:** keep as risk-control and claim-verification desk.\n- **Biotech/health-tech:** keep small, catalyst-led, evidence-first.\n\n### Reduce / pause / fire\n- **Reduce AAOI-only loops.** It stays on watch, but no longer drives the whole research process.\n- **Reduce generic semis bullishness.** Semis desk should focus on TSM/MU/ASML/AVGO thesis-breakers, not daily cheerleading.\n- **Pause generic robotics/humanoid coverage** until primary revenue/customer contract evidence appears.\n- **Avoid generic crypto coverage.** Only stablecoin/tokenization rails qualify.\n- **Fire any source/mini-desk that cannot produce primary evidence, valuation math, and thesis-breakers.**\n\n**Bottom line:** Today’s best research edge is not another AAOI narrative pass. It is building the **power + defense + neocloud finance + AI apps/cyber** stack while keeping AAOI on a strict Q2/Q3 proof leash.", "summary": "Daily Investment Research Synthesis — 20260709 1. What you should believe / watch differently today 1. AI infra demand is still real, but the main risk has moved from “will they build?” to “can the financing/capacity ha…"}, "latestAlerts": [{"file": "2026-07-09_12-02-03.md", "title": "2026-07-09_12-02-03", "levels": [{"level": 3, "title": "LITE price move trigger"}, {"level": 2, "title": "NTLA price move trigger"}], "content": "# Investment Trigger Alerts — 2026-07-09 12:02 EDT\n\n## Level 3 — LITE price move trigger\n- Theme: optical components\n- Priority: high\n- Trigger: intraday move +12.36% vs threshold ±6.0%\n- Last price: 794.50\n- Change vs previous close: +12.36%\n- Change vs open: +5.21%\n- Volume: 3.02M; avg volume: 3.67M; volume ratio: 0.82x\n- Quote timestamp: 2026-07-09T12:01:48-04:00\n- Analyst next step: check filings/news/sector basket before treating this as thesis-relevant.\n\n## Level 2 — NTLA price move trigger\n- Theme: in-vivo gene editing\n- Priority: medium\n- Trigger: intraday move -7.13% vs threshold ±6.0%\n- Last price: 15.64\n- Change vs previous close: -7.13%\n- Change vs open: -5.73%\n- Volume: 3.73M; avg volume: 3.69M; volume ratio: 1.01x\n- Quote timestamp: 2026-07-09T12:01:42-04:00\n- Analyst next step: check filings/news/sector basket before t ": "2026-07-08T07:59:44", "content": "# Investment Research Dashboard\n\nGenerated: 2026-07-08 07:59\n\n## Focus\n- Broad public-market hypergrowth opportunities across sectors\n- AI infrastructure and inference buildout\n- AI applications, autonomy, robotics, defense technology, and edge AI\n- optical networking and transceivers\n- data-center supply chain, power, cooling, and grid constraints\n- semiconductors, HBM, advanced packaging, and accelerator supply chain\n- biotech, health-tech, longevity platforms, and life-science tools\n- energy, resources, commodities, and geopolitical supply shocks when evidence is strong\n- software/platform businesses with nonlinear adoption or margin inflection\n- 13F/fund/crowding/source intelligence for emerging themes\n\n## Active ticker universe\n| Ticker | Company | Themes |\n|---|---|---|\n| AAOI | Applied Optoelectronics | optical transceivers, AI data centers |\n| NVDA | NVIDIA | AI accelerators, networking, CUDA ecosystem |\n| MU | Micron | HBM, memory cycle |\n| JBL | Jabil | AI supply chain, manufacturing |\n| CLS | Celestica | AI supply chain, data-center hardware |\n| AVGO | Broadcom | custom silicon, networking, AI infrastructure |\n| ANET | Arista Networks | AI networking, Ethernet switching |\n| MRVL | Marvell | custom silicon, optical/DSP, data infrastructure |\n| TSM | TSMC | foundry, CoWoS, advanced nodes |\n| ASML | ASML | lithography, semiconductor capex |\n\n## Active theses\n| ID | Theme | Conviction | Status | Next diligence |\n|---|---|---|---|---|\n| ai-optical-800g-1p6t | AI datacenter optical networking bottleneck | medium-high research priority; high torque but proof-dependent | active_but_deweighted | Populate AAOI model with current price, cash, debt, shares, AR, inventory, and scenario math |\n| ai-power-grid-bottleneck | Data-center power/grid bottleneck | highest research priority | active | Compare GEV/VRT/PWR/ETN/NVT on backlog conversion and valuation |\n| hbm-memory-allocation-cycle | HBM and AI memory allocation cycle | medium research priority; focus on thesis-breakers and cycle risk | active_but_deweighted | Build MU HBM sensitivity table |\n| ai-apps-defense-autonomy | AI applications, defense autonomy, counter-UAS, and national-security software | high research priority | active_new | Create dedicated defense autonomy/counter-UAS desk prompt |\n| neocloud-data-center-financing | Neoclouds, AI data-center financing, and project-finance fragility | high research priority, high risk | active_new | Split neocloud/project-finance work out of hyperscaler desk |\n| biotech-metabolic-diagnostics-platforms | Selective biotech/health-tech platforms: obesity/metabolic, gene editing, diagnostics/device software | medium research priority; small specialist sleeve | active_new | Build catalyst ledger for ZEAL/GPCR/NTLA/VKTX/TEM/GH/IRTC |\n| stablecoin-tokenization-fintech-rails | Stablecoin, tokenization, and agentic fintech rails | emerging research priority; needs dedicated scout before conviction | watch_new | Create stablecoin/tokenization rails scout prompt |\n\n## Source quality ledger\n| Source | Type | Score | Bias risk | Use |\n|---|---|---:|---|---|\n| SEC EDGAR / company filings | primary | 5 | low | Fact base for financials, dilution, risks, contracts, concentration, and management claims. |\n| Company IR pages and earnings transcripts | primary | 5 | medium | Official claims and numeric guidance; must still be cross-checked against customer/supplier evidence. |\n| SemiAnalysis / Dylan Patel ecosystem | specialist research | 4 | medium | High-signal technical and industry framing; use for thesis discovery and technical validation. |\n| Leopold Aschenbrenner / Situational Awareness LP | investor/thematic source | 3 | medium-high | Thematic framing and 13F/portfolio-lead discovery, not direct evidence by itself. |\n| Serenity / @aleabitoreddit | social expert / lead generator | 3 | high | Lead generation for obscure chokepoints and thesis maps. |\n| BEP Research | Substack candidate | 3 | unknown | Candidate specialist source; evaluate over time. |\n| Vik's Newsletter | Substack candidate | 3 | unknown | Engineering-depth candidate source. |\n| Jason's Chips | Substack candidate | 3 | unknown | Candidate source for AI photonics and CPO debate. |\n| Serenity trackers / fan archives | secondary tracker | 2 | high | Discovery only; never conviction. |\n| HFI Research | specialist Substack / energy research | 3 | medium-high | Energy and commodity lead generation, especially gas/LNG/power-burn setup that can affect AI power-infra names. |\n| Cignal AI | specialist market research | 4 | medium | High-value technical/market map for optical component supply chain and private/startup ecosystem; useful for checking social photonics claims. |\n| IEEE ComSoc Technology Blog | technical industry blog / source aggregator | 3 | low-medium | Technical context and curated official-source links for networking/fiber developments. |\n| Goldman Sachs Research public AI infrastructure pages | public sell-side / IB research excerpts | 4 | high | Publicly available model anchors and consensus/crowding check for AI infrastructure TAM, optical networking, and power-demand forecasts. |\n| Morgan Stanley Research public data-center financing report | public sell-side / credit research excerpt | 4 | high | Useful framework for AI infrastructure capital-stack fragility and private-credit/securitization bottlenecks. |\n| Bank of America Institute AI data-center resource reports | bank research institute / thematic data | 4 | medium-high | Good source for overlooked resource constraints such as water, cooling, copper/metals, and local permitting risk. |\n| MUFG Capital Markets Strategy AI bottlenecks work | bank capital-markets strategy | 3 | medium-high | Broad cross-asset framing for AI bottlenecks and financing regimes; useful for checklist building. |\n| Damnang / @damnang2 | Substack / social technical investor | 3 | high | Useful framework/lead generator for mapping physical bottlenecks and public tickers across AI infrastructure layers. |\n| PhotonEra / @photon_era | technical photonics explainer / social expert | 3 | medium | Technical explainer to sanity-check photonics terminology and identify which component claims are technically plausible. |\n| Lithos Graphein / @lithos_graphein | social/substack lithography specialist | 3 | medium | Technical sanity check and lead generator for ASML/lithography/export-control rumors. |\n| Conflict Radar / @conflict_radar | social geopolitical/conflict monitor | 2 | high | Early-warning feed only for geopolitical/oil-shipping leads that may affect energy and defense themes. |\n\n## X / social lead sources\n| Handle | Name | Weight | Notes |\n|---|---|---|---|\n| @semianalysis_ | SemiAnalysis / Dylan Patel ecosystem | high |  |\n| @damnnang2 | damnnang2 | medium |  |\n| @photon_era | photon_era | medium |  |\n| @lithos_graphein | lithos_graphein | medium |  |\n| @conflict_radar | Conflict Radar | medium |  |\n| @marcusmilione | Marcus Milione | medium |  |\n| @aleabitoreddit | Serenity | medium | User says grain of salt. Treat as lead generator unless corroborated by filings, transcripts, orders, or primary data. |\n\n## Candidate research sources to evaluate\n| Name | Status | Initial score | URL |\n|---|---|---:|---|\n| BEP Research | candidate | 3 | https://bepresearch.substack.com/ |\n| Vik's Newsletter | candidate | 3 | https://www.viksnewsletter.com/ |\n| Jason's Chips | candidate | 3 | https://www.jasonschips.ai/ |\n| Crucible Capital | candidate | 3 | https://cruciblecapital.substack.com/ |\n| Capital Regime Intelligence | candidate | 2 | https://capitalregimeintelligence.substack.com/ |\n| The Semiconductor Newsletter | candidate | 2 | https://thesemiconductornewsletter.substack.com/ |\n| Value & Momentum Portfolio | candidate | 2 | https://denisdoroshenko.substack.com/ |\n| Serenity Tracker | candidate_secondary_only | 2 | https://serenitytrades.com/ |\n| Semicon Stocks / Serenity Tracker | candidate_secondary_only | 2 | https://semiconstocks.com/ |\n\n## Open diligence queue\nSee `diligence_queue.md` for the full worklist. Top priorities:\n- AAOI underwriting package\n- Optical bottleneck basket comparison\n- Power/grid AI infrastructure basket\n- Source quality buildout\n- 13F / fund tracking", "summary": "Investment Research Dashboard Generated: 20260708 07:59 Focus Broad publicmarket hypergrowth opportunities across sectors"}, {"id": "scorecard", "title": "Active Sleeve Scorecard", "category": "Core Research", "source": "active_sleeve_scorecard.md", "updated": "2026-07-06T10:13:00", "content": "# Active Sleeve Hypergrowth Scorecard\n\nPurpose: convert the research desk into an actionable decision grid for Leemer's concentrated active sleeve. This is decision support, not trade execution.\n\nLast initialized: 2026-07-06\n\n## Current stance\n\nThe desk should not overfit to AAOI/semis. Current best opportunity clusters from the multi-desk run:\n\n1. Power/grid/data-center infrastructure — strongest physical bottleneck evidence.\n2. CoWoS/HBM/advanced packaging — scarcity economics, but cyclical risk varies by name.\n3. Optical/SerDes/networking — still high-upside, but AAOI is now execution/dilution-sensitive.\n4. AI apps/cyber/defense — revenue/procurement proof matters more than AI narrative.\n5. Biotech/platform/life-science tools — deserves small specialist coverage; higher idiosyncratic risk.\n\n## Scorecard\n\n| Name | Theme | Current desk stance | Add only if | Risk-reduce / avoid if | Next catalyst/check | Evidence quality |\n|---|---|---|---|---|---|---|\n| AAOI | AI optics / transceivers | Thesis alive, but not center-of-gravity; trade-grade until margin/dilution improves | Q2/Q3 shows datacenter revenue acceleration, GM >30-32%, no new dilution/AR stress | GM sub-30%, share count rises, AR/customer concentration worsens, hyperscaler pushout | Q2 print, Q3 1.6T shipment proof, share-count update | Medium-high: official orders/guidance, but execution gap large |\n| CRDO | SerDes / AI connectivity | High-quality chokepoint candidate; price move needs confirmation | Customer diversification + revenue acceleration + volume-backed breakout | Multiple expands without order/revenue proof | Next earnings, customer wins, volume confirmation | Medium-high |\n| LITE | Optical components | Better quality than module-only names; watch for pullback | Evidence of 200G/lane/1.6T laser scarcity and margin leverage | Commodity optics pricing pressure / weak AI mix | Earnings, AI optical order commentary | Medium |\n| GEV | Power equipment | Top-tier power/grid candidate; strong order/backlog read-through | Backlog converts to margin and data-center orders remain strong | Data-center orders slow or backlog fails to convert | Orders, margins, gas/grid equipment commentary | High |\n| VRT | Data-center power/cooling | High-conviction theme; valuation/crowding watch | AI backlog and margins keep expanding | Growth decelerates while multiple stays extreme | Backlog, orders, margin guide | High |\n| PWR | Grid construction / electrical infra | Strong infrastructure beneficiary; less pure but durable | Backlog/revenue visibility confirms AI/grid demand | Labor/permitting slows conversion or margins compress | Backlog conversion, utility/large-load projects | High |\n| ETN | Electrical equipment | Quality compounder exposure to power bottleneck | Orders/lead times stay tight, AI/data-center mix expands | Valuation prices perfect execution | Segment orders/margins | High |\n| TSM | CoWoS / foundry scarcity | Cleaner scarcity-rent holder than most AI supply-chain names | CoWoS allocation/pricing remains tight | Alternative packaging/workaround reduces bottleneck economics | CoWoS capex/pricing, hyperscaler/NVDA roadmap | High |\n| MU | HBM / memory | High torque, high cycle risk | HBM pricing holds and capex discipline remains | 2027 oversupply signs / capex runs ahead of demand | HBM4 ramp, pricing, capex commentary | High for numbers, medium for durability |\n| PLTR | AI apps / defense / enterprise | Actual AI monetization candidate, valuation sensitive | Revenue acceleration, NRR/contracts justify multiple | Multiple outruns growth, government/commercial slowdown | AIP adoption, contract growth, margins | Medium-high |\n| PANW | AI cybersecurity | Quality AI-app/cyber exposure, less explosive | AI security demand converts into billings/FCF | Billings/growth slows with premium multiple | Billings, NGS ARR, AI security attach | High |\n| IONS | RNA platform biotech | Non-AI asymmetric candidate; verify post-approval launch traction | Olezarsen launch/access confirms peak-sales path | Label/payer restrictions, royalty dependence, litigation/dilution | FDA/launch update, revenue guide, payer access | High after approval, but needs launch proof |\n| RXRX | AI drug discovery platform | Structurally interesting mispricing, not yet de-risked | Partner milestones + FDA pathway progress validate platform | Cash burn/running runway worsens, asset failures undermine platform | REC-4881 FDA engagement, milestones, burn | Medium |\n| KTOS | Defense/autonomy | Keep on desk; procurement proof needed | Contract/backlog acceleration in drones/autonomy/defense tech | Defense narrative outruns funded programs | Contracts, backlog, margins | Medium |\n\n## Daily use\n\nEach morning CIO note should answer:\n\n1. Which names moved up/down the scorecard?\n2. Which add-only-if conditions were met?\n3. Which risk-reduce conditions appeared?\n4. What new opportunity deserves a desk?\n5. What desk should be reduced or fired?\n\n## Immediate research queue\n\n1. Verify IONS olezarsen approval / launch setup from primary source.\n2. Build AAOI dilution and gross-margin threshold sheet.\n3. Compare GEV/VRT/PWR/ETN on backlog conversion and valuation.\n4. Build CRDO/LITE/AAOI optical chokepoint comparison.\n5. Add a discovery process for non-AI hypergrowth themes so the desk does not stay overfit.", "summary": "Active Sleeve Hypergrowth Scorecard Purpose: convert the research desk into an actionable decision grid for Leemer's concentrated active sleeve. This is decision support, not trade execution. Last initialized: 20260706 …"}, {"id": "team", "title": "Analyst Team Charter", "category": "Core Research", "source": "analyst_team.md", "updated": "2026-07-06T09:52:09", "content": "# Investment Research Analyst Team\n\nPurpose: run Leemer's investment research as a small specialist desk, not a generic single-agent news summary.\n\n## Architecture\n\n1. Broad hypergrowth scout starts with the full public-market opportunity set.\n2. Specialist analyst jobs investigate current high-probability/high-asymmetry verticals.\n3. A desk-manager job evaluates the team, recommends hiring/firing/reweighting, and detects overfitting.\n4. The daily synthesis job consumes all specialist outputs plus feeds/news/filings.\n5. The phone-facing CIO note consumes the synthesis and tells Leemer what it means for positioning, risk, and next actions.\n\nAI infrastructure is a major current hypothesis, not the entire mandate. The desk should actively search for better hypergrowth opportunities outside semis/AAOI and reallocate attention when evidence warrants.\n\n## Analyst desks\n\n### 1. Optical / AI networking specialist\nCoverage: AAOI, LITE, COHR, CRDO, MRVL, AVGO, ANET, GLW, FN; 800G, 1.6T, CPO, DSPs, lasers, modules, Ethernet fabrics.\n\nOutcome: determine whether the optics thesis is strengthening, weakening, crowded, or mispriced. Explicitly answer what it means for AAOI and alternatives.\n\n### 2. Semis / HBM / accelerator supply-chain specialist\nCoverage: NVDA, MU, TSM, ASML, AVGO, MRVL, HBM, CoWoS, advanced packaging, accelerator roadmaps, export controls.\n\nOutcome: identify supply bottlenecks, cycle risk, capex/roadmap changes, and which public names actually capture economics.\n\n### 3. Power / grid / data-center infrastructure specialist\nCoverage: VRT, ETN, PWR, GEV, CEG, VST, NVT, GNRC, SMR, gas/midstream where relevant; transformers, switchgear, cooling, grid interconnects, BYOG.\n\nOutcome: separate real order/backlog beneficiaries from narrative beneficiaries and flag the highest-asymmetry power-infra ideas.\n\n### 4. Hyperscaler capex / financing / demand specialist\nCoverage: Microsoft, Amazon, Google, Meta, Oracle, CoreWeave, Nebius, Crusoe, xAI, OpenAI infra partners; capex, leases, financing, utilization, ROI stress.\n\nOutcome: infer whether AI buildout demand is accelerating, digesting, or becoming financially fragile.\n\n### 5. Source intelligence / funds / social specialist\nCoverage: SemiAnalysis, HFI, Aschenbrenner/Situational Awareness LP, Serenity/@aleabitoreddit, X handles, Substacks, public sell-side notes, 13F changes, hedge fund letters.\n\nOutcome: discover sources, score reliability, catch new leads, and prevent social-media thesis laundering.\n\n## Output standard for every specialist\n\nUse outcome-first analyst format:\n\n1. Desk conclusion: one blunt paragraph.\n2. What changed: only material evidence.\n3. What it means for Leemer: implications for concentrated active sleeve and watchlist.\n4. Best ideas / avoid list: ranked, with why.\n5. Math/checks that matter: valuation, margins, backlog, capex, dilution, or downside.\n6. Green lights and thesis-breakers: falsifiable.\n7. Evidence quality: source score and missing data.\n\nNo generic market recap. No “AI is growing” filler. No vague opportunities. If the desk cannot support a claim, label it as unverified.", "summary": "Investment Research Analyst Team Purpose: run Leemer's investment research as a small specialist desk, not a generic singleagent news summary. Architecture 1. Broad hypergrowth scout starts with the full publicmarket op…"}, {"id": "queue", "title": "Diligence Queue", "category": "Core Research", "source": "diligence_queue.md", "updated": "2026-07-08T07:59:38", "content": "# Diligence Queue\n\nUse this as the active IB analyst worklist. Items should be promoted/demoted based on evidence quality, asymmetry, and catalyst timing.\n\n## Priority 0 — Research apparatus / anti-overfit buildout\n\nGoal: keep the analyst system from collapsing into AAOI/semis and force primary-evidence discipline across desks.\n\nTasks:\n- Build a machine-readable claim ledger: claim, source, source score, primary evidence, verification date, status, and investment impact.\n- Populate company models for AAOI, VST, GEV, PLTR, AVAV, AXON, RBRK, ZEAL/GPCR/NTLA/TEM.\n- Add a desk scorecard: primary evidence density, math quality, novelty, thesis-breaker clarity, and anti-overfit value.\n- Upgrade trigger watcher from price-only alerts to filing/news triggers: dilution, guidance, customer pushout, backlog/RPO change, FDA/reimbursement, DoD awards, utility tariff/PPA filings.\n- Create/split desk prompts for defense autonomy/counter-UAS, neocloud/data-center financing, and stablecoin/tokenization rails.\n- Pause humanoid/robotics public-market coverage unless revenue/customer contracts are primary-source verified.\n\n## Priority 1 — AAOI underwriting package\n\nGoal: decide whether AAOI is merely a volatile AI-optics trade or a durable asymmetric compounder candidate.\n\nTasks:\n- Pull latest 10-Q/10-K, earnings transcript, IR deck, and press releases.\n- Build revenue bridge: CATV vs datacenter, 800G vs 1.6T, known orders vs implied run-rate.\n- Track share count/dilution, cash, debt, inventory, AR/DSO, customer concentration.\n- Build valuation sensitivity: EV/sales and EV/EBIT under bull/base/bear FY26-FY27 revenue and gross margin scenarios.\n- Identify thesis-breaker thresholds: missed Q guide, GM <30%, AR concentration worsening, order pushout, customer loss.\n\n## Priority 2 — Optical bottleneck basket comparison\n\nNames: AAOI, LITE, COHR, MRVL, AVGO, ANET, CRDO, FN if relevant.\n\nTasks:\n- Map value chain: InP substrate → epi/lasers → DSP/PIC → module assembly → switch/networking systems.\n- Identify where scarcity rent accrues.\n- Compare customer concentration, margin leverage, backlog visibility, valuation, and crowding.\n- Produce ranked basket: best asymmetry, best quality, best pullback candidate, avoid.\n\n## Priority 3 — Power/grid AI infrastructure basket\n\nNames to screen: VRT, ETN, PWR, GEV, CEG, VST, NVT, GNRC, SMR and other relevant suppliers/utilities.\n\nTasks:\n- Screen for explicit AI/datacenter backlog exposure.\n- Track utility tariffs and interconnection constraints.\n- Separate real order-book beneficiaries from narrative beneficiaries.\n- Build valuation/crowding table.\n\n## Priority 4 — Source quality buildout\n\nTasks:\n- For each candidate Substack/source, log 3 claims and whether they were later verified.\n- Promote sources that use primary data and make falsifiable claims.\n- Demote/ignore sources with repeated hype, no correction, or unverifiable claims.\n\n## Priority 5 — 13F / fund tracking\n\nTargets:\n- Situational Awareness LP if filings/credible reporting are available.\n- AI infrastructure specialist funds and hedge-fund letters.\n- Crowding in AAOI/LITE/COHR/MU/power-infra basket.\n\nTasks:\n- Build a repeatable 13F query process.\n- Track position changes by quarter.\n- Treat 13F as lagging evidence, not a trade signal by itself.", "summary": "Diligence Queue Use this as the active IB analyst worklist. Items should be promoted/demoted based on evidence quality, asymmetry, and catalyst timing. Priority 0 — Research apparatus / antioverfit buildout Goal: keep t…"}, {"id": "sources", "title": "Source Registry", "category": "Core Research", "source": "sources.json", "updated": "2026-07-06T09:52:07", "content": "# Source Registry\n\n```json\n{\n  \"version\": 1,\n  \"focus\": [\n    \"Broad public-market hypergrowth opportunities across sectors\",\n    \"AI infrastructure and inference buildout\",\n    \"AI applications, autonomy, robotics, defense technology, and edge AI\",\n    \"optical networking and transceivers\"  Domain expert with a record of specific, falsifiable calls.\n- Uses filings, supply-chain checks, channel data, or technical teardown evidence.\n- Separates facts from inference.\n\n### 3 — Useful lead generator\n- Smart market participant, Substack, X account, podcast, or analyst summary.\n- Often points toward useful themes but needs corroboration.\n- Can influence the research queue, not conviction by itself.\n\n### 2 — Narrative / weakly evidenced\n- Mostly opinion, screenshots, vibes, or secondhand claims.\n- Useful only as sentiment/context.\n\n### 1 — Promotional / conflicted / unreliable\n- Pump-like behavior, no track record, paid promotion, no falsifiable claims.\n- Do not use for conviction except as a contrary/crowding signal.\n\n### 0 — Ignore\n- False, manipulative, plagiarized, or repeatedly wrong without correction.\n\n## Required checks for investment claims\n\nFor any high-conviction candidate, the brief should try to verify:\n\n1. **What is the primary evidence?** Filing, transcript, order, capex number, customer announcement, industry dataset.\n2. **What is the claim?** Growth, margin, capacity, customer win, supply shortage, regulatory shock, valuation dislocation.\n3. **Can the math work?** Revenue bridge, margin sensitivity, valuation multiples, downside case, dilution/share count.\n4. **What is the counterparty / customer / supplier evidence?** Is the demand visible outside the company’s own statements?\n5. **What would falsify it?** Missed guidance, margin failure, inventory/AR build, customer loss, supply glut, capex cut.\n6. **How crowded is it?** Price move, consensus, 13F interest, social sentiment, valuation stretch.\n7. **What is the timeframe?** Catalyst in days/weeks/months; avoid vague “someday” theses.\n\n## Math discipline\n\n- Use live/current data when possible; if not available, label the data date.\n- Show rough calculations explicitly: market cap, EV/sales, revenue run-rate, margin bridge, EPS/EBIT sensitivity.\n- Never mix stale share counts with current prices without labeling it.\n- Treat social media claims as leads until checked against filings, transcripts, pricing, or reputable reporting.\n\n## Output requirement\n\nEvery daily brief should include a compact **Source & Evidence Quality** section:\n\n- Best source today, score, why.\n- Weakest source used, score, why it is only a lead.\n- Claims needing verification.\n- New sources discovered and whether they should be added, watched, or ignored.", "summary": "Source Quality Framework Use this to evaluate every recurring source before allowing it to influence conviction. Source score: 05 5 — Primary / hard evidence"}, {"id": "theses", "title": "Thesis Tracker", "category": "Core Research", "source": "thesis_tracker.json", "updated": "2026-07-08T07:59:12", "content": "# Thesis Tracker\n\n```json\n{\n  \"schema_version\": 2,\n  \"purpose\": \"Track investable theses, evidence quality, math status, catalysts, and thesis-breakers. Updated by desk-manager process so the research system does not overfit to AAOI/semis.\",\n  \"theses\": [\n    {\n      \"id\": \"ai-optical-800g-1p6t\",\n      \"theme\": \"AI datacenter optical networking bottleneck\",\n      \"status\": \"active_but_deweighted\",\n      \"conviction\": \"medium-high research priority; high torque but proof-dependent\",\n      \"summary\": \"AI cluster scaling pushes bandwidth and power-per-bit constraints into 800G/1.6T optics, lasers, DSPs, and optical modules. AAOI remains convex but execution, margins, AR, concentration, and dilution now dominate the underwriting.\",\n      \"primary_tickers\": [\n        \"AAOI\",\n        \"LITE\",\n        \"COHR\",\n        \"MRVL\",\n        \"AVGO\",\n        \"ANET\",\n        \"CRDO\",\n        \"GLW\",\n        \"CSCO\"\n      ],\n      \"evidence_to_collect\": [\n        \"800G/1.6T order announcements and actual shipment timing\",\n        \"Gross margin and mix shift evidence, especially AAOI GM above 30-32%\",\n        \ e stablecoin/tokenization rails scout prompt\",\n        \"Build CRCL/COIN/HOOD comparison using filings and stablecoin supply data\",\n        \"Avoid generic crypto until fundamental rails economics are proven\"\n      ]\n    }\n  ]\n}\n```", "summary": "Thesis Tracker json { \"schema_version\": 2,"}, {"id": "rubric", "title": "Opportunity Rubric", "category": "Core Research", "source": "rubric.md", "updated": "2026-07-04T14:00:10", "content": "# Exponential Growth Opportunity Rubric\n\nScore each candidate 0-5 in each category. Prefer evidence over narrative.\n\n## 1. Demand inflection\n- 0: no visible demand growth\n- 3: credible growth, but broadly known\n- 5: accelerating demand with hard evidence: orders, backlog, capex, utilization, shortages, customer ramps\n\n## 2. Supply-chain leverage\n- 0: commoditized exposure\n- 3: supplier to a strong cycle\n- 5: bottleneck or scarce capability with pricing/margin leverage\n\n## 3. Timing / catalyst density\n- 0: no clear near/medium-term catalyst\n- 3: earnings/product cycle/regulatory event within 3-9 months\n- 5: multiple imminent catalysts with asymmetric repricing potential\n\n## 4. Valuation versus growth\n- 0: priced for perfection\n- 3: reasonable if growth persists\n- 5: market appears underpricing growth, margin expansion, or cycle duration\n\n## 5. Balance sheet / dilution risk\n- 0: solvency/dilution concern\n- 3: manageable but watch debt/capex\n- 5: strong balance sheet or self-funding growth\n\n## 6. Competitive durability\n- 0: weak moat, customer concentration risk extreme\n- 3: some differentiation but alternatives exist\n- 5: technical/customer/scale advantage likely to persist\n\n## 7. Market awareness / crowding\n- 0: consensus darling with stretched expectations\n- 3: known but not euphoric\n- 5: underfollowed, misunderstood, or dislocated despite improving evidence\n\n## 8. Thesis-breaker clarity\n- 0: no clear falsification criteria\n- 3: some clear metrics to watch\n- 5: explicit thesis-breakers with data sources and timeline\n\n## Output buckets\n\n- 34-40: High-priority diligence candidate.\n- 27-33: Watchlist / wait for price or confirming evidence.\n- 20-26: Interesting but incomplete.\n- <20: Avoid unless new evidence appears.\n\nAlways include: key evidence, counterargument, what would change the view, and confidence level.", "summary": "Exponential Growth Opportunity Rubric Score each candidate 05 in each category. Prefer evidence over narrative. 1. Demand inflection 0: no visible demand growth"}, {"id": "aaoi-model", "title": "AAOI Model Skeleton", "category": "Core Research", "source": "models\\AAOI.md", "updated": "2026-07-06T17:14:29", "content": "# Company Model — AAOI\n\n## 1. Snapshot\n\n- Company: Applied Optoelectronics, Inc.\n- Ticker: AAOI\n- Theme: AI datacenter optical transceivers, 800G/1.6T, photonics supply chain.\n- Current price/date: TBD — must be refreshed from market data before use.\n- Market cap: TBD.\n- Cash: TBD from latest filing.\n- Debt: TBD from latest filing.\n- Enterprise value: TBD.\n- Shares outstanding / diluted share count: TBD from latest 10-Q / latest filing.\n- Source/date for financial data: TBD.\n\n## 2. Thesis\n\n### Core claim\nAAOI is a high-torque public-market exposure to the AI datacenter optical transceiver upgrade cycle, especially 800G and 1.6T, with potential operating leverage if hyperscaler orders convert into shipments and margins expand.\n\n### Why now\nThe market is repricing AI infrastructure beyond GPUs into bandwidth, optical interconnects, power-per-bit, and supply-chain bottlenecks. AAOI has direct company-reported order/capacity claims that need active verification.\n\n### Variant perception\nThe bullish variant view is that AAOI is not a low-quality telecom/CATV cyclical but an underwritten AI optical ramp with step-function revenue growth. The bearish variant view is that valuation has already outrun execution and customer concentration/margins/dilution make the setup fragile.\n\n## 3. Evidence to verify\n\n| Claim | Needed source | Status |\n|---|---|---|\n| 800G order size and customer quality | Press release, transcript, 10-Q, customer/channel corroboration | Open |\n| 1.6T order timing and shipment ramp | Press release, transcript, later shipment evidence | Open |\n| Capacity ramp to target units/month | IR/transcript, capex, manufacturing footprint evidence | Open |\n| Gross margin expansion with datacenter mix | Quarterly financials | Open |\n| Customer concentration risk | 10-Q customer concentration and AR | Open |\n| Dilution/share count trajectory | 10-Q, S-3/ATM/convertible details if any | Open |\n\n## 4. Revenue bridge skeleton\n\n| Driver | Bear | Base | Bull | Evidence |\n|---|---:|---:|---:|---|\n| 800G shipments | delayed / lower ASP | guide-consistent | faster volume ramp | TBD |\n| 1.6T shipments | pushout | Q3/Q4 ramp | strong hyperscaler pull-forward | TBD |\n| CATV/HFC | drag | stable | upside from broadband upgrade | TBD |\n| Gross margin | <30% | 30-35% | >35% | TBD |\n\n## 5. Key thesis-breakers\n\n- Q2/Q3 guide fails to show datacenter shipment acceleration.\n- Gross margin stays below/near 30% despite mix shift.\n- Inventory or AR grows materially faster than revenue.\n- Customer concentration worsens or collection risk rises.\n- Share count/dilution offsets operating progress.\n- Competitor pricing/capacity normalizes optical shortage sooner than expected.\n\n## 6. Next model tasks\n\n1. Pull latest AAOI 10-Q and compute fresh cash/debt/share count.\n2. Pull latest price and calculate market cap/EV.\n3. Build FY26/FY27 revenue scenarios from disclosed order book and guidance.\n4. Build gross margin sensitivity table.\n5. Compare AAOI against LITE/COHR/MRVL/AVGO/CRDO on scarcity-rent capture.", "summary": "Company Model — AAOI 1. Snapshot Company: Applied Optoelectronics, Inc. Ticker: AAOI"}, {"id": "semis-note", "title": "Semis/HBM Note", "category": "Core Research", "source": "notes\\semis-hbm-accelerator-note-2026-07-06.md", "updated": "2026-07-06T09:45:37", "content": "# Semis / HBM / Accelerator Supply-Chain Desk — Pre-Market Analyst Note\n**Date:** Monday, July 6, 2026  \n**Author:** AI Supply-Chain Specialist Desk  \n**For:** Leemer Investment Research  \n**Sources consulted in this run:** investment-research/analyst_team.md, sources.json, source_ledger.json, thesis_tracker.json, diligence_queue.md, trigger_rules.json, plus live web evidence from SemiAnalysis-adjacent research, company IR references, and industry analysts. State files in `investment-research/state/` show a recent collector smoke test on 2026-07-06; no new fresh alert was found in state.\n\n---\n\n## 1. Desk Conclusion — One Paragraph\n\nThe bottleneck has migrated. **CoWoS advanced packaging is now the binding supply constraint**, not just HBM. TSMC is effectively rationing CoWoS to NVIDIA, who has booked ~60% of global 2026 CoWoS demand. HBM pricing remains tight but the risk is shifting to memory-cycle normalization in 2027. The investable public names with the clearest economics are **TSMC** (scarcity rent from packaging), **Micron** (best-positioned HBM/EUV supply), and **ASML** (still rising AI-led cycle with a known China overhang). **NVIDIA is the demand engine, not the bottleneck holder.** Broadcom and Marvell have real custom-silicon demand, but their earnings are hostage to hyperscaler capex discipline. The main cycle risk: capex-led overbuild, especially in memory, by late 2026 into 2027.\n\n---\n\n## 2. What Changed — Material Evidence Only\n\n### 2.1 CoWoS Is Sold Out Through 2026, and NVIDIA Owns Most of the Line\n- Reported credible trade/industry sources place TSMC CoWoS capacity at roughly 60k wpm in 2025, expanding toward 120k–130k wpm by end-2026. Demand is running 40–50% ahead of capacity for leading-edge GPU/AI packages.\n- NVIDIA has been attributed with booking 800k–850k CoWoS wafers for 2026, roughly 60% of global demand, leaving <15% for all other customers. Result: other accelerator customers are effectively locked out of leading-edge CoWoS-S/L availability.\n- CoWoS wafer pricing has reportedly increased 15–20% in recent sell-side discussions. TSM is capturing this rent directly; NVIDIA absorbs it as higher COGS unless they pass it through in pricing.\n- **Implication:** The bottleneck is not compute design or architecture; it is advanced packaging. The monopolistic holder is TSMC.\n\n### 2.2 HBM Remains Structurally Tight, but Cycle Late-Cycle Risks Are Emerging\n- SK Hynix, Samsung, and Micron are all selling out near-term HBM allocations. Industry sources report DRAM/HBM inventory at Samsung and SK Hynix in the 3–5 week range, well below normal 6–8 week comfort levels.\n- Samsung HBM4 mass production has been pushed back, with meaningful volumes now targeting 3Q26 vs. earlier expectations. Micron’s HBM4 12-high ramp is tracking twice as fast as HBM3E 12-high, and Micron management in recent quarters said it has shipped over $1B in HBM4 revenue already.\n- Pricing: HBM3E 12-high unit price negotiations for 2026 are expected in the $1.56–$1.74/Gb range. HBM4 continues pricing at premium, reflecting qualification and supply-control discipline.\n- Micron raised fiscal 2026 capex to ~$20B (from ~$18B earlier), driven by HBM/EUV expansion. FCF generation is strong now, but this capex level risks creating depreciation hangover and margin compression if pricing normalizes in 2027.\n\n### 2.3 NVIDIA: Record Revenue, But Packaging Cost Is the Margin Watch Item\n- NVIDIA’s recent quarterly data center revenue has been reported in the ~$75B vicinity for a single quarter, with full-year fiscal 2026 trajectory well above prior peak years. Blackwell is dominant; Hopper is sunsetting in production mix.\n- The main margin watch item is not HBM availability—it is **CoWoS price pass-through**. If packaging cost rises 15–20% YoY and NVIDIA cannot fully offset via ASP increases or design efficiency, gross margin expansion could face a ceiling even as revenue grows.\n- Rubin roadmap commentary is sparse on HBM memory content per accelerator; assume continued high HBM content per GPU, but do not over-margin from it until confirmed.\n\n### 2.4 TSMC: 3nm/2nm Booked, CoWoS Sold Out, 2026 Revenue Growth ~30%\n- TSMC’s leading-edge foundry business is fully booked 18–24 months out. CoWoS capacity expansion to ~127k wpm is ongoing; nontraditional OSAT competitors are expanding but lag TSMC in yield and design complexity.\n- Revenue guidance implies ~30% YoY growth, with AI-related wafer demand dominating. AI compute customers are accepting price premiums for guaranteed allocation.\n\n### 2.5 ASML: Strong Cycle, but China Exposure Is a Known and Escalating Political Risk\n- ASML raised 2026 revenue guidance into the ~$42–46B range on AI-driven semiconductor equipment demand. The base case does not include a China export-control meltdown.\n- China historically accounted for ~20–33% of ASML sales in recent periods; management guided for ~20% in 2026. New U.S.-led proposals such as the MATCH Act could further restrict legacy equipment and service, but should not immediately remove access to EUV (which has already been denied to China for years).\n- Bear scenario for ASML: China sales drop from ~20% toward low-teens if new restrictions narrow the sales/service envelope. In a ~$45B revenue base, that is a real revenue gap, but it is not a 2026 event unless Congress acts faster than expected. Avoid treating China ASML sales as a soft target; it is a real tail risk with a binary political trigger.\n\n### 2.6 Custom AI ASICs: Broadcom and Marvell Are Real, Not Speculative\n- Broadcom custom AI silicon revenue has been reported in the ~$8.4B–$10.8B quarterly range in recent quarters, with management context guiding to ~$30B for full-year fiscal 2026. Google, Meta, and OpenAI-related programs dominate.\n- Marvell’s custom ASIC revenue trajectory is similarly strong. Amazon (Trainium), Microsoft (Maia), and Meta programs are in active qualification and ramp. FY2027 consensus-build toward $11–12B total Marvell revenue implies ~40% YoY; data-center revenue growing similarly.\n- **Caveat:** Broadcom/Marvell custom-silicon demand is not a function of AI model economics—it is a function of hyperscaler capex budgets and competitive desire to reduce NVIDIA dependency. If hyperscalers cut capex, custom ASICs get cut first because they have no alternative use case and are usually capex-funded by the customer.\n\n---\n\n## 3. What It Means for Leemer\n\n- **Core active-sleeve implication:** TSM and MU are the clearest supply-side captures of AI buildout scarcity. NVDA benefits from demand velocity but not from margin expansion at the same rate as TSM/MU because NVIDIA is price-taker on HBM and CoWoS. AVGO and MRVL are viable diversified AI-exposure names with higher contractual visibility than commodity semiconductors but with customer-concentration risk.\n- **ASML is a high-conviction AI structural buy with a China probabilistic overhang**, not a clean risk-on trade. The base case is ~$45B+ revenue and AI cycle continuation; the bear case is a China revenue haircut that markets may pre-price if MATCH Act gains traction.\n- **Watch for these specific inflection points:**\n  - TSM guidance language on CoWoS pricing and allocation policies\n  - MU capex discussion in Q4/FY2026 earnings; if management signals 2027 capex > $22B, that is a yellow flag for future oversupply\n  - NVIDIA Rubin roadmap comments on HBM content and CoWoS substitute adoption\n  - Broadcom/Marvell customer commentary: Meta/Google capex trajectory\n  - ASML China guidance as a % of total sales; any cut below ~15% would signal deeper political erosion\n\n---\n\n## 4. Best Ideas / Avoid List — Ranked by Evidence Quality and Asymmetry\n\n| Rank | Ticker | Verdict | Evidence Quality | Why |\n|------|--------|---------|------------------|-----|\n| 1 | **TSM** | Best | High — industry data + capacity expansion reports | CoWoS scarcity rent, 2nm/3nm sold out, geographic diversification. The only name with direct pricing power on AI packaging. |\n| 2 | **MU** | Best with caveat | Medium-High — company earnings + industry sources | HBM discipline is working; HBM4 ramp is faster than expected. BUT capex is rising sharply; verify depreciation assumptions and FY2027 margin flex. |\n| 3 | **NVDA** | Core holding, but supply constrained | High — earnings/transcripts | Best demand capture, but CoWoS pricing is a margin leakage point. Next-gen roadmap and HBM content per chip are the key variables. |\n| 4 | **AVGO** | Best custom silicon, crowded | Medium-High — earnings context + customer programs | $30B AI silicon target is aggressive but directionally supported. VMware integration and ASIC customer concentration are the main risks. |\n| 5 | **MRVL** | Good growth, higher beta | Medium — earnings context + customer qualification | Fastest top-line growth rate in AI custom chips, but narrower margin, higher customer concentration, and competition from Broadcom/Intel. |\n| 6 | **ASML** | Structural, but China overhang | High — earnings + regulatory filings | Best secular AI infrastructure name if China risk is contained. Avoid if you expect MATCH Act passage to accelerate in 2026. |\n| — | **Samsung / SK Hynix** | Avoid / Watch from distance | Medium — industry sources | Samsung HBM4 delay and pricing pressure make Samsung memory less compelling. SK Hynix is tight now but has not proven HBM4 leadership. Without direct public filing access, stay out. |\n\n---\n\n## 5. Decision Math — What We Can Defend\n\n> **Boundary:** The desk should not invent forward multiples or share prices. The points below are quantifiable claims based on the evidence collected. Exact current P/E or EV/EBITDA figures are not verified in today’s retrieved data and are labeled UNVERIFIED.\n\n| Factor | Evidence | Implication |\n|--------|----------|-------------|\n| **CoWoS supply/demand gap** | ~40–50% excess demand over current capacity; ~120–130k wpm by end-2026 from lower base | TSM pricing power + margin expansion; NVIDIA absorption cost |\n| **HBM unit pricing** | $1.56–$1.74/Gb for HBM3E 12-high in 2026 negotiations; HBM4 premium pricing intact | MU revenue/margin sensitive to volume; supports ~$20B+ capex if ASP holds |\n| **HBM mix sensitivity** | Micron Q3 FY2026 and Q4 guidance reportedly show gross margin flex from HBM mix | High HBM% in DRAM mix lifts MU margins, but only if pricing holds |\n| **Capex trajectory** | MU FY2026 capex guided ~$20B; TSM/ASML capex also elevated | Elevated capex creates a 2027 overbuild risk if demand digestion emerges |\n| **Memory downside scenario** | If HBM pricing normals and capex leads to oversupply in 2027, prior DRAM cycle peak-to-trough downside can exceed 40–50% from peak EPS | MU at extremes of cycle has downside risk; position sizing should reflect this |\n| **NVIDIA margin fence** | CoWoS wafer price +15–20% is one of a few significant cost vectors in GPU BOM | Upside is demand-driven revenue; downside is packaging-driven cost |\n| **Broadcom custom silicon** | ~$30B FY2026 AI semiconductor revenue target implies ~60–70% growth | If Google/Meta capex holds, AVGO margins and cash generation remain exceptional |\n| **ASML China exposure** | Management guiding ~20% China in 2026; MATCH Act could cut this toward low-teens | Bear case single-year revenue impact could be $2–4B depending on enforcement timing |\n\n### Margin and Capex Sanity Check — Micron\n- Evidence supports: HBM4 ramp ahead of schedule, FCF $18.3B in Q3, strong GM guidance above 80%, capex rising to ~$20B.\n- **Structural scarcity test:** HBM has high qualification barriers (3 players globally), long customer qualification cycles, and is not a commodity DRAM. This gives MU a pricing umbrella even in a softening spot market.\n- **Cycle normalization downside:** If HBM ASP falls 30%+ and MU volumes are still high, EPS could drop materially in 2027–2028; the $20B capex will be depreciating while revenues normalize. This is a cyclical drawdown risk, not a structural failure.\n\n---\n\n## 6. Green Lights and Thesis-Breakers\n\n| Signal | Monitoring Point | Status |\n|--------|-----------------|--------|\n| **Green light: TSM CoWoS pricing power** | TSM CoWoS wafer price and allocation language in earnings | ✅ Supported by industry trade data |\n| **Green light: MU HBM4 execution** | MU HBM4 revenue milestone ($1B+) and ramp speed vs HBM3E | ✅ Company commentary confirmed in recent quarters |\n| **Green light: Custom ASIC demand** | AVGO/MRVL revenue contribution actual vs target ($30B/ $11–12B) | ✅ Company-level references support trajectory |\n| **Green light: AI compute demand durability** | Hyperscaler capex trajectory + NVDA Blackwell/Rubin demand signals | ✅ Mixed—strong for FY2026, watch for 2027 commentary |\n| **Watch: MU capex vs FCF** | If FY2026 capex > $20B without proportional revenue/margin expansion | ⚠️ Risk: depreciation hangover in FY2027 |\n| **Thesis-breaker: CoWoS alternative adoption** | If NVIDIA or customers successfully redefine architecture to reduce CoWoS wafers per GPU | 🔴 Would reprice TSMC/advanced packaging economics |\n| **Thesis-breaker: HBM oversupply** | If Samsung + SK Hynix + Micron combined capex leads to 2027 HBM oversupply and pricing cracks | 🔴 This is the main cycle risk for MU specifically |\n| **Thesis-breaker: ASML China escalation** | MATCH Act passage or Netherlands alignment to restrict equipment/service sales | 🔴 Would cut ASML China revenue by 5–10 pts from current guidance |\n| **Thesis-breaker: Hyperscaler capex discipline** | Meta/Google/MSFT capex commentary cuts | 🔴 AVGO/MRVL most exposed; NVDA/TSM less so if demand stays |\n\n---\n\n## 7. Evidence Quality and Missing Data\n\n| Claim | Evidence Quality | Source | Gap |\n|-------|-------------------|--------|-----|\n| TSMC CoWoS capacity and demand split | Medium-High — corroborated by multiple trade data points and analyst commentary | SemiAnalysis-adjacent research, LinkedIn industry posts, DigiTimes | Need official TSM capacity yield/expansion schedule |\n| NVIDIA CoWoS booked volumes | Medium — attributed in industry posts, not confirmed in NVIDIA filings | Industry sources | No primary NVIDIA filing confirming exact CoWoS allocation percentages |\n| MU HBM4 revenue(~$1B shipped) | High — directly referenced in company earnings call transcripts | Micron IR | Exact Q2/Q3 split UNVERIFIED; need transcript check |\n| MU FY2026 capex ~$20B | Medium — reported in analyst summaries and some video/print sources | Mixed sources | Need to confirm from latest Micron earnings transcript |\n| ASML China revenue percentage and MATCH Act impact | High — confirmed in ASML guidance and regulatory reporting | ASML IR + Reuters/FT coverage | Exact revenue-at-risk scenario in new policy UNVERIFIED; depends on legislative timing |\n| Broadcom/Marvell AI ASIC revenue trajectory | High — referenced in company-level earnings context and tech media | Company sources, tech-insider summaries | Exact customer-by-customer revenue split UNVERIFIED |\n| HBM pricing ($1.56–$1.74/Gb for 2026) | Medium — attributed to industry analysis and social commentary | Industry analysts/theorists | Price confirmation from actual SOURCE CONTRACT UNVERIFIED |\n\n---\n\n**Bottom line for the desk:** The structural bull case is intact, but it has moved up the stack—from silicon to packaging. TSM is the supply-side winner. MU is the supply-side memory winner but with the largest cyclical tail risk. ASML is a buy if you weight AI structural demand over China political risk. AVGO/MRVL are real demand short-cuts but derivative of hyperscaler budgets. Watch mu capex relative to HBM pricing and TSM CoWoS allocation language; those are the two variables most likely to re-price the whole AI supply chain in either direction.", "summary": "Semis / HBM / Accelerator SupplyChain Desk — PreMarket Analyst Note Date: Monday, July 6, 2026 Author: AI SupplyChain Specialist Desk For: Leemer Investment Research"}, {"id": "alert-2026-07-09_12-02-03", "title": "Alert 2026-07-09 12-02-03", "category": "Market Alerts", "source": "alerts/2026-07-09_12-02-03.md", "updated": "2026-07-09T12:02:03", "content": "# Investment Trigger Alerts — 2026-07-09 12:02 EDT\n\n## Level 3 — LITE price move trigger\n- Theme: optical components\n- Priority: high\n- Trigger: intraday move +12.36% vs threshold ±6.0%\n- Last price: 794.50\n- Change vs previous close: +12.36%\n- Change vs open: +5.21%\n- Volume: 3.02M; avg volume: 3.67M; volume ratio: 0.82x\n- Quote timestamp: 2026-07-09T12:01:48-04:00\n- Analyst next step: check filings/news/sector basket before treating this as thesis-relevant.\n\n## Level 2 — NTLA price move trigger\n- Theme: in-vivo gene editing\n- Priority: medium\n- Trigger: intraday move -7.13% vs threshold ±6.0%\n- Last price: 15.64\n- Change vs previous close: -7.13%\n- Change vs open: -5.73%\n- Volume: 3.73M; avg volume: 3.69M; volume ratio: 1.01x\n- Quote timestamp: 2026-07-09T12:01:42-04:00\n- Analyst next step: check filings/news/sector basket before treating this as thesis-relevant.", "summary": "Investment Trigger Alerts — 20260709 12:02 EDT Level 3 — LITE price move trigger Theme: optical components Priority: high"}, {"id": "alert-2026-07-09_11-31-41", "title": "Alert 2026-07-09 11-31-41", "category": "Market Alerts", "source": "alerts/2026-07-09_11-31-41.md", "updated": "2026-07-09T11:31:41", "content": "# Investment Trigger Alerts — 2026-07-09 11:31 EDT\n\n## Level 3 — IONS volume spike trigger\n- Theme: RNA platform biotech\n- Priority: medium\n- Trigger: volume 2.60x average vs threshold 2.5x\n- Last price: 66.23\n- Change vs previous close: -21.58%\n- Change vs open: -1.88%\n- Volume: 9.82M; avg volume: 3.78M; volume ratio: 2.60x\n- Quote timestamp: 2026-07-09T11:31:40-04:00\n- Analyst next step: check filings/news/sector basket before treating this as thesis-relevant.\n\n## Level 2 — CRDO price move trigger\n- Theme: AI c "cron/cb8832fa417e/2026-07-09_08-37-20.md — final response only", "updated": "2026-07-09T09:37:20", "content": "## 1. The actual read\n\n**Stance:** AI infra demand is still real and accelerating, but the best capital allocation read is **not “chase AAOI/semis.”** The hard evidence has shifted toward **power/grid backlog, defense/autonomy + AI apps, and neocloud financing fragility**. AAOI remains thesis-alive, but it is now an execution/dilution/customer-concentration trade until Q2/Q3 prove 800G/1.6T scale and margin leverage. No fresh market-trigger alert since the last watcher run; today’s change is desk-level reweighting, not a single ticker event.\n\n## 2. My analyst stance today\n\n**Aggressive research target**\n1. **Power/grid/data-center infra** — VRT, GEV, PWR, ETN, selective VST/CEG. Best hard-evidence bottleneck.\n2. **Defense autonomy + AI apps/cyber** — RBRK, APP, PLTR, KTOS/AVAV, AXON. Best non-infra expansion.\n3. **Neocloud/project finance** — CRWV, NBIS, IREN, CORZ. Huge upside, but this is credit-underwriting, not simple growth investing.\n\n**Hold thesis / do not chase**\n- **AAOI / optical networking:** thesis intact, but price volatility is ahead of proof.\n- **VRT/GEV/ETN:** high quality, but crowded after sharp theme moves.\n- **TSM/AVGO:** still strong scarcity/evidence names, but not “cheap AI beta.”\n\n**Add only if X happens**\n- **AAOI:** add only if Q2/Q3 show datacenter revenue acceleration, GM moving above **30–32%**, no AR/inventory blowout, no new dilution, and 1.6T shipment proof.\n- **CRDO/LITE/GLW:** add only on order/revenue confirmation or pullback; they now screen cleaner than AAOI inside optics.\n- **MU:** add only if HBM pricing and capex discipline stay intact despite Samsung HBM4 supply coming online.\n\n**Risk-reduce if Y happens**\n- AAOI GM stays sub-30%, share count rises again, AR/customer concentration worsens, or 1.6T slips.\n- Power names miss backlog-to-revenue conversion while multiples remain extreme.\n- Neocloud financing spreads widen / customer handoffs slip / interest burden rises faster than revenue.\n\n**Avoid for now**\n- Generic humanoid robotics.\n- Generic crypto/tokens.\n- Social-media photonics baskets without filings/order proof.\n- AI drug discovery “platform” claims without clinical translation.\n\n## 3. What this means for your concentrated active sleeve\n\nIf AAOI is still the concentrated active reference point, I’d treat it as **thesis alive but no longer center-of-gravity**. The sleeve risk is not “AI infra is fake.” It’s that AAOI could be the wrong public expression of a real buildout if margins, dilution, or customer concentration eat the upside.\n\nMy analyst view: **new active-sleeve capital should wait for either AAOI proof or a better risk/reward pullback in power/defense/apps.** The S&P/core sleeve can stay left alone. The active sleeve should become less single-name optics-dependent and more exposed to **multiple bottlenecks with hard evidence**: power equipment, grid construction, AI app monetization, defense procurement, and maybe TSM/AVGO scarcity economics.\n\n## 4. Ranked opportunities today\n\n1. **Power/grid/data-center infra — VRT, GEV, PWR, ETN; selective VST/CEG**  \n   Best evidence. Real orders/backlog, real lead-time constraints. Don’t chase theme spikes.\n\n2. **AI apps/cyber + defense autonomy — RBRK, APP, PLTR, KTOS, AVAV, AXON**  \n   Moved up. This is the cleanest anti-overfit bucket. RBRK/APP show actual AI monetization; KTOS/AVAV have funded procurement/backlog.\n\n3. **Neocloud/project finance — CRWV, NBIS, IREN, CORZ/APLD**  \n   Moved up as a fragility + upside desk. Needs debt/MW/utilization modeling before conviction.\n\n4. **Advanced packaging/custom silicon — TSM, AVGO; MU with caveat; ASML discounted**  \n   TSM is the cleaner scarcity-rent holder. AVGO AI revenue is proving real. MU is high torque but more cyclical now. ASML has a sharper China/MATCH Act overhang.\n\n5. **Optical/networking — LITE, CRDO, GLW, CSCO, AAOI**  \n   Demand is real. AAOI is highest torque but weakest proof-to-valuation. LITE/CRDO/GLW moved up versus AAOI.\n\n6. **Selective biotech/health-tech — TMDX, NTLA, BEAM, TEM; VKTX/RXRX speculative**  \n   Keep small. Good asymmetry, but binary/dilution risk needs strict sizing.\n\n7. **Stablecoin/tokenization rails — CRCL, COIN, HOOD**  \n   Watch/scout, not conviction yet. Needs regulation + float/take-rate math.\n\n## 5. Scorecard moves\n\n**Moved up**\n- **Power/grid** stays P0.\n- **Defense autonomy / AI apps / cyber** moved up meaningfully.\n- **Neocloud financing** moved up as its own desk.\n- **GLW/CSCO/LITE/CRDO** moved up inside optics because evidence is cleaner.\n- **TSM/AVGO** remain best semis/AI supply-chain quality.\n\n**Moved down / deweighted**\n- **AAOI** deweighted until shipment + margin proof.\n- **MU** slightly down/conditional: execution strong, but >$25B capex and Samsung HBM4 raise 2027 oversupply risk.\n- **ASML** down/discounted because MATCH Act servicing-ban risk could hit China revenue.\n- **Generic robotics / generic crypto / social photonics baskets** remain below bar.\n\n## 6. Decision math that matters\n\n- Hyperscaler capex envelope near **$725B in 2026**, roughly **+77% vs 2025**. Demand is not broadly digesting yet.\n- AAOI Q1: **$151.1M revenue**, data center **53.9%**, but 800G was only **$4.6M** — just **5.6% of data-center revenue**. Q2 guide GM only **29–30%**.\n- AAOI dilution: Q1 ATM raised **$382M net**; share count moved to ~**80.7M** guide assumption, about **7%+ expansion** in one quarter.\n- Power evidence: VRT backlog **+109% YoY**, orders **+81%**; GEV Q1 orders **+71% organic**, data-center electrification orders **$2.4B in Q1**, more than all 2025.\n- Semis: CoWoS 2026 demand near **1.0M wafers**, NVIDIA ~**60%**; MU capex now **>$25B**, and Samsung HBM4 commercial shipment since Feb raises 2027 supply risk.\n\n## 7. Green lights / thesis-breakers\n\n**Green lights**\n- AAOI GM >32%, no dilution, clean AR/inventory, 1.6T shipments.\n- VRT/GEV/PWR/ETN convert backlog into margin, not just revenue.\n- RBRK/APP/PLTR sustain growth without valuation/margin cracks.\n- Neoclouds hit MW handoff dates with financing still available.\n- TSM keeps CoWoS pricing/allocation tight.\n\n**Thesis-breakers**\n- Hyperscaler capex cuts driven by ROI stress, not timing.\n- Private-credit/ABS market reprices data-center financing.\n- AAOI margin fails to expand despite mix shift.\n- MU/Samsung/SK Hynix supply growth breaks HBM pricing in 2027.\n- Defense names’ funded backlog fails to convert under continuing resolutions.\n\n## 8. Best next move\n\n**Best next move:** Gus should build a one-page active-sleeve replacement/expansion grid: **AAOI vs VRT/GEV/PWR/ETN vs RBRK/APP/KTOS/AVAV vs TSM/AVGO**, with add-only-if thresholds and risk-reduce triggers. For you, I’d treat today as **no-chase / prepare-to-act-on-proof-or-pullback**.\n\n## 9. Desk reweight\n\nHire/split: **defense autonomy**, **AI apps/cyber**, **neocloud/project finance**, **stablecoin rails scout**.  \nKeep high: **power/grid**.  \nKeep but deweight: **optics**, **semis/HBM**.  \nPause: **generic humanoid robotics**, **generic crypto**, **AAOI-only loops**.", "summary": "1. The actual read Stance: AI infra demand is still real and accelerating, but the best capital allocation read is not “chase AAOI/semis.” The hard evidence has shifted toward power/grid backlog, defense/autonomy + AI a…"}, {"id": "job-08120c9a9378", "title": "Daily Synthesis", "category": "Desk Outputs", "source": "cron/08120c9a9378/2026-07-09_08-05-44.md — final response only", "updated": "2026-07-09T09:05:44", "content": "# Daily Investment Research Synthesis — 2026-07-09\n\n## 1. What you should believe / watch differently today\n\n1. **AI infra demand is still real, but the main risk has moved from “will they build?” to “can the financing/capacity handoff convert cleanly?”** New DCD item: **$520M CMBS/ABS backed by a fully leased 80MW Loudoun data center**. This confirms the securitization/private-credit rail is now core plumbing for AI/data-center growth.\n\n2. **AAOI remains convex, but the SEC math argues “do not chase without Q2/Q3 proof.”** Q1 data center revenue was strong, but gross margin fell, AR/inventory ballooned, and customer concentration is extreme. AAOI is thesis-alive, not yet a clean compounder.\n\n3. **Research attention should rotate up toward power/grid, defense autonomy, AI apps/cyber, and neocloud finance.** Optics and semis still matter, but they are crowded and already heavily studied. The best anti-overfit expansion is **defense/counter-UAS + AI software monetization**.\n\n4. **Stablecoin/tokenization rails deserve a scout now.** The OCC’s 2026 GENIUS Act proposed rulemaking makes this a regulated fintech-rails theme, not generic crypto. Still no conviction until we model float, reserve yield, take-rate, regulation, and rate sensitivity.\n\n5. **Price-action alerts from July 7–8 look like crowding/rotation, not evidence.** AVGO/ANET/CRDO snapped back +6% after power/optics selloffs. Treat that as sentiment heat, not thesis validation.\n\n---\n\n## 2. Active sleeve scorecard — moved up/down\n\n### Moved up\n- **Neocloud / project finance:** DCD’s $520M data-center ABS is direct evidence that securitized data-center financing is scaling. This desk should be split out from hyperscaler demand.\n- **Defense autonomy / counter-UAS:** official Replicator 2 purchase + FY2027 NDAA/counter-drone provisions make this a real procurement theme. Public exposures: **AVAV, KTOS, PLTR, AXON**, plus primes.\n- **AI apps/cyber monetization:** **RBRK, APP, PLTR** have more direct monetization evidence than generic “AI software” baskets.\n- **Stablecoin/tokenization rails:** upgraded from vague watch to **dedicated scout** because regulatory implementation is now concrete.\n\n### Held high\n- **Power/grid/data-center infra:** still the best hard-evidence bottleneck, but crowded. Best quality: **VRT, GEV, E
