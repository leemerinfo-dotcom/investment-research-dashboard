te/neocloud economics\n- EMIB-T roadmap, custom HBM, HBM4 packaging\n- Photonic interconnects / CPO\n- “Stop saying half of 2026 datacenter capacity is canceled”\n[redacted secret/config line]\n- 800VDC / microfluidic cooling / behind-the-meter grid\n\nThis remains the desk’s highest-signal open source for **technical and supply-chain framing**.\n\n**Claims needing verification:**\n- Any concrete customer win or capex number attributed to a public name requires corroboration from filings/transcripts because SemiAnalysis paid tier often contains non-public data.\n- The “half of capacity canceled” framing is a direct rebuttal to bearish datacenter narratives; valid only if tied to specific hyperscaler projects.\n\n### 2.3 @aleabitoreddit / Serenity — social chatter, no new primary evidence\nRecent social snippets show renewed AAOI/LITE/COHR bounce commentary and an AXTI-as-photonics-chokepoint claim. No filings, orders, or transcripts were surfaced.\n\n**Classification:** Rumor / speculation until corroborated.\n\n### 2.4 @photon_era\nFound as a Chinese photonics/CPO startup (CNY1.5B Series C, Volantis motherboard targeting AI datacenters in Q4 2026). Not an analyst source; **add as supply-chain competitor reference, not investment research**.\n\n### 2.5 @lithos_graphein\nAggregator dashboard with real-time headline links into semiconductors/geopolitics. Useful for **news velocity and event spotting**; low analytical depth. Worth watching as a low-friction scanner. Score: 2.\n\n### 2.6 HFI Research\nNo direct HFI Research output found in this sweep. The firm name appears in desk context only; **keep on queue for deeper search in next run**.\n\n### 2.7 @damnnang2, @conflict_radar, @marcusmilione\n- @damnnang2: no substance found; **ignore until source discipline appears**.\n- @conflict_radar: no AI/supply-chain output surfaced; **ignore for equities**.\n- @marcusmilione: IR/social presence found but no analyst-tier AI infrastructure output; **ignore for investment research**.\n\n---\n\n## 3. What it means for Leemer\n- **AAOI / optics basket:** Aschenbrenner’s LITE sale is a crowding/lag indicator, not a new short thesis — but it should raise the threshold for adding to AI photonics names without customer evidence. Serenity remains a *lead* source only.\n- **Semiconductor longs:** The “everyone is long NVDA/AVGO” narrative is inaccurate; a major AI fund is hedging/shorting names via options. Don’t use 13F longs as conviction for crowded trades.\n- **Power/grid basket:** Situational Awareness LP’s long infrastructure/power bias is consistent with the desk’s Priority 3 queue; treat as thematic support, not trade trigger.\n- **Source diet:** Add BEP Research to the watchlist; drop or demote @damnnang2, @conflict_radar, @marcusmilione from active monitoring unless proven otherwise.\n\n---\n\n## 4. Best ideas / avoid list (source-led)\n| Name | Verdict | Why |\n|---|---|---|\n| SemiAnalysis | Watch / primary feed | Highest-signal open source; use for theme discovery and technical validation |\n| BEP Research | Add / watch | CPO + AI interconnect angle fits optics desk; score until 3 verified claims |\n| Situational Awareness LP | Watch / 13F signal | Crowding/hedging signal, not a trade signal; 13F lag is material |\n| Serenity / @aleabitoreddit | Watch / lead only | High volatility; any AAOI/LITE/COHR claim needs filing evidence |\n| @lithos_graphein | Watch / low band | Scanner only; headline velocity with no analysis |\n| @photon_era | Ignore for investing | Startup, not analyst research |\n| @damnnang2, @conflict_radar, @marcusmilione | Ignore | No investment-grade output found |\n\n---\n\n## 5. Math / checks that matter\n- Situational Awareness LP: $13.68B portfolio, 72.66% top-10 concentration, 63% turnover. Options notional is headline-grabbing; **delta-adjusted exposure unknown without full options table**.\n- LITE sale in Q1: 8.7% of portfolio. With LITE now volatile on AI photonics rotation, treat this as **negative crowding signal** for LITE longs in the near term.\n- CRWV sold down: reduce weight on CoreWeave-as-crowded-long assumption.\n\n---\n\n## 6. Green lights and thesis-breakers\n**Green lights:**\n- SemiAnalysis publishes a rebuttal to the “half of US datacenter capacity canceled” bear case — if true, this supports continued 800G/1.6T optical demand.\n\n**Thesis-breakers:**\n- If Aschenbrenner’s Q2 13F shows *increased* LITE/AAOI/COHR concentration, the Q1 sale was noise.\n- If SemiAnalysis claim is rebutted by actual customer pushout, the optics demand ramp is at risk.\n\n---\n\n## 7. Evidence quality\n| Source | Score | Bias risk | Notes |\n|---|---|---|---|\n| SEC 13F / WhaleWisdom | 5 | Low | Hard data, but lagged + noisy for options |\n| SemiAnalysis | 4 | Medium | Primary-data discipline; paid tier unverifiable without subscription |\n| Situational Awareness LP public filings | 4 | Medium-High | Fund mythology risk; strong on thematic framing, weak alone |\n| Serenity / @aleabitoreddit | 3 | High | Lead only; social-vs-evidence line blurred |\n| @lithos_graphein | 2 | Unknown | Aggregator, not analyst |\n| BEP Research | 3 | Unknown | Candidate; pending track record |\n| @photon_era | 1 | N/A | Not an investing source |\n| @damnnang2 / @conflict_radar / @marcusmilione | 0–1 | Unknown | No usable output found |\n\n**Missing data:** HFI Research content, Situational Awareness LP detailed options tables, corroborating sell-side notes on CRWV/optical capex.\n\n---\n\n**Action items for next run:**  \n1. Verify whether WhaleWisdom/UnusualWhales provide full options tables for Situational Awareness LP Q1 13F.  \n2. Pull SemiAnalysis article on datacenter capacity cancellations and map claims to public hyperscaler filings.  \n[redacted secret/config line]\n4. Add BEP Research to candidate evaluation log once three claims are tracked.", "summary": "Source / Funds / Social Intelligence — Daily Brief Date: 20260706 Desk: Source intelligence / funds / social Scope: SemiAnalysis, HFI Research, Aschenbrenner/Situational Awareness LP, Serenity/@aleabitoreddit, @damnnang…"}, {"id": "job-36becd52f823", "title": "Biotech / Health / Longevity / Tools", "category": "Desk Outputs", "source": "cron/36becd52f823/2026-07-06_08-58-49.md — final response only", "updated": "2026-07-06T09:58:49", "content": "# Biotech / Life-Science Desk — Sector Scan\n**Date:** July 6, 2026 — as-of scan, findings are evidence-first. One catalyst (IONS PDUFA) may already be resolved: the olezarsen sHTG FDA action date of June 30, 2026 passed four days ago. Search-source outcomes post-date my latest fetch. Flag below.\n\n---\n\n## Executive Summary\n\n**Desk recommendation: Increase coverage.** There are currently 3–4 verifiable public candidates with differentiated theses and documented runway, plus one high-upside binary bet with a floor in net cash. Avoid pure promise-stage names without clinical data. The obesity/metabolic cluster is modern-day crowded-trade territory (193+ assets in development, LLY already a $1T+ market cap); the interesting edge is in oral small-molecule GLP-1 differentiation and first-in-class mechanism alternatives.\n\n---\n\n## CANDIDATES\n\n### 1. Ionis Pharmaceuticals (IONS) — Platform RNA / Antisense\n**Category:** Repeatable platform / near-term compounder (if June 30 PDUFA was positive)\n\n| Factor | Detail |\n|---|---|\n| **Catalyst** | olezarsen (TRYNGOLZA / sNDA) PDUFA date June 30, 2026 for severe hypertriglyceridemia; peak sales raised to **>$3B** from $2B; zilganersen NDA also accepted Priority Review for Alexander disease |\n| **Evidence quality** | High. Four independent commercial launches in 18 months; Q1 2026 revenue $246M (+87% YoY); full-year 2026 revenue guidance raised to **$875–900M** |\n| **Probability of success** | Olezarsen Phase 3 data already positive (85% reduction in pancreatitis events); FDA accepted sNDA for Priority Review. Regulatory probability reasonable if PDUFA was approval. |\n| **Cash / dilution risk** | $1.9B cash as of Q1 2026. Convertible notes repaid April 1, 2026 ($633M). Targets cash-flow breakeven **2028**. |\n| **Valuation** | ~$73–$130 range cited across analysts; market cap ~$12.2B; P/S ~11.4x (vs. 5.3x \"fair ratio,\" fellow Simply Wall St data). |\n| **Thesis-breaker / downsides** | **June 30 PDUFA was four days ago — outcome unconfirmed in this source set.** Verify approval letter vs. CRL first. Biogen's SPINRAZA royalties still ~18% of revenue; Arrowhead litigation risk on '333 patent; label restrictions could deflate $2B sHTG market sizing; long-term TRYNGOLZA pricing is $40K WAC (discounted from $595K). |\n\n**Verdict:** Potentially one of the highest-confidence names in the desk's window. Requires PDUFA outcome verification before call decision.\n\n---\n\n### 2. Recursion Pharmaceuticals (RXRX) — AI-Native End-to-End Drug Discovery Platform\n**Category:** Repeatable platform compounder (structural, not binary)\n\n| Factor | Detail |\n|---|---|\n| **Catalyst** | REC-4881 (FAP) FDA engagement update H2 2026 — the first regulatory pathway signal for an internally AI-designed asset; REC-1245 (RBM39 degrader) DAHLIA Phase 1 data; REC-4539 (LSD1i) first patient dosed |\n| **Evidence quality** | Solid. $500M+ in pharma partner cash received; 10+ milestones hit; cash burn down ~35% YoY; partnership revenue of $30M (Roche) + $7M (Sanofi) in 2025. |\n| **Probability of success** | FDA engagement de-risking over 12–24 months. Platform claim is already partially validated (paying pharma). Approval probability for any one asset still <20% (typical early-stage biotech), but platform value compounds even if individual assets fail. |\n| **Cash / dilution risk** | $665M cash (Q1 2026); cash runway confirmed to **early 2028**; no additional financing required per guidance. Low near-term dilution risk. |\n| **Valuation** | ~$3.20–$3.80/share, market cap ~$1.72B, EV ~$1.38B (after $665M cash). Described by AInvest as \"pricing in a lot more doubt\" than Dyne at similar stage. Compare to Dyne's $3B EV vs. 2 programs. |\n| **Thesis-breaker / downsides** | Cash-burn improvement fails to hold in next two quarters → 2028 runway guidance loses credibility. REC-4881 regulatory pathway rejected. Exscientia integration fails. Revenue miss remains — Q1 2026 revenue only $6.47M. |\n\n**Verdict:** The most structurally interesting mispriced name across the entire desk scan. Paid partners ($500M+) are the hard validation independent of any drug success. Pure platform-style exposure. **Best asymmetric candidate in the AI drug discovery bucket.**\n\n---\n\n### 3. Intellia Therapeutics (NTLA) — In Vivo CRISPR Gene Editing\n**Category:** Platform with imminent inflection (regulated product launch expected)\n\n| Factor | Detail |\n|---|---|\n| **Catalyst** | lonvo-z (NTLA-2002) Phase 3 HAELO: **met all primary and secondary endpoints** (87% attack reduction, freedom from ongoing therapy for most); rolling BLA submission started April 27, 2026; anticipates launch H1 2027. Nex-z Phase 3 restarted after FDA clinical hold lifted. |\n| **Evidence quality** | Highest of all gene-editing names searched. Quality clinical data, in vivo systemic delivery proven, BLA rolling. |\n| **Probability of success** | Phase 3 passed. FDA acceptance of rolling BLA is positive signal. Commercial launch H1 2027 trajectory plausible. |\n| **Cash / dilution risk** | $517M cash + $180M April 2026 equity raise (highly dilutive per Simply Wall St analysis). Runway described as \"into 2028 and beyond\" but recent equity raise signals cash pressure. |\n| **Valuation** | ~$13–$14/share post-drop; Simply Wall St narrative fair value $26.70 (95% upside thesis). P/S ~27.7x vs. peer 10.9x — extremely expensive on sales. |\n| **Thesis-breaker / downsides** | Safety signal re-emerges in long-term follow-up; payer pushback on one-time gene editing pricing; nex-z clinical hold re-occurs; recurring equity raises continue to dilute. Simply Wall St valuation gap is wide and vulnerable to sentiment shifts. |\n\n**Verdict:** Strongest clinical evidence in the gene-editing cohort, but valuation and recent dilution are structural headwinds. Position sizing must reflect binary regulatory/commercial risk on lonvo-z launch. Not a platform compounder in the same sense as Ionis — heavily dependent on file/approval trajectory.\n\n---\n\n### 4. Twist Bioscience (TWST) — Synthetic Biology Tools / Diagnostics\n**Category:** Repeatable platform / compounder (tools, no clinical binary risk)\n\n| Factor | Detail |\n|---|---|\n| **Catalyst** | FY2026 revenue guidance raised to $442–447M (+17–19%); Amazon Bio Discovery wet lab partner; $114–115M Q4 FY2026 guidance; adj EBITDA breakeven targeted Q4 FY2026 |\n| **Evidence quality** | High. 13 consecutive quarters of sequential growth; beat guidance Q2 FY2026 ($110.7M); Diagnostics segment up 28% YoY. |\n| **Probability of success** | EBITDA breakeven target is within 1–2 quarters. High-margin DNA synthesis is a durable structural model. |\n| **Cash / dilution risk** | ~$172M cash (Q1 FY2026); adj EBITDA breakeven path means material cash burn reduction ahead. Runway adequate for 2–3 quarters at current trajectory before needing to raise; breakeven changes this calculus. |\n| **Valuation** | Not a multiple story yet (pre-profitability). Compounding tools model. |\n| **Thesis-breaker / downsides** | Amazon Bio Discovery partnership delivers less than expected; biopharma capex cuts hit NGS assay demand; adj EBITDA breakeven slips past Q4 FY2026; cash goes below $100M triggering a raise. |\n\n**Verdict:** Cleanest \"tools compounding\" exposure in the scan. No clinical binary, clear path to profitability. Deserves increased desk attention.\n\n---\n\n### 5. Viking Therapeutics (VKTX) — Dual GLP-1/GIP Metabolic Platform (Binary / M&A Optionality)\n**Category:** Binary biotech with M&A catalytic overlay\n\n| Factor | Detail |\n|---|---|\n| **Catalyst** | VK2735 pivotal Phase 3 (VANQUISH-1/2 78-week data mid-2027); interim data late 2026; oral formulation as differentiator; M&A window estimated 55–60% probability |\n| **Evidence quality** | Moderate. Phase 2: 14–15% weight loss in 13 weeks vs. Wegovy/Mounjaro peer performance. Comparable tolerability. Oral formulation is real differentiator. |\n| **Probability of success** | Dual-agonist obesity space crowded and expensive. Success requires 2027 data to be clearly competitive with Lilly/Novo. |\n| **Cash / dilution risk** | Reports indicate cash reserves \"support full Phase 3 execution without immediate dilution.\" Specific dollar amount requires fresh 10-Q. |\n| **Valuation** | Market cap cited >$3B+. Acquired premium possibilities at $8–12B if data positive (per analysis). |\n| **Thesis-breaker / downsides** | Phase 3 readout underwhelms vs. competitors or shows tolerability issues; oral bioavailability underperforms; Lilly/Novo pricing pressure wipes out margin in a crowded field. |\n\n**Verdict:** Binary obesity/metabolic name with an M&A overlay. High-upside, high-risk. Fundable thesis requires confidence in 2027 dual-agonist readout. Position sizing should reflect binary nature.\n\n---\n\n### 6. Precision BioSciences (DTIL) — Below-Cash Binary Gene Editing\n**Category:** Pure binary gambit with a hard net-cash floor\n\n| Factor | Detail |\n|---|---|\n| **Catalyst** | PBGENE-HBV Phase 1/2a data H1 2026; PBGENE-DMD initial data year-end 2026. ARCUS platform (staggered cuts, single-component) is technically differentiated. |\n| **Evidence quality** | Low-to-moderate. ARCUS mechanism is scientifically sound but comparative advantage vs. CRISPR not yet proven in humans. |\n| **Probability of success** | Low (~15–20%). Both shots must land. Failure on either \"likely renders platform non-competitive\" per market participants. |\n| **Cash / dilution risk** | Net cash of ~$110.8M — floor. Runway through 2028 at current burn. Near-term dilution low. |\n| **Valuation** | Trades below net cash → hard downside limited to cash per share minus burn. Upside 2–5x if both programs validate. |\n| **Thesis-breaker / downsides** | Phase 1/2a data failure in HBV; DMD data failure; CRISPR competitors (Editas, Intellia, Prime Medicine) pull ahead; platform not demonstrably better than existing Cas9/Cas12a editing. |\n\n**Verdict:** Acceptable as a small-size, low-conviction allocation for asymmetric upside with a visible hard floor (cash). Not a platform compounder. Ticket size should reflect binary risk.\n\n---\n\n### 7. Agilent Technologies (A) — Life-Science Tools / Diagnostics\n**Category:** Repeatable compounder (tools, not biotech)\n\n| Factor | Detail |\n|---|---|\n| **Catalyst** | FY2026 revenue guidance raised to $7.39–7.49B (+6–8%); LDG segment +12% reported, +9% core in Q2; replacement cycle and new platforms (9500 ICP-MS) driving growth |\n| **Evidence quality** | High. Operating margins expanding; double-digit growth in LDG; consistent execution across all end markets. |\n| **Probability of success** | Very high. Slow, durable growth model. |\n| **Cash / dilution risk** | Low. Mature balance sheet, diversified revenue streams. |\n| **Valuation** | Premium P/E relative to broader medtech, but appropriate for quality. Not a multiple-expansion story — priced for steady execution. |\n| **Thesis-breaker / downsides** | Academic/large-pharma capex slowdowns; biotech funding freeze extends; instrument replacement cycle stalls. |\n\n**Verdict:** Reliable tools compounder, lower alpha but lower risk. Good portfolio anchor; reduces overall portfolio volatility if paired with higher-beta peers (Recursion, NTLA).\n\n---\n\n## OBESITY / METABOLIC — Thematic Positioning\n\n| Name | Status | Note |\n|---|---|---|\n| Viking (VKTX) | Pivotal Phase 3 | Best asymmetric name if oral Readout surprises |\n| Structure Therapeutics (FRLX) | Phase 3 enrollment H2 2026 | Pre-revenue, $1.4B cash, but crowded field |\n| Kailera (KRT) | IPO'd at $625M raise | No Phase 3 data until 2028; too far out for this desk window |\n| Eli Lilly / Novo Nordisk | Incumbents | Crowded trade, already mega-cap |\n\n**Verdict for desk:** The obesity-metabolic cluster is **highly crowded and mostly priced for large-pharma Winners.** The only asymmetric entry points are names at the binary Phase 3 readout window (VKTX) or at meaningful discounts to their net-cash floors (DTIL). Space does not warrant increased broad coverage — reduce to catalyst-driven specific names only.\n\n---\n\n## GENE EDITING — Thematic Positioning\n\n| Name | Stage | Note |\n|---|---|---|\n| Intellia (NTLA) | Commercial launch 2027 | Best-in-class evidence, expensive, recently diluted |\n| Editas (EDIT) | Preclinical → clinical | EDIT-401 compelling; CB/CVC patent resolved in favor; pre-clinical only |\n| Precision BioSciences (DTIL) | Phase 1/2 | Binary, below net cash floor |\n| CRISPR Therapeutics (CRSP) | CASGEVY approved | Now a late-stage commercial compounder with SyNTase pipeline |\n\n**Verdict:** Gene editing offers the strongest pipeline depth across public names. Ionis's antisense platform and Intellia's in vivo CRISR are the two highest-confidence theses. Editas is a lower-conviction but interesting preclinical bet on a different editase (Cas12a).\n\n---\n\n## DISPATCH: BINARY vs. PLATFORM SEPARATION\n\n| Binary / Gambit | Platform / Compounder |\n|---|---|\n| Precision BioSciences (DTIL) | Ionis (IONS) |\n| Viking (VKTX) | Recursion (RXRX) |\n| BioAge Labs (BIOA)* | Twist Bioscience (TWST) |\n| Structure (FRLX) | Agilent (A) |\n\n*BIOA is too pre-revenue / preclinical to fit either cleanly — requires Phase 2a data H1 2026 (possibly out now) before it graduates.\n\n---\n\n## RECOMMENDATION\n\n| Action | Name | Rationale |\n|---|---|---|\n| **Increase priority desk coverage** | **RXRX** | $665M cash, validated pharma engine, EV compression, low-burn runway to 2028 catalysts, mispriced vs. Dyne precedent |\n| **Increase priority** | **TWST** | Path to EBITDA breakeven within 12 months; tools compounding; no clinical binary; Amazon partnership validates reach |\n| **Increase priority, verify PDUFA first** | **IONS** | If olezarsen approved June 30, 2026, upgrade to highest-conviction RNA platform name; monitor Arrowhead litigation and Biogen royalty concentration |\n| **Maintain** | **NTLA** | Strongest clinical evidence in gene editing, high confidence on lonvo-z BLA trajectory, but recent dilution and 27x P/S demand larger position buffer and timing entry |\n| **Reduce / catalysts-only** | Obesity/metabolic cluster (VKTX, FRLX, KRT) | Crowded trade barring a clear mispricing entry |\n| **Reduce** | Pure longevity pre-clinical | Altos Labs is private; BIOA still pre-Phase 2; insufficient public leverage |\n| **Silent / skip** | CVRs, warrants, below-$50M micro-cap flags outside DTIL | Limited institutional overwatch, unreliable filings |\n\n---\n\n## KNOWN GAP — VERIFY BEFORE ACTING\n\nThe **IONS olezarsen PDUFA action date of June 30, 2026 resolved four days ago** (as of July 6, 2026). The search-source trajectory does not yet reflect the FDA's letter (approval, CRL, or delay). All upside/side estimates above assume approval. If a CRL or restrictive label came back, the $12B market cap thesis compresses materially — particularly given Arrowhead patent litigation tail risk and the $40K WAC discount trade-off.\n\n**Recommended action before sizing IONS:** Pull FDA announcement or press release on olezarsen / TRYNGOLZA sHTG supplemental NDA from June 30/July 1, 2026.\n\n---\n\n*End of desk scan. No further questions — full autonomous deliverable.*", "summary": "Biotech / LifeScience Desk — Sector Scan Date: July 6, 2026 — asof scan, findings are evidencefirst. One catalyst (IONS PDUFA) may already be resolved: the olezarsen sHTG FDA action date of June 30, 2026 passed four day…"}, {"id": "job-2cc52e4f25e7", "title": "Research Desk Manager", "category": "Desk Outputs", "source": "cron/2cc52e4f25e7/2026-07-06_08-59-32.md — final response only", "updated": "2026-07-06T09:59:32", "content": "# Leemer Investment Research — Desk Management Memo\n**Date:** July 6, 2026  \n**To:** Research desk manager / chief of staff  \n**From:** Gus / Hermes Agent  \n**Re:** Specialist desk evaluation — hire/fire/reweight + meta-research queue\n\n---\n\n## Executive Summary\n\n**The desk is overfit to AI infrastructure optics and semis, underfit to the power/grid bottleneck, and wasting cycles on social-media rumor mills.** Three desks are earning their keep (Power/Grid, Source Intelligence, AI Apps/Defense). Two are structurally stale (Optical Networking if it keeps anchoring on AAOI; Biotech if it keeps treating gene-editing binaries as compounders). One support function (Hyperscaler Capex) is useful but should be subordinated to the power/grid desk. **Two new desks should be created:** Advanced Nuclear / Fuel Cycle and AI Infrastructure Credit / Underwriting.\n\n---\n\n## Desk-by-Desk Evaluation\n\n### Tier 1 — Earn Weight, Scale Headcount\n\n**1. Power / Grid / Data-Center Infrastructure**\n- **Unique alpha:** Verifiable backlogs (PWR $48.5B, GEV $150B+, VRT $15B, ETN >$19B), pricing power, transformer lead times 80–144 weeks, interconnection queues 4–7+ years. This is the least crowded, most evidence-rich AI-adjacent basket.\n- **Evidence quality:** Primary-source filings, confirmed order language, backlog-to-revenue math. Not rumor-dependent.\n- **Alpha potential:** Highest in the firm. Less followed than AAOI/semis because it looks \"boring industrial.\"\n- **Action:** **UPGRADE TO FULL DESK (2 analysts).** This should be the largest sleeve after AI apps.\n\n**2. AI Apps / Autonomy / Defense**\n- **Unique alpha:** PLTR ($1B+ quarter, 85% growth, 128% NDR), PANW (AI security revenue re-acceleration), KTOS (defense procurement, autonomous drones). Verified execution, not narrative.\n- **Evidence quality:** Earnings, contract announcements, DoD budget linkage. Strong.\n- **Alpha potential:** High, but PLTR/PANW are becoming recognized; KTOS remains underfollowed.\n- **Action:** **HOLD WEIGHT, expand defense procurement tracking.** Add DoD budget cycle and Replicator/autonomous-munitions milestones to catalyst calendar.\n\n**3. Source Intelligence / Funds Social**\n- **Unique alpha:** SemiAnalysis is the desk's highest-signal open-source feed; Situational Awareness LP 13F debunked the \"everyone is long AI infra\" narrative (revealing paired long/short options book). Social/X is mostly noise.\n- **Evidence quality:** Mixed — SemiAnalysis is primary; 13F is official but lagged; social accounts (@aleabitoreddit, Serenity) have produced zero verified filings in recent sweeps.\n- **Alpha potential:** Medium-high if sourcing discipline tightens; low if social rumor keeps getting treated as evidence.\n- **Action:** **HOLD, but implement evidence-tier scoring and downgrade social leads to \"rumor only.\"** SemiAnalysis remains the only social-grade source worth daily reads.\n\n---\n\n### Tier 2 — Maintain with Corrections\n\n**4. Semiconductors / HBM / Accelerators (TSM, MU, AVGO, MRVL, ASML)**\n- **Unique alpha:** Bottleneck migration from silicon to CoWoS advanced packaging; HBM4 cycle risk in 2027; TSM scarcity rent; MU best-positioned memory name.\n- **Evidence quality:** Strong on TSM CoWoS, MU HBM4; weaker on forward pricing.\n- **Alpha potential:** Medium. Crowding risk is rising; 13F shows major AI funds hedging mega-cap semis via options, not just longing them.\n- **Action:** **HOLD WEIGHT, but pivot focus from \"who sells the most chips\" to \"who holds the packaging/memory chokepoint.\"** Reduce mega-cap NVDA/AVGO narrative exposure; increase TSM/MU/ASML (with China overhang flag) granularity.\n\n**5. Hyperscaler Capex / Financing / AI Demand**\n- **Unique alpha:** Identified the \"in-between layer\" financing fragility (CoreWeave debt, Nebius leases, project-finance retrenchment). Useful cross-desk coordination.\n- **Evidence quality:** Good on public hyperscaler capex (~$725B combined 2026); weaker on private-operator utilization without direct lender data.\n- **Alpha potential:** Medium. Best as a **support function, not a standalone sleeve.** Power/grid and optical desks should consume this output.\n- **Action:** **SUBORDINATE to Power/Grid desk.** One analyst covering both capex demand and financing stress is sufficient.\n\n---\n\n### Tier 3 — Stale or Overfit; Correct or Wind Down\n\n**6. Optical / AI Networking**\n- **Unique alpha:** 800G/1.6T demand real; CPO shifting to revenue. But the desk's focus on AAOI as a *compounder* is wrong.\n- **Evidence quality:** Strong on LITE/COHR lasers and AVGO/ANET switching; weak on AAOI's margin/dilution trajectory being acknowledged.\n- **Alpha potential:** **Collapsing for AAOI-specific ideas.** Customer concentration 98%, share count +60% in a year, GAAP GM 29% and falling. AAOI is a trade, not a sleeve anchor.\n- **Action:** **REWEIGHT — shift optical desk mandate from \"module assemblers\" to chokepoint lasers (LITE, COHR), DSPs (MRVL, AVGO), and switching fabrics (ANET, CRDO).** If the desk insists on AAOI, cap it at satellite size and require quarterly margin-inflection proof.\n\n**7. Biotech / Health Longevity / Life-Science Tools**\n- **Unique alpha:** IONS platform RNA strong if PDUFA was positive; RXRX most interesting mispriced AI drug discovery name; NTLA strongest gene-editing clinical but with valuation/dilution wreckers.\n- **Evidence quality:** Mixed. Clinical data is primary; market sizing and runway claims need refreshing.\n- **Alpha potential:** Medium-low for the desk's stated scope. Obesity/metabolic is a crowded trade. Gene editing is binary, not compounding.\n- **Action:** **REWEIGHT — drop obesity/gene-editing binary coverage. Focus on platform biotech (IONS, RXRX) and life-science tools (TWST) with real revenue and cash flow. Hire one specialist with clinical-trials diligence fluency, not hype detection.**\n\n---\n\n## Hire / Fire / Reweight Summary\n\n| Desk | Decision | Rationale |\n|---|---|---|\n| Power / Grid / DC Infrastructure | **HIRE (2nd analyst)** | Strongest asymmetry, least crowded, primary evidence |\n| AI Apps / Autonomy / Defense | **HOLD + expand DoD tracking** | PLTR/PANW verified; KTOS underfollowed |\n| Source Intelligence | **HOLD, discipline sourcing** | SemiAnalysis gold; social leads are noise |\n| Semis / HBM / Accelerators | **HOLD, pivot to chokepoints** | TSM/MU/ASML valid; reduce mega-cap narrative |\n| Hyperscaler Capex / Financing | **SUBORDINATE to Power/Grid** | Useful support, not standalone alpha |\n| Optical / AI Networking | **REWEIGHT chokepoint focus** | AAOI is crowded/trade-only |\n| Biotech / Health Longevity | **REWEIGHT or FIRE if no pivot** | Current scope is crowded/binary; needs platform/tools refocus |\n\n---\n\n## New Desks to Create\n\n**1. Advanced Nuclear / Fuel Cycle Specialist**\n- **Why:** LEU ($3.8B backlog, $900M HALEU task order), BWXT ($7.3B backlog, sole navy/SMR pressure vessel supplier), OKLO (space nuclear LOI with Centrus, Meta pre-payment). April 2026 White House Space Nuclear Mandate is a structural catalyst.\n- **Scope:** Fuel cycle (LEU), naval/SMR pressure vessels (BWXT), reactor developers (OKLO, NuScale). Overlaps with Power/Grid but distinct regulatory/commercial cycle.\n- **Alpha potential:** Medium-high. LEU is grounded; OKLO is binary but with federal tailwind.\n\n**2. AI Infrastructure Credit / Underwriting**\n- **Why:** Hyperscaler capex desk flagged project-finance retrenchment around CoreWeave-linked Pennsylvania capacity. The \"in-between layer\" (GPU co-lo, neoclouds, project-financed builds) is where financing stress will surface first.\n- **Scope:** Leverage/lease structures of CoreWeave, Nebius, Crusoe, Lambda, etc.; project-finance lender exposure; utilization underwriting assumptions.\n- **Alpha potential:** High for short-side / credit-style ideas; low for long-only public equities (most are private). Could be fused with Hyperscaler Capex desk as a half-time credit analyst.\n\n---\n\n## Stale / Overfit Coverage to Kill or Demote\n\n1. **AAOI as a compounder.** The desk has not updated its mental model from \"AI optics winner\" to \"crowded module assembler with margin compression and dilution.\" Every specialist note flags this; yet the hypergrowth scout still lists optics as a primary sleeve. **Kill the anchor, retain only as a tactical trade.**\n2. **Obesity/metabolic biotech.** 193+ assets in development, LLY already $1T+. The edge is not in GLP-1 me-toos; it is in oral small-molecule differentiation. Current biotech output doesn't show that filter.\n3. **Gene-editing binaries as platform compounds.** NTLA is clinical-validated but $180M equity raise in April 2026 destroyed the \"compounder\" thesis. Treat as a regulated-product launch trade, not a durable business.\n4. **Social/X lead generation treated as evidence.** @aleabitoreddit/Serenity, @damnnang2, @conflict_radar, @marcusmilione have produced zero filing-level corroboration in recent sweeps. They are **rumor generators, not sources.** Downgrade all to \"watch only\" with explicit verification requirement before any claim reaches the thesis tracker.\n5. **\"Everyone is long AI infrastructure\" narrative.** Situational Awareness LP's Q1 13F shows $13.68B book with 72.66% top-10 concentration, 63% turnover, and *large put/options exposure* to SMH/NVDA/AVGO/AMD. The desk must stop regurgitating the consensus long narrative; the smart money is hedging.\n\n---\n\n## Meta-Research Queue — What Gus Should Build Next\n\n1. **Source Quality Scoring System** — Tier sources by evidence type (filings > transcripts > paid research > open-source specialist > social rumor). Auto-flag claims that lack primary-source corroboration before they reach thesis tracker.\n2. **13F / Insider Transaction Parser** — Auto-parse 13F filings for crowding signals, options notional, and concentration changes. Reduce the 45-day lag by surfacing Form 13F-HR and Form 4 filings within 24 hours.\n3. **Catalyst Calendar** — PDUFA dates, DOE SMR selections, NERC LTRA releases, hyperscaler earnings, defense budget milestones. Single view across desks.\n4. **Position-Sizing Framework** — Correlate desk convictions to sleeve limits. Prevent duplicate AI-demand bets across AAOI, power, and semis.\n5. **Power Grid Backlog Tracker** — Real-time (quarterly) backlog conversion math for PWR, GEV, VRT, ETN, Siemens Energy. Book-to-bill, backlog growth, AI-exposure language flagging.\n6. **Biotech Platform Filter** — Auto-screen biotech names for cash runway <24 months, dilution history, and Phase 3 readout timing. Flag binary vs. platform characteristics before analyst notes are drafted.\n\n---\n\n## Bottom Line\n\nThe desk is not bad, but it is **misdimensioned.** Too many analysts covering crowded AI-infrastructure optics and semis; not enough covering the physical-layer constraint (power/grid) and the emerging credit stress in AI infrastructure financing. Biotech needs a hard reset toward platform/tools or should be paused. Source intelligence is useful only with strict evidence discipline.\n\n**Recommended next-quarter headcount allocation:**\n- Power/Grid: 2 analysts (up from 1)\n- AI Apps/Defense: 1.5 analysts (up from 1, add DoD procurement)\n- Semis/HBM: 1 analyst (down from implicit 2, sharpen to chokepoints)\n- Optical Networking: 0.5 analyst (down from 1, lasers/DSPs only)\n- Hyperscaler Capex: 0.5 analyst (subordinated to Power/Grid)\n- Biotech: 0.5 analyst (pause if no platform/tools pivot in 30 days)\n- New: Advanced Nuclear 0.5, AI Infra Credit 0.5\n\n**Total: 6 effective analyst-slots, up from current ~5 but reweighted toward evidence-rich, underfollowed, high-asymmetry areas.**", "summary": "Leemer Investment Research — Desk Management Memo Date: July 6, 2026 To: Research desk manager / chief of staff From: Gus / Hermes Agent"}, {"id": "job-04aa99181e16", "title": "Market Trigger Watcher", "category": "Desk Outputs", "source": "cron/04aa99181e16/2026-07-06_13-52-55.md — final response only", "updated": "2026-07-06T14:52:55", "content": "# Cron Job: Investment market trigger watcher\n\n**Job ID:** 04aa99181e16\n**Run Time:** 2026-07-06 13:52:55\n**Mode:** no_agent (script)\n**Status:** silent (empty output)", "summary": "Cron Job: Investment market trigger watcher Job ID: 04aa99181e16 Run Time: 20260706 13:52:55 Mode: no_agent (script)"}]};</script>
<script>
let DATA = null;
let selectedDoc = null;
const $ = (sel) => document.querySelector(sel);
const el = (tag, cls, html) => { const n = document.createElement(tag); if (cls) n.className = cls; if (html !== undefined) n.innerHTML = html; return n; };
function md(text){ if(!text) return ""; const html = window.marked ? marked.parse(text,{mangle:false,headerIds:false}) : text.replace(/\n/g,"<br>"); return window.DOMPurify ? DOMPurify.sanitize(html) : html; }
function fmtDate(s){ if(!s) return ""; try{return new Date(s).toLocaleString()}catch{return s} }
function pct(v){ if(v===null||v===undefined||Number.isNaN(v)) return "—"; return `${v>=0?"+":""}${Number(v).toFixed(2)}%`; }
function money(v){ if(v===null||v===undefined||Number.isNaN(v)) return "—"; return Number(v).toLocaleString(undefined,{maximumFractionDigits:2,minimumFractionDigits:2}); }
function quoteColor(q){ return (q.changePct||0) >= 0 ? "up" : "down"; }
function quoteByTicker(t){ return (DATA.quotes||[]).find(q => q.ticker === String(t||"").toUpperCase()); }
function sparkline(values, cls=""){ if(!values||values.length<2) return `<svg class="spark ${cls}" viewBox="0 0 120 42"><path d="M0 22 L120 22"/></svg>`; const min=Math.min(...values), max=Math.max(...values), span=max-min||1; const pts=values.map((v,i)=>{const x=(i/(values.length-1))*120; const y=38-((v-min)/span)*34; return `${i?"L":"M"}${x.toFixed(1)} ${y.toFixed(1)}`}).join(" "); return `<svg class="spark ${cls}" viewBox="0 0 120 42" preserveAspectRatio="none"><path d="${pts}"/></svg>`; }
function quoteCard(q){ const color=quoteColor(q); if(q.error) return `<div class="quote-card"><div class="quote-top"><span class="ticker">${q.ticker}</span><span class="price">n/a</span></div><div class="quote-time">${q.error}</div></div>`; return `<div class="quote-card ${color}"><div class="quote-top"><span class="ticker">${q.ticker}</span><span class="price">${money(q.price)}</span></div><div class="change ${color}">${pct(q.changePct)}</div>${sparkline(q.sparkline,color)}<div class="quote-time">${q.exchange||""} · ${q.quoteTime?fmtDate(q.quoteTime):"snapshot"}</div></div>`; }
function topQuotes(n=8){ return [...(DATA.quotes||[])].filter(q=>!q.error&&q.changePct!==null&&q.changePct!==undefined).sort((a,b)=>Math.abs(b.changePct)-Math.abs(a.changePct)).slice(0,n); }
async function load(){ if(window.__SITE_DATA__) DATA=window.__SITE_DATA__; else DATA=await (await fetch("data/site-data.json",{cache:"no-store"})).json(); selectedDoc=DATA.latestCioNote||DATA.docs[0]; renderShell(); renderOverview(); renderTape(); renderScorecard(); renderAlerts(); renderFiles(); }
function renderShell(){ $("#generated").textContent=`Generated ${fmtDate(DATA.meta.generatedAt)} · ${DATA.stats.quotes||0} quote snapshots · public-safe export`; document.querySelectorAll(".nav button").forEach(btn=>btn.onclick=()=>switchView(btn.dataset.view)); $("#search").addEventListener("input",renderFileList); $("#copyLink").onclick=async()=>{await navigator.clipboard.writeText(location.href); $("#copyLink").textContent="Copied"; setTimeout(()=>$("#copyLink").textContent="Copy dashboard link",1200)}; renderFileList(); }
function switchView(view){ document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.view===view)); document.querySelectorAll(".view").forEach(v=>v.classList.toggle("active",v.id===view)); window.scrollTo({top:0,behavior:"smooth"}); }
function renderFileList(){ const q=$("#search").value.toLowerCase().trim(); const list=$("#fileList"); list.innerHTML=""; DATA.docs.filter(d=>!q||[d.title,d.category,d.source,d.summary,d.content].join(" ").toLowerCase().includes(q)).slice(0,60).forEach(d=>{const item=el("div","file-item",`<strong>${d.title}</strong><span>${d.category} · ${d.source}</span>`); item.onclick=()=>{selectedDoc=d; renderFiles(); switchView("files")}; list.appendChild(item);}); }
function renderOverview(){ const root=$("#overview"); root.innerHTML=""; root.appendChild(el("div","ticker-strip",topQuotes(8).map(quoteCard).join(""))); const stats=el("div","grid cols-4"); [["Names",DATA.stats.scorecardNames],["Watch",DATA.stats.watchlistNames],["Docs",DATA.stats.docs],["Alerts",DATA.stats.alerts]].forEach(([label,val])=>stats.appendChild(el("div","card",`<div class="stat">${val}</div><div class="muted">${label}</div>`))); root.appendChild(stats); const note=DATA.latestCioNote; root.appendChild(el("article","card markdown",`<h3>Latest CIO Note</h3>${md(note?note.content:"No CIO note yet.")}`)); }
function renderTape(){ const root=$("#tape"); const quotes=[...(DATA.quotes||[])].sort((a,b)=>(a.ticker||"").localeCompare(b.ticker||"")); root.innerHTML=`<div class="card"><h3>Market Tape</h3><p class="muted">Static quote/candle snapshots embedded at build time. Refreshes when the local dashboard job runs.</p><div class="ticker-strip">${topQuotes(10).map(quoteCard).join("")}</div></div><div class="tape">${quotes.map(quoteCard).join("")}</div>`; }
function renderScorecard(){ const root=$("#scorecard"); const rows=DATA.scorecard||[]; root.innerHTML=`<div class="card"><h3>Active Sleeve Scorecard</h3><div class="score-grid">${rows.map(r=>{const q=quoteByTicker(r.Name); return `<article class="score-card"><h4>${r.Name||""}</h4><div class="muted">${r.Theme||""}</div>${q?`<div class="quote-top"><span class="price">${money(q.price)}</span><span class="change ${quoteColor(q)}">${pct(q.changePct)}</span></div>${sparkline(q.sparkline,quoteColor(q))}`:""}<p><span class="label">Stance</span><br>${r["Current desk stance"]||""}</p><p><span class="label">Add only if</span><br>${r["Add only if"]||""}</p><p><span class="label">Risk-reduce if</span><br>${r["Risk-reduce / avoid if"]||""}</p><p><span class="label">Next check</span><br>${r["Next catalyst/check"]||""}</p></article>`}).join("")}</div></div>`; }
function renderAlerts(){ const root=$("#alerts"); root.innerHTML=""; const grid=el("div","grid"); (DATA.latestAlerts||[]).forEach(a=>{const maxLevel=Math.max(0,...a.levels.map(x=>x.level)); grid.appendChild(el("article",`card alert level-${maxLevel} markdown`,md(a.content)))}); if(!DATA.latestAlerts.length) grid.appendChild(el("div","card muted","No recent alerts.")); root.appendChild(grid); }
function renderFiles(){ const root=$("#files"); if(!selectedDoc) selectedDoc=DATA.docs[0]; const grouped=DATA.docs.reduce((acc,d)=>{(acc[d.category]||=[]).push(d); return acc},{}); root.innerHTML=`<div class="grid cols-2"><div class="card"><h3>Document Library</h3>${Object.entries(grouped).map(([cat,docs])=>`<h4>${cat}</h4><div class="pill-row">${docs.map(d=>`<button class="doc-picker" data-doc="${d.id}">${d.title}</button>`).join("")}</div>`).join("")}</div><article class="card markdown"><div class="doc-header"><div><h3>${selectedDoc.title}</h3><div class="doc-meta">${selectedDoc.category} · ${selectedDoc.source} · ${fmtDate(selectedDoc.updated)}</div></div></div>${md(selectedDoc.content)}</article></div>`; root.querySelectorAll(".doc-picker").forEach(btn=>btn.onclick=()=>{selectedDoc=DATA.docs.find(d=>d.id===btn.dataset.doc); renderFiles()}); }
load().catch(err=>{document.body.innerHTML=`<pre style="color:white;padding:24px">Dashboard failed to load: ${err.stack||err}</pre>`});

</script>
