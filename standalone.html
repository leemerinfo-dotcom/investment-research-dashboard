<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f3e8" />
  <meta name="description" content="Gus Investment Office — executive decisions, catalysts, and investment reports." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Gus Office" />
  
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <style>
:root {
  --paper: #f7f3e8;
  --paper-2: #fffdf8;
  --paper-3: #ece6d8;
  --ink: #18150f;
  --ink-2: #4e493f;
  --muted: #777064;
  --line: #d2cabc;
  --line-strong: #a89f90;
  --blue: #174a98;
  --blue-wash: #e8eef8;
  --green: #17603b;
  --green-wash: #e7f1ea;
  --red: #a12b27;
  --red-wash: #f6e8e5;
  --amber: #89510c;
  --amber-wash: #f5eddd;
  --serif: "Times New Roman", Times, Georgia, serif;
  --ui: Arial, Helvetica, sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

* { box-sizing: border-box; }
html { min-height: 100%; background: var(--paper); color-scheme: light; scroll-behavior: smooth; }
body {
  margin: 0;
  min-height: 100svh;
  background: var(--paper-2);
  color: var(--ink);
  font-family: var(--serif);
  font-size: 17px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  padding-bottom: calc(62px + var(--safe-bottom));
}
button, input { font: inherit; }
button { color: inherit; }
a { color: var(--blue); text-decoration-thickness: 1px; text-underline-offset: .18em; overflow-wrap: anywhere; }
a:hover { color: #0e3472; }
::selection { background: #cbd8ee; }

.skip-link { position: fixed; z-index: 200; top: 8px; left: 8px; transform: translateY(-150%); padding: 8px 12px; background: var(--ink); color: white; font: 700 12px var(--ui); }
.skip-link:focus { transform: none; }

.desktop-rail { display: none; }
.app-column { min-width: 0; }
.app-header {
  position: sticky;
  z-index: 40;
  top: 0;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  min-height: calc(58px + var(--safe-top));
  padding: var(--safe-top) 15px 0;
  border-bottom: 1px solid var(--line);
  background: rgba(247, 243, 232, .97);
}
.mobile-identity { display: flex; align-items: center; gap: 9px; min-width: 0; }
.mini-monogram { display: grid; place-items: center; width: 30px; height: 30px; border: 1.5px solid var(--blue); color: var(--blue); font-size: 19px; font-weight: 700; line-height: 1; }
.mobile-identity div { min-width: 0; }
.mobile-identity strong { display: block; font-size: 17px; line-height: 1; }
.mobile-identity small { display: block; margin-top: 4px; color: var(--muted); font: 9px/1 var(--ui); letter-spacing: .04em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.view-heading { display: none; }
.share-button, .link-button, .back-button {
  min-height: 44px;
  border: 0;
  background: transparent;
  color: var(--blue);
  cursor: pointer;
  font: 700 11px/1 var(--ui);
  letter-spacing: .06em;
  text-transform: uppercase;
}
.share-button { padding: 0 0 0 12px; }
.share-button:focus-visible, .link-button:focus-visible, .back-button:focus-visible, input:focus-visible, summary:focus-visible, .bottom-nav button:focus-visible, .primary-nav button:focus-visible, .filter-chip:focus-visible, .report-row:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

#mainContent { min-width: 0; padding: 18px 15px 30px; }
.view { display: none; max-width: 1160px; margin: 0 auto; }
.view.active { display: block; animation: enter .16s ease both; }
@keyframes enter { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }

.page-intro { margin-bottom: 22px; }
.eyebrow, .section-label, .field-label {
  display: block;
  margin: 0 0 5px;
  color: var(--blue);
  font: 700 10px/1.15 var(--ui);
  letter-spacing: .11em;
  text-transform: uppercase;
}
.page-intro h2 { margin: 0; font-size: clamp(34px, 10vw, 54px); line-height: .96; letter-spacing: -.04em; }
.page-intro p { max-width: 58ch; margin: 8px 0 0; color: var(--ink-2); font-style: italic; line-height: 1.3; }

.decision-banner {
  margin-bottom: 24px;
  padding: 18px 0 17px;
  border-top: 4px solid var(--blue);
  border-bottom: 1px solid var(--ink);
}
.decision-banner.none { border-top-color: var(--blue); }
.decision-banner.buy, .decision-banner.add { border-top-color: var(--green); }
.decision-banner.avoid, .decision-banner.reduce, .decision-banner.exit { border-top-color: var(--red); }
.decision-banner .banner-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; }
.decision-banner h2 { max-width: 14ch; margin: 0; font-size: clamp(32px, 9vw, 50px); line-height: .95; letter-spacing: -.04em; text-wrap: balance; }
.decision-banner .urgency { color: var(--muted); font: 700 9px/1.2 var(--ui); letter-spacing: .07em; text-align: right; text-transform: uppercase; }
.decision-banner .banner-note { max-width: 68ch; margin: 12px 0 0; color: var(--ink-2); font-size: 16px; line-height: 1.35; }

.status-strip { display: grid; grid-template-columns: repeat(3, 1fr); margin-bottom: 26px; border-top: 1px solid var(--line-strong); border-bottom: 1px solid var(--line-strong); }
.status-cell { min-width: 0; padding: 12px 8px 11px 0; border-right: 1px solid var(--line); }
.status-cell + .status-cell { padding-left: 10px; }
.status-cell:last-child { border-right: 0; }
.status-value { display: block; font-size: clamp(24px, 7vw, 34px); font-weight: 700; line-height: .9; font-variant-numeric: tabular-nums; }
.status-value.text { font-size: 18px; line-height: 1; }
.status-label { display: block; margin-top: 6px; color: var(--muted); font: 700 8px/1.15 var(--ui); letter-spacing: .08em; text-transform: uppercase; }

.section { margin-top: 28px; padding-top: 17px; border-top: 2px solid var(--ink); }
.section:first-child { margin-top: 0; }
.section-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; margin-bottom: 12px; }
.section-head h3 { margin: 0; font-size: 25px; line-height: 1; letter-spacing: -.025em; }
.section-head p { max-width: 30ch; margin: 0; color: var(--muted); font: 10px/1.3 var(--ui); text-align: right; }

.change-list, .catalyst-list, .source-list { margin: 0; padding: 0; list-style: none; border-top: 1px solid var(--line); }
.change-list li, .catalyst-list li { position: relative; padding: 12px 0 12px 20px; border-bottom: 1px solid var(--line); line-height: 1.35; }
.change-list li::before { content: "—"; position: absolute; left: 0; color: var(--blue); font-weight: 700; }
.catalyst-list li::before { content: "◇"; position: absolute; left: 0; top: 13px; color: var(--blue); font: 700 10px var(--ui); }

.portfolio-callout { margin-top: 26px; padding: 15px 0; border-top: 2px solid var(--amber); border-bottom: 1px solid var(--line); }
.portfolio-callout.pass { border-top-color: var(--green); }
.portfolio-callout h3 { margin: 0 0 6px; font-size: 21px; }
.portfolio-callout p { margin: 0; color: var(--ink-2); line-height: 1.4; }
.missing-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.missing-list span, .tag, .category-pill { display: inline-flex; align-items: center; min-height: 24px; padding: 4px 7px; border: 1px solid var(--line); color: var(--muted); font: 700 9px/1 var(--ui); letter-spacing: .045em; text-transform: uppercase; }

.decision-list { display: grid; gap: 16px; }
.decision-card { border-top: 2px solid var(--ink); border-bottom: 1px solid var(--line); }
.decision-card.investigate { border-top-color: var(--amber); }
.decision-card.avoid, .decision-card.reduce, .decision-card.exit { border-top-color: var(--red); }
.decision-card.buy, .decision-card.add { border-top-color: var(--green); }
.decision-card summary { position: relative; min-height: 88px; padding: 14px 30px 14px 0; cursor: pointer; list-style: none; }
.decision-card summary::-webkit-details-marker { display: none; }
.decision-card summary::after { content: "+"; position: absolute; right: 0; top: 16px; color: var(--blue); font: 400 24px/1 var(--ui); }
.decision-card[open] summary::after { content: "−"; }
.decision-summary { display: grid; grid-template-columns: auto 1fr auto; gap: 9px 12px; align-items: start; }
.ticker { font: 700 18px/1 var(--ui); letter-spacing: -.02em; }
.action-badge { display: inline-flex; align-items: center; min-height: 22px; padding: 3px 6px; border: 1px solid currentColor; color: var(--amber); font: 700 9px/1 var(--ui); letter-spacing: .06em; text-transform: uppercase; }
.action-badge.buy, .action-badge.add { color: var(--green); }
.action-badge.avoid, .action-badge.reduce, .action-badge.exit { color: var(--red); }
.action-badge.hold { color: var(--blue); }
.quote { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
.quote strong { display: block; font-size: 14px; line-height: 1; }
.quote span { display: block; margin-top: 4px; font: 700 10px/1 var(--ui); }
.up { color: var(--green); }
.down { color: var(--red); }
.decision-lede { grid-column: 1 / -1; margin: 0; color: var(--ink-2); font-size: 15px; line-height: 1.3; }
.decision-detail { padding: 0 0 20px; }
.detail-grid { display: grid; gap: 0; border-top: 1px solid var(--line); }
.detail-field { padding: 12px 0; border-bottom: 1px solid var(--line); }
.detail-field p, .detail-field ul { margin: 0; }
.detail-field ul { padding-left: 1.2em; }
.detail-field li { margin: 4px 0; }
.metric-line { display: flex; flex-wrap: wrap; gap: 12px 20px; }
.metric-line div { min-width: 90px; }
.metric-line strong { display: block; font-size: 20px; line-height: 1; font-variant-numeric: tabular-nums; }
.metric-line span { display: block; margin-top: 5px; color: var(--muted); font: 700 8px/1 var(--ui); letter-spacing: .07em; text-transform: uppercase; }
.source-list li { padding: 9px 0; border-bottom: 1px solid var(--line); }
.source-list li:last-child { border-bottom: 0; }
.source-list a { font-size: 15px; }
.related-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.related-links button { min-height: 38px; padding: 7px 9px; border: 1px solid var(--line); background: transparent; color: var(--blue); cursor: pointer; font: 700 10px/1.2 var(--ui); }

.filters { display: flex; gap: 6px; overflow-x: auto; margin: 0 -15px 16px; padding: 0 15px 3px; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.filter-chip { flex: 0 0 auto; min-height: 38px; padding: 7px 11px; border: 1px solid var(--line); background: transparent; color: var(--muted); cursor: pointer; font: 700 10px/1 var(--ui); letter-spacing: .04em; text-transform: uppercase; }
.filter-chip.active { border-color: var(--blue); background: var(--blue-wash); color: var(--blue); }

.reports-layout { min-width: 0; }
.report-browser { min-width: 0; }
.search-row { margin-bottom: 12px; }
.search-row label { display: block; margin-bottom: 5px; color: var(--muted); font: 700 9px/1 var(--ui); letter-spacing: .09em; text-transform: uppercase; }
.search-row input { width: 100%; min-height: 44px; padding: 9px 10px; border: 1px solid var(--line-strong); border-radius: 0; background: var(--paper-2); color: var(--ink); outline: 0; }
.search-row input::placeholder { color: #999184; font-style: italic; }
.report-list { border-top: 2px solid var(--ink); }
.report-row { display: block; width: 100%; min-height: 76px; padding: 12px 2px; border: 0; border-bottom: 1px solid var(--line); background: transparent; text-align: left; cursor: pointer; }
.report-row:hover, .report-row.active { background: var(--blue-wash); }
.report-row-top { display: flex; justify-content: space-between; gap: 12px; color: var(--muted); font: 700 9px/1.2 var(--ui); letter-spacing: .06em; text-transform: uppercase; }
.report-row strong { display: block; margin-top: 6px; font-size: 17px; line-height: 1.1; }
.report-row p { margin: 5px 0 0; color: var(--ink-2); font-size: 13px; line-height: 1.25; }
.report-reader { display: none; min-width: 0; }
.reports-layout.reading .report-browser { display: none; }
.reports-layout.reading .report-reader { display: block; }
.reader-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--line); }
.back-button { padding-left: 0; }
.reader-meta { color: var(--muted); font: 700 9px/1.2 var(--ui); letter-spacing: .06em; text-transform: uppercase; }
.reader-header { margin: 0 0 24px; padding: 0 0 16px; border-bottom: 2px solid var(--ink); }
.reader-header h2 { margin: 5px 0 0; font-size: clamp(31px, 9vw, 50px); line-height: .98; letter-spacing: -.04em; }
.reader-header p { margin: 8px 0 0; color: var(--muted); font: 10px/1.3 var(--ui); text-transform: uppercase; letter-spacing: .05em; }
.tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 12px; }
.markdown-body { max-width: 76ch; font-size: 17px; line-height: 1.58; overflow-wrap: break-word; }
.markdown-body > :first-child { margin-top: 0; }
.markdown-body > :last-child { margin-bottom: 0; }
.markdown-body h1 { display: none; }
.markdown-body h2 { margin: 30px 0 10px; padding-top: 10px; border-top: 1px solid var(--line); font-size: 23px; line-height: 1.05; }
.markdown-body h3 { margin: 22px 0 8px; font-size: 19px; line-height: 1.1; }
.markdown-body p { margin: 0 0 14px; }
.markdown-body ul, .markdown-body ol { margin: 0 0 16px; padding-left: 1.25em; }
.markdown-body li { margin: 5px 0; }
.markdown-body blockquote { margin: 18px 0; padding-left: 16px; border-left: 2px solid var(--blue); color: var(--ink-2); font-style: italic; }
.markdown-body table { display: block; width: 100%; overflow-x: auto; border-collapse: collapse; margin: 18px 0; font-size: 13px; }
.markdown-body th, .markdown-body td { min-width: 110px; padding: 8px; border: 1px solid var(--line); text-align: left; vertical-align: top; }
.markdown-body th { background: var(--blue-wash); font: 700 9px/1.2 var(--ui); letter-spacing: .05em; text-transform: uppercase; }
.markdown-body code, .markdown-body pre { font-family: "Courier New", monospace; font-size: .82em; }
.markdown-body code { padding: .1em .25em; background: var(--paper-3); }
.markdown-body pre { overflow: auto; padding: 12px; border: 1px solid var(--line); background: var(--paper); }
.markdown-body pre code { padding: 0; background: transparent; }
.backlinks { margin-top: 32px; padding-top: 16px; border-top: 2px solid var(--ink); }
.backlinks h3 { margin: 0 0 9px; font-size: 20px; }

.watch-list { display: grid; gap: 14px; }
.watch-card { border-top: 2px solid var(--ink); border-bottom: 1px solid var(--line); }
.watch-card summary { position: relative; min-height: 72px; padding: 12px 28px 12px 0; list-style: none; cursor: pointer; }
.watch-card summary::-webkit-details-marker { display: none; }
.watch-card summary::after { content: "+"; position: absolute; right: 0; top: 15px; color: var(--blue); font: 400 22px/1 var(--ui); }
.watch-card[open] summary::after { content: "−"; }
.watch-head { display: grid; grid-template-columns: auto 1fr auto; gap: 8px 10px; align-items: start; }
.watch-theme { color: var(--ink-2); font-size: 15px; line-height: 1.15; }
.priority { color: var(--muted); font: 700 8px/1.2 var(--ui); letter-spacing: .06em; text-align: right; text-transform: uppercase; }
.watch-stage { grid-column: 1 / -1; color: var(--muted); font: 10px/1.2 var(--ui); text-transform: uppercase; letter-spacing: .05em; }
.watch-detail { padding: 0 0 16px; }
.signal-list { border-top: 1px solid var(--line); }
.signal-row { width: 100%; min-height: 62px; display: grid; grid-template-columns: auto 1fr auto; align-items: start; gap: 10px; padding: 11px 0; border: 0; border-bottom: 1px solid var(--line); background: transparent; text-align: left; cursor: pointer; }
.signal-level { color: var(--amber); font: 700 9px/1 var(--ui); text-transform: uppercase; }
.signal-level.high { color: var(--red); }
.signal-row strong { font-size: 15px; line-height: 1.15; }
.signal-row time { color: var(--muted); font: 9px/1 var(--ui); white-space: nowrap; }

.empty-state { padding: 22px 0; border-top: 2px solid var(--ink); border-bottom: 1px solid var(--line); color: var(--muted); font-style: italic; }

.bottom-nav {
  position: fixed;
  z-index: 60;
  left: 0;
  right: 0;
  bottom: 0;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding-bottom: var(--safe-bottom);
  border-top: 1px solid var(--line-strong);
  background: rgba(247, 243, 232, .98);
}
.bottom-nav button { min-width: 0; min-height: 62px; display: grid; place-content: center; gap: 4px; border: 0; border-right: 1px solid var(--line); background: transparent; color: var(--muted); cursor: pointer; font: 700 9px/1 var(--ui); }
.bottom-nav button:last-child { border-right: 0; }
.bottom-nav button.active { color: var(--blue); }
.nav-glyph { font-size: 15px; line-height: 1; }

@media (min-width: 820px) {
  body { padding-bottom: 0; background: var(--paper); }
  .app-shell { display: grid; grid-template-columns: 246px minmax(0, 1fr); min-height: 100svh; }
  .desktop-rail { position: sticky; top: 0; display: flex; flex-direction: column; height: 100vh; padding: 28px 18px; border-right: 1px solid var(--line-strong); background: var(--paper); }
  .identity { display: flex; align-items: flex-start; gap: 11px; }
  .monogram { width: 42px; height: 42px; display: grid; place-items: center; flex: 0 0 auto; border: 2px solid var(--blue); color: var(--blue); font-size: 27px; font-weight: 700; }
  .identity strong { display: block; font-size: 19px; line-height: .95; }
  .identity span { display: block; margin-top: 7px; color: var(--muted); font: 700 9px/1.25 var(--ui); letter-spacing: .08em; text-transform: uppercase; }
  .primary-nav { margin-top: 34px; border-top: 1px solid var(--ink); }
  .primary-nav button { display: grid; grid-template-columns: 28px 1fr; align-items: center; width: 100%; min-height: 48px; padding: 0; border: 0; border-bottom: 1px solid var(--line); background: transparent; color: var(--ink-2); text-align: left; cursor: pointer; font: 700 11px/1 var(--ui); letter-spacing: .06em; text-transform: uppercase; }
  .primary-nav button span { color: var(--muted); font-size: 9px; }
  .primary-nav button.active { color: var(--blue); }
  .rail-status { display: flex; align-items: flex-start; gap: 9px; margin-top: auto; padding-top: 16px; border-top: 1px solid var(--line); }
  .status-dot { width: 8px; height: 8px; margin-top: 3px; border-radius: 50%; background: var(--amber); }
  .status-dot.pass { background: var(--green); }
  .rail-status strong { display: block; font: 700 10px/1.2 var(--ui); text-transform: uppercase; }
  .rail-status small { display: block; margin-top: 4px; color: var(--muted); font: 9px/1.3 var(--ui); }
  .app-column { min-height: 100vh; background: var(--paper-2); }
  .app-header { position: static; grid-template-columns: 1fr auto; min-height: 98px; padding: 24px clamp(30px, 5vw, 70px) 18px; border-bottom: 1px solid var(--line); }
  .mobile-identity { display: none; }
  .view-heading { display: block; }
  .view-heading p { margin: 0 0 5px; color: var(--blue); font: 700 10px/1 var(--ui); letter-spacing: .11em; text-transform: uppercase; }
  .view-heading h1 { margin: 0; font-size: 34px; line-height: 1; }
  #mainContent { padding: 32px clamp(30px, 5vw, 70px) 70px; }
  .bottom-nav { display: none; }
  .page-intro { display: none; }
  .today-grid { display: grid; grid-template-columns: minmax(0, 1.7fr) minmax(300px, .8fr); gap: 34px 58px; align-items: start; }
  .today-main, .today-side { min-width: 0; }
  .today-side { position: sticky; top: 24px; }
  .decision-list { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px 28px; }
  .decision-list.compact { grid-template-columns: 1fr; }
  .detail-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .detail-field:nth-child(odd) { padding-right: 18px; border-right: 1px solid var(--line); }
  .detail-field:nth-child(even) { padding-left: 18px; }
  .reports-layout { display: grid; grid-template-columns: minmax(270px, 340px) minmax(0, 1fr); gap: 46px; align-items: start; }
  .reports-layout.reading .report-browser { display: block; }
  .report-browser { position: sticky; top: 24px; max-height: calc(100vh - 48px); overflow: auto; padding-right: 5px; }
  .report-reader { display: block; }
  .reader-toolbar .back-button { display: none; }
  .watch-list { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px 28px; }
  .markdown-body { font-size: 18px; }
}

@media (max-width: 380px) {
  #mainContent { padding-left: 12px; padding-right: 12px; }
  .status-cell { padding-right: 5px; }
  .status-cell + .status-cell { padding-left: 7px; }
  .status-value.text { font-size: 16px; }
  .section-head p { display: none; }
}

@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  .view.active { animation: none; }
}

@media print {
  body { padding: 0; background: white; font-size: 12pt; }
  .desktop-rail, .app-header, .bottom-nav, .filters, .search-row, .reader-toolbar, .share-button { display: none !important; }
  .app-shell { display: block; }
  #mainContent { padding: 0; }
  .view { display: none !important; }
  .view.active { display: block !important; }
  .report-browser { display: none !important; }
  .report-reader { display: block !important; }
}

\n- Theme: HBM / memory\n- Priority: high\n- Trigger: intraday move -7.05% vs threshold ±6.0%\n- Last price: 910.29\n- Change vs previous close: -7.05%\n- Change vs open: -1.96%\n- Volume: 6.72M; avg volume: 34.95M; volume ratio: 0.19x\n- Quote timestamp: 2026-07-13T09:47:01-04:00\n- Analyst next step: check filings/news/sector basket before treating this as thesis-relevant.", "summary": "- Theme: AI optical transceivers - Priority: core - Trigger: intraday move -6.73% vs threshold ±5.0% - Last price: 111.86 - Change vs previous close: -6.73% - Change vs open: -3.32% - Volume: 968.9K; avg volume: 6.49M; volume ratio: 0.15x - Quote timestamp: 2026-07-13T09:47:00-0…", "tags": ["AAOI"], "links": [], "related_decisions": ["AAOI"]}, {"id": "report-office-reports-weekly-2026-07-11-weekly-ic-md", "title": "Weekly Investment Committee — 2026-07-11", "category": "Weekly IC", "date": "2026-07-11", "updated": "2026-07-11T11:07:27-04:00", "content": "# Weekly Investment Committee — 2026-07-11\n\n**Evidence cutoff:** 2026-07-11 11:20 EDT; market prices are delayed 2026-07-10 closes.  \n**Portfolio Gate 0:** **FAIL** — `portfolio.json` remains `awaiting_authoritative_export`. Only `INVESTIGATE`/`AVOID`; all current/target/initial/max authorized allocations are **0%** and borrowed capital is **0%**.\n\n## CIO DECISIONS\n\n1. **AVAV — INVESTIGATE (5/10).** Current allocation unknown; target/initial/max **0% / 0% / 0%**. Advance from Gate 2 (74/100) to Gate 3 forensic work, due **2026-07-17**. Delayed close **US$144.58** and 50.608m dated shares imply **US$7.32bn market cap**; cash/debt imply **US$7.67bn EV**, **3.88x FY2026 sales**. Recognition path: US$1.183bn funded backlog, with issuer expecting about 85% recognized in FY2027. Invalidation: normalized funded-backlog conversion fails to produce positive FCF, dilution/debt erase the valuation edge, or conservative upside/downside remains below 3:1. **No trade.**\n2. **IONS — INVESTIGATE (2/10).** Current allocation unknown; target/initial/max **0% / 0% / 0%**. The CARDIO-TTRansform primary-endpoint failure is verified, but full data, regulator/partner strategy and pipeline SOTP are absent. Hard fail: no defensible EV or return distribution. Do not average down.\n3. **JOY.TO — INVESTIGATE (7/10 research conviction; 0% capital).** Existing model still yields roughly **−11.3% probability-weighted return** with **−53% realistic downside**. It remains preferred to OBE inside the oil slot, but not to cash/T-bills or AVAV for research priority. Re-open only on its registered price/operating/debt triggers.\n\nNo `BUY/ADD/HOLD/REDUCE/EXIT/HEDGE` cleared the gates.\n\n## REGIME AND PORTFOLIO\n\n| Regime | Probability | Evidence and implication |\n|---|---:|---|\n| Sticky inflation / soft growth | 45% | Fed remains 3.50%–3.75%; June payroll growth was soft; 3m/10y/30y Treasury yields were 3.85%/4.56%/5.06% on July 10. Prefer balance-sheet quality and near-duration cash flows. |\n| Energy/geopolitical inflation shock | 30% | Physical oil tightness is real, but July IEA/EIA evidence still allows normalization; USO fell 15.6% over the sampled month. Avoid levered producers that need a high strip. |\n| Disinflation with sharper slowdown | 25% | Long-duration Treasuries and defensives would improve, while weak credit/cyclicals deteriorate. TLT was down 1.8% over the sampled month, so this is not the priced base case. |\n\n**Cross-asset read:** delayed one-month proxies show SPY +2.3%, QQQ +1.2%, IWM +1.9%, XLF +5.9%, XLV +4.4%, EFA −0.4%, EEM −0.9%, TLT −1.8%, UUP +1.6%, GLD −2.4%, and USO −15.6%. This is consistent with resilient U.S. risk assets, stronger financials/healthcare, firm USD and pressure on duration/commodities—not a broad panic.\n\n**Portfolio risk:** exposures, concentrations, tax lots, FX, options, cash needs and margin terms remain unknown. Correlated-loss and forced-liquidation stress cannot be run. The only defensible risk budget is **0% new capital and 0% borrowed capital** pending Gate 0.\n\n## CANDIDATES THROUGH GATES\n\n| Candidate | Gate | Triage | EV | Downside | Catalyst | Red team | Portfolio fit | CIO action |\n|---|---:|---:|---:|---:|---|---|---|---|\n| AVAV | 3 | 74/100 | Not yet defensible | Not yet defensible | Normalized model by 2026-07-17; funded-backlog conversion thereafter | **REWORK:** acquisition accounting, cash conversion, debt/dilution | Blocked by Gate 0; compare with TMDX/KTOS and 3m T-bills | **INVESTIGATE, 0%** |\n| IONS | 2 | 58/100; hard fail | Not modeled | Unbounded pending SOTP | Full trial/regulatory strategy; date unverified | **BLOCK-INCOMPLETE:** subgroup/regulatory and pipeline value | Blocked | **INVESTIGATE, 0%** |\n| JOY.TO | 5 complete / 6 blocked | Prior pass | −11.3% weighted | −53% | Price ≤C$3.40 or verified Duvernay/power execution with stable debt | **REWORK:** commodity, execution, refinancing | Inferior to 3.85% 3m Treasury hurdle | **INVESTIGATE, 0%** |\n\n### AVAV specialist conflict reconciliation\n\n- **Industrials specialist steelman:** appropriated funded backlog rose to US$1.183bn; about 85% is expected to convert in FY2027, and the 21% one-month price decline may have reset expectations without destroying long-cycle demand.\n- **Forensic view:** FY2026 revenue was US$1.977bn, but GAAP operating loss was US$311m; CFO was −US$78m and capex US$63m. At 3.88x trailing sales EV, investors still pay for successful normalization.\n- **Independent red team:** BlueHalo integration, purchase accounting, cost-to-complete estimates, working-capital demands, debt and dilution can make backlog growth economically hollow. US$1.458bn unfunded backlog is not an ASC 606 obligation and receives no contracted-revenue credit.\n- **CIO reconciliation:** advance research, not capital. A 65% forecast is registered that at least US$1.00555bn of the April 2026 funded-backlog cohort is recognized in FY2027; margin and FCF still determine value.\n\n**Opportunity-cost comparison:** AVAV is the best promoted lead. Outside its sector, TMDX is the best retained research alternative because transplant logistics has a distinct demand driver, but its current commercial-volume, reimbursement, aircraft-capital and valuation work is incomplete and therefore it does not pass triage. Three-month Treasuries yield **3.85%** with materially lower underwriting risk; AVAV must show positive expected return and at least 3:1 upside/downside after debt/dilution to displace that hurdle. KTOS remains the direct-sector comparator but its May 2026 share count shows material expansion and its forensic comparison is unfinished.\n\n## REJECTED / DEFERRED\n\n- **OBE.TO — AVOID:** issuer guidance remains cash-negative even at US$75 WTI; prior weighted return −23% and bear downside −63%. Re-open only with positive FCF, sequential debt reduction and supportive strip.\n- **NTLA — deferred:** IONS read-through is not yet mapped to NTLA's mechanism, endpoint, comparator, cash runway and dilution; price sympathy is not evidence.\n- **LITE / AAOI — deferred:** large price moves and legacy AI-optics narratives do not replace current unit, margin, working-capital and dilution models. AAOI's sampled one-month decline was 30.6%; no falling-knife promotion.\n- **TMDX — deferred:** distinct healthcare opportunity, but primary commercial-volume, reimbursement, logistics-capital and current valuation evidence remain incomplete.\n- **VST — deferred:** positive power theme and sampled one-month strength (+8.5%), but contract economics, hedges, regulatory exposure and current valuation are not reconciled.\n- **KTOS — deferred:** direct AVAV alternative; funded economics, cash conversion and dilution-adjusted valuation are not yet comparable.\n- **Cash/T-bills — benchmark, not rejected:** 3m Treasury yield of 3.85% is the minimum opportunity-cost hurdle.\n\n## ZERO-BASED DISCOVERY\n\n**Coverage quota:** 14 of 16 lanes (87.5%) were outside the legacy AI-optics/compute focus; no current holdings could be used because the portfolio ledger is non-authoritative. Every mandated lane was searched; only AVAV advanced.\n\n| Lane searched | Evidence/screen | Result |\n|---|---|---|\n| Macro/rates/sovereigns | Fed releases; Treasury 1m–30y curve | Positive cash hurdle and long-end duration pressure; no sovereign trade advanced. |\n| Credit | HY/CCC spread ledger plus HYG/LQD price proxies | Aggregate credit not distressed enough for broad credit beta; weakest issuers remain vulnerable. |\n| FX | UUP proxy +1.6% sampled month | Firm USD is a headwind to unhedged foreign returns; no clean variant identified. |\n| Commodities | EIA/IEA oil evidence; USO/GLD proxies | Oil normalization risk defeats levered OBE/JOY; gold lacked a fresh catalyst. |\n| Broad equities | SPY/QQQ/IWM | U.S. equities resilient; no index dislocation versus T-bills. |\n| Consumer | XLY and generalist screen | No primary-source candidate cleared valuation/catalyst triage. |\n| Financials | XLF +5.9% sampled month; rate curve | Strength is visible, but no bank/insurer had a verified security-level variant in this cycle. |\n| Healthcare | XLV; IONS/NTLA event; TMDX | IONS is event work, NTLA is read-through diagnosis, TMDX deferred. None cleared underwriting. |\n| Software/internet | IGV proxy | No primary-source lead with a valuation reset and recognition path cleared triage. |\n| Industrials/defense | AVAV/KTOS; ITA proxy | **AVAV advanced** on funded backlog plus price reset; KTOS retained as comparator. |\n| Energy/materials | XLE/XLB; OBE/JOY; EIA/IEA | Levered producers fail downside/FCF tests; no new miner/materials lead passed. |\n| Real estate/infrastructure | XLRE; VST | Rate pressure limits broad REIT appeal; VST contract valuation remains incomplete. |\n| International/EM | EFA/EEM | Relative weakness alone is not a catalyst; currency and country-specific evidence absent. |\n| Small/mid caps | IWM; AVAV/KTOS/TMDX/OBE/JOY | AVAV only pass; financing/dilution and cash-conversion hard fails rejected others. |\n| Special situations | Current SEC/company-event queue | No merger, spin, tender, recap or forced-flow setup had verified legal terms and bounded break value. |\n| Contradiction search | Oil tightness versus IEA/EIA normalization; defense backlog versus cash burn | Both favored narratives have credible disconfirming evidence; conviction was capped accordingly. |\n\n## NEXT-WEEK CATALYSTS\n\n- **2026-07-14, 08:30 EDT — June CPI.** Owner: Macro Strategist. If sequential inflation re-accelerates versus May, raise the inflation-shock regime and keep duration/leverage research hurdles high; if broad disinflation arrives with weaker activity evidence, raise the slowdown scenario and re-screen duration/defensives. No trade is authorized from the release without Gate 0.\n- **2026-07-17 — AVAV forensic deadline.** Owner: Forensic Accounting and Valuation. Promote to variant/red-team only if organic margin, working capital, net debt, dilution and three valuation scenarios are reconciled; otherwise return it to Gate 2 or reject.\n- **2026-07-18 — next weekly IC.** Owner: CIO. Re-run all lanes, compare the surviving lead with the best outside-sector candidate and the then-current T-bill hurdle.\n\n## EVIDENCE AND DISSENT\n\nPrimary: [Federal Reserve FOMC statement, 2026-06-17](https://www.federalreserve.gov/newsevents/pressreleases/monetary20260617a.htm); [U.S. Treasury yield curve, observed 2026-07-10](https://home.treasury.gov/resource-center/data-chart-center/interest-rates/pages/xml?data=daily_treasury_yield_curve&field_tdr_date_value=2026); [AVAV FY2026 10-K, filed 2026-06-29](https://www.sec.gov/Archives/edgar/data/1368622/000110465926078906/avav-20260430x10k.htm); [IONS event filing, 2026-07-09](https://www.sec.gov/Archives/edgar/data/874015/000114036126028092/ef20077664_ex99-1.htm); [EIA July STEO](https://www.eia.gov/outlooks/steo/); [IEA July Oil Market Report](https://www.iea.org/reports/oil-market-report-july-2026).\n\nMarket prices and one-month changes are delayed Yahoo chart observations and are corroboration only, not primary evidence or executable quotes. The strongest dissent is that AVAV's FY2026 cash burn is acquisition-distorted and funded backlog makes the current multiple attractive; the unresolved answer is whether normalized organic FCF validates that claim. Managed web search was unavailable, so discovery used direct official endpoints, SEC filings, registered ledgers and deterministic delayed-price data; this limits discovery breadth and is one reason only one candidate advanced.", "summary": "Evidence cutoff: 2026-07-11 11:20 EDT; market prices are delayed 2026-07-10 closes. Portfolio Gate 0: FAIL — portfolio.json remains awaitingauthoritativeexport. Only INVESTIGATE/AVOID; all current/target/initial/max authorized allocations are 0% and borrowed capital is 0%.", "tags": ["AAOI", "AVAV", "IONS", "JOY.TO", "LITE", "NTLA", "OBE.TO", "TMDX", "VST"], "links": [{"label": "Federal Reserve FOMC statement, 2026-06-17", "url": "https://www.federalreserve.gov/newsevents/pressreleases/monetary20260617a.htm"}, {"label": "U.S. Treasury yield curve, observed 2026-07-10", "url": "https://home.treasury.gov/resource-center/data-chart-center/interest-rates/pages/xml?data=daily_treasury_yield_curve&field_tdr_date_value=2026"}, {"label": "AVAV FY2026 10-K, filed 2026-06-29", "url": "https://www.sec.gov/Archives/edgar/data/1368622/000110465926078906/avav-20260430x10k.htm"}, {"label": "IONS event filing, 2026-07-09", "url": "https://www.sec.gov/Archives/edgar/data/874015/000114036126028092/ef20077664_ex99-1.htm"}, {"label": "EIA July STEO", "url": "https://www.eia.gov/outlooks/steo/"}, {"label": "IEA July Oil Market Report", "url": "https://www.iea.org/reports/oil-market-report-july-2026"}], "related_decisions": ["AAOI", "AVAV", "IONS", "JOY.TO", "LITE", "NTLA", "OBE.TO", "TMDX", "VST"]}, {"id": "report-office-reports-daily-2026-07-10-md", "title": "Daily Executive Brief — 2026-07-10", "category": "Daily Brief", "date": "2026-07-10", "updated": "2026-07-10T13:32:40-04:00", "content": "# Daily Executive Brief — 2026-07-10\n\n## DECISION\n\n**Action required today:** INVESTIGATE — LITE only; no capital action  \n**Portfolio Gate 0:** FAIL  \n**Urgency:** This week\n\n## MATERIAL CHANGES\n\n- **Gate 0 remains failed.** `portfolio.json` is still `awaiting_authoritative_export`; positions, cash/liabilities, account/tax types, base currency, constraints, options, and margin terms are not authoritative. All targets and initial/max sizes remain **0%**; borrowed capital remains **0%**.\n- **FACT:** At 13:26 EDT, delayed data showed LITE **+10.25% over two trading days**, triggering its registered threshold; it was **−0.79% on the day** with **0.54x** average volume. This is a price alert—not a thesis.\n- **FACT:** No LITE SEC filing was accepted after the 13:18 EDT prior-report cutoff; the latest listed filing was a Schedule 13G/A accepted July 8. Lumentum’s official newsroom showed no July 10 release and listed May 11 as its latest release. **INFERENCE:** no current primary company event explains the move; cause and valuation remain unresolved.\n\n## PORTFOLIO ACTIONS\n\n| Instrument | Action | Current | Target | Initial/Max | Timing | Invalidation |\n|---|---|---:|---:|---:|---|---|\n| LITE | INVESTIGATE | Unknown | 0% | 0% / 0% | This week | No primary catalyst or valuation edge survives triage |\n\n## RISKS / CATALYSTS\n\n- LITE remains at Gate 2. Current price/share count, forensic valuation, demand/margin bridge, dilution, consensus/variant evidence, independent red team, and portfolio-risk review are incomplete; no BUY/ADD sizing is permitted.\n- No new decision-relevant Fed, Treasury, or HY-credit release was found after the prior note. Next dated macro trigger: **June CPI, July 14 at 08:30 EDT**.\n\n## EVIDENCE CUTOFF\n\n- **2026-07-10 13:29 EDT.** Sources: [LITE delayed chart](https://query1.finance.yahoo.com/v8/finance/chart/LITE?range=5d&interval=1d&includePrePost=false); [SEC submissions](https://data.sec.gov/submissions/CIK0001633978.json); [Lumentum newsroom](https://www.lumentum.com/en/newsroom/news-releases); [Fed releases](https://www.federalreserve.gov/feeds/press_all.xml); [BLS calendar](https://www.bls.gov/schedule/news_release/bls.ics).\n- **Missing inputs:** authoritative broker export and constraints; LITE valuation/catalyst evidence. Managed web search was unavailable, so checks used direct official endpoints.", "summary": "Action required today: INVESTIGATE — LITE only; no capital action Portfolio Gate 0: FAIL Urgency: This week", "tags": ["LITE"], "links": [{"label": "LITE delayed chart", "url": "https://query1.finance.yahoo.com/v8/finance/chart/LITE?range=5d&interval=1d&includePrePost=false"}, {"label": "SEC submissions", "url": "https://data.sec.gov/submissions/CIK0001633978.json"}, {"label": "Lumentum newsroom", "url": "https://www.lumentum.com/en/newsroom/news-releases"}, {"label": "Fed releases", "url": "https://www.federalreserve.gov/feeds/press_all.xml"}, {"label": "BLS calendar", "url": "https://www.bls.gov/schedule/news_release/bls.ics"}], "related_decisions": ["LITE"]}, {"id": "report-reports-2026-07-10-obe-joy-reentry-memo-md", "title": "OBE / JOY Re-entry Decision Memo", "category": "Investment Memo", "date": "2026-07-10", "updated": "2026-07-10T15:21:30-04:00", "content": "# OBE / JOY Re-entry Decision Memo\n\n**As of:** 2026-07-10 15:12 EDT  \n**Current positions:** None, per user  \n**Reference prices:** OBE.TO C$11.98; JOY.TO C$4.06 (delayed market data)  \n**Portfolio context:** approximately C[private portfolio amount] after a prior loss from approximately C[private portfolio amount]; mandate is 50% S&P 500 core plus a 50% sleeve concentrated across 3–5 high-upside ideas; current complete holdings are not yet authoritative\n\n## Decision\n\n| Security | Decision now | Conviction | Plain-English action |\n|---|---:|---:|---|\n| **OBE.TO** | **AVOID / WAIT** | 8/10 | Do not buy it back now. Do not short it. Re-underwrite after positive free cash flow and sequential debt reduction are reported. |\n| **JOY.TO** | **INVESTIGATE / WAIT** | 7/10 | Better candidate than OBE, but do not buy it now. Watch for either a valuation margin of safety or verified Duvernay/power execution plus a supportive oil strip. |\n| **Pair / oil thesis** | **0% allocation now** | 8/10 | The correct bearish position is cash—not a short. A future staged re-entry is permitted only after the triggers below. |\n\n**Bottom line:** The physical-oil thesis is substantially right, but the conclusion “therefore OBE and JOY must rise” is not. Government stock releases, demand destruction, recovering Hormuz flows, producer restarts, heavy company capex, debt and abandonment liabilities can absorb the oil-price upside before it reaches shareholders. The expected value at current prices is not attractive enough to re-open a trade that previously caused a 36% portfolio drawdown.\n\nIf forced to choose one, choose **JOY over OBE**, because its current price is closer to producing-asset value and its balance sheet is less leveraged. That is a ranking, **not an instruction to buy today**.\n\n## What the research says about the oil thesis\n\n### Evidence supporting it\n\n- EIA weekly data show the U.S. SPR fell from about 415.1 million barrels on 2026-03-27 to 319.5 million on 2026-07-03: approximately **95.6 million barrels released**.\n- U.S. commercial crude fell by approximately **50.3 million barrels** over the broad period reviewed.\n- Cushing stocks fell from approximately **31.5 million barrels to 19.6 million**.\n- The WTI curve reviewed was backwardated from approximately US$71.57 for Aug-2026 to US$67.80 for Dec-2027.\n- IEA's July report says OECD stocks fell another 62 million barrels in June and renewed U.S.–Iran fighting could disrupt the normalization forecast.\n\n### Why that does not produce an automatic BUY\n\n- IEA says **44 million barrels of June's OECD draw came from government stock releases**. The system is tight partly because governments are deliberately bridging the deficit.\n- IEA reports oil on water increased by **117 million barrels** in June while onshore stocks fell by about 96 million. Some apparent scarcity is a logistics/transit problem that can reverse as tankers arrive.\n- Gulf exports recovered by 6.5 mb/d in June to 16.1 mb/d, still below 24 mb/d pre-war but moving in the wrong direction for a one-way long-oil trade.\n- IEA projects global oil demand to decline about 1 mb/d in 2026 and says normalization could move the market back toward surplus.\n- EIA's July 7 base case expects a 2.2 mb/d inventory draw in 3Q26, followed by oversupply and **Brent averaging US$65/bbl in 2027**.\n- WTI near US$72 despite renewed strikes implies the market currently expects disruption to remain manageable. A sustained Hormuz impairment is upside optionality, not the base case.\n\n## OBE.TO underwriting\n\n### What is attractive\n\n- The Belly River acquisition adds approximately 2,500 boe/d of light-oil production.\n- Updated 2026 production guidance is 29,000–31,000 boe/d.\n- Management targets approximately 22% production growth in 2027.\n- The stock is a high-beta vehicle if WTI moves materially above US$80–90 and stays there.\n\n### Why it fails the buy gate\n\n- At management's US$75 WTI case, 2026 FFO is approximately C$310m, but free cash flow is still approximately **negative C$14m** and year-end net debt approximately **C$395m**.\n- Using management's approximately C$4m FFO sensitivity per US$1 WTI, a rough US$65 case produces approximately C$270m FFO and **negative C$54m FCF** before unmodeled variances.\n- The syndicated credit facility increased to C$275m, with revolving period to May 2027 and maturity in May 2028. The company also has C$175m of 8.125% notes due 2030.\n- Undiscounted, uninflated decommissioning obligations were approximately C$327m at Q1 before the acquisition adjustment.\n- This is not a low-risk inventory-depletion trade. It is a leveraged acquisition-and-growth program that needs strong oil prices and clean execution.\n\n## JOY.TO underwriting\n\n### What is attractive\n\n- Q1 production was 10,456 boe/d and approximately 60% oil/NGL.\n- Q1 adjusted funds flow was C$13.7m and reported net debt was approximately C$56m.\n- A rough producing-assets-plus-power NAV cross-check is approximately **C$4.87/share**, versus C$4.06, providing some asset support.\n- Duvernay and power projects can create value that is not purely dependent on WTI.\n\n### Why it still fails the buy gate\n\n- Published commodity sensitivities combined with C$80–90m of planned capital and about C$7m of abandonment spending imply negative pre-working-capital FCF around **C$23m at US$65 WTI** and approximately C$12.5m at US$72, under the model assumptions.\n- It is not a pure oil security: natural gas, Alberta power prices, Duvernay drilling and project commissioning all matter.\n- Journey's 30% Duvernay interest is partly exposed to capital timing set by the 70% partner.\n- Approximately C$38m of 10.25% convertible debentures mature in 2029 and convert at C$5/share, creating interest burden and potential dilution near the bull-case price range.\n- Undiscounted decommissioning cash flows were approximately C$217m at Q1.\n- The large 2P NAV requires substantial future development capital and should not be treated as readily realizable equity value.\n\n## Scenario model\n\nThese are **decision ranges, not precise price forecasts**. They use company commodity sensitivities, estimated year-end debt and explicit EV/cash-flow multiples. They exclude taxes, working-capital noise, differential changes, operational misses and takeover premiums.\n\n| Scenario | Probability | WTI | OBE target / return | JOY target / return |\n|---|---:|---:|---:|---:|\n| Bear: Hormuz normalizes; 2027 surplus | 45% | US$60 | C$4.42 / **−63%** | C$1.91 / **−53%** |\n| Base: intermittent disruption | 40% | US$72 | C$10.64 / **−11%** | C$4.29 / **+6%** |\n| Bull: sustained supply impairment | 15% | US$90 | C$19.91 / **+66%** | C$6.85 / **+69%** |\n| **Probability-weighted** | 100% | — | **−23%** | **−11%** |\n\nThe output is robust in one important sense: at current prices, both names need a bullish oil outcome or exceptional execution. JOY is less unattractive, but neither has enough downside protection for an immediate re-entry.\n\nDetailed assumptions: `reports/2026-07-10_obe_joy_scenario_model.csv`.\n\n## Conditional re-entry plan\n\n### Gate 0 — required first\n\nProvide a current broker export or structured holdings list showing positions, cash, account types, cost bases and any margin. Until correlated exposure is known, the formal target remains **0%**.\n\n### Macro gate\n\nAt least one of the following must occur, without the other evidence deteriorating:\n\n1. The 12-month WTI strip remains above **US$75** for 20 trading days; or\n2. SPR/government releases materially slow or stop while commercial and Cushing stocks continue drawing for four weeks; or\n3. A sustained physical disruption is confirmed through lower Gulf exports—not merely headlines or a one-day price spike.\n\n### Company gates\n\n**JOY:** Require reported Duvernay well performance consistent with type-curve expectations, first power-project cash generation on schedule, and no adverse increase in net debt. A price around **C$3.40 or lower** would provide approximately a 30% discount to the rough C$4.87 PDP-plus-power NAV cross-check, subject to updated filings.\n\n**OBE:** Require at least one reported quarter of positive free cash flow and sequential net-debt reduction after the acquisition. Do not buy solely because the share price falls.\n\n### Concentrated sizing if all gates pass\n\nThe portfolio mandate is not conventional diversification: 50% S&P 500 core and 50% in three to five high-upside ideas. Accordingly, a fully earned conviction position can be **10%–17% of the total portfolio**. OBE and JOY are highly correlated expressions of one oil thesis, so together they consume **one conviction slot**, not two.\n\nAssuming C[private portfolio amount] is the full liquid portfolio and there is no overlapping energy exposure:\n\n- **Current allocation: 0%.** Neither security has positive modeled expected value at today's evidence set.\n- If the macro and company gates first pass: **3% / C$2,700 starter tranche** in the preferred name, not 3% as a final diversification cap.\n- After one clean quarter of operating confirmation and improved expected value: increase to **7% / C$6,300**.\n- Fully built position after debt/FCF confirmation: **10%–12.5% / C$9,000–C$11,250**.\n- Exceptional maximum: **15% / C$13,500**, only if probability-weighted upside exceeds 25%, upside/downside is at least 3:1, the bear-case loss is approximately 30% or less, and the current portfolio passes Gate 0.\n- If both securities are used, their **combined** allocation stays within that one 15% thesis budget. JOY should be the core; OBE can only be a higher-beta satellite after its FCF/debt gate passes.\n- **No margin. No averaging down because of price alone.** Add only after positive evidence.\n\nThis distinction matters: a 12.5% position experiencing the current modeled JOY bear case (−53%) would cost approximately **6.6% of the whole portfolio**; the modeled OBE bear case (−63%) would cost approximately **7.9%**. That is too much permanent-loss risk for either name today. Concentration is appropriate only after the entry price or evidence compresses the downside.\n\n## Exit and thesis-breaker rules\n\nExit or decline to enter if any of the following occurs:\n\n1. The 12-month WTI strip remains below US$65 while either company continues a cash-flow-negative capital program.\n2. Hormuz exports normalize and global/onshore inventories begin a sustained rebuild.\n3. Demand remains below 2025 levels as Gulf production returns; inventory depletion was demand destruction rather than durable scarcity.\n4. OBE fails to reduce net debt after the acquisition, loses borrowing-base capacity, or extends growth capex despite negative FCF.\n5. JOY's Duvernay wells materially miss type curves, power commissioning slips or under-earns, or convert/debt refinancing becomes the dominant equity issue.\n6. Either company issues equity or completes another acquisition primarily to fund a weak balance sheet.\n7. A position falls 15%: mandatory full thesis review. At 25% down, exit unless new primary evidence has improved—not merely preserved—the expected value.\n\n## Behavioural control\n\nThe prior C$50,000 loss is sunk. The relevant question is not whether these shares can recover to an old price; it is whether buying them today has better forward expected value than cash or another oil vehicle. Re-entering to “make it back” would recreate the original concentration error.\n\n## Source set\n\n- IEA, *Oil Market Report — July 2026*, published 2026-07-10: https://www.iea.org/reports/oil-market-report-july-2026\n- EIA, *Short-Term Energy Outlook*, released 2026-07-07: https://www.eia.gov/outlooks/steo/\n- EIA weekly petroleum API and Weekly Petroleum Status data: https://api.eia.gov/v2/petroleum/\n- Obsidian Energy Q1 2026 filings and acquisition/guidance releases through SEC EDGAR, CIK 1334388: https://data.sec.gov/submissions/CIK0001334388.json\n- Obsidian syndicated-credit-facility release, 2026-06-23: https://www.sec.gov/Archives/edgar/data/1334388/000119312526279747/obe-ex99_1.htm\n- Journey Energy Q1 2026 financial statements: https://www.journeyenergy.ca/wp-content/uploads/Reports/Financial_Reports/JEI_FS_Q1_2026.pdf\n- Journey Energy Q1 2026 MD&A: https://www.journeyenergy.ca/wp-content/uploads/Reports/Financial_Reports/JEI_MDA_Q1_2026.pdf\n- Journey Energy June 2026 corporate presentation: https://www.journeyenergy.ca/wp-content/uploads/Reports/Presentations/JOURNEY_June_2026_CORPORATE_PRESENTATION.pdf\n- U.S. Treasury sanctions release, 2026-07-08: https://home.treasury.gov/news/press-releases/sb0212\n\n## Limitations\n\n- Market prices are delayed and should be refreshed before any order.\n- The portfolio file is not authoritative, so formal capital authorization is blocked.\n- Company guidance is issuer-supplied and can change with prices, differentials, weather and execution.\n- Scenario probabilities and valuation multiples are explicit analyst estimates, not facts.", "summary": "As of: 2026-07-10 15:12 EDT Current positions: None, per user Reference prices: OBE.TO C$11.98; JOY.TO C$4.06 (delayed market data) Portfolio context: approximately C[private portfolio amount] after a prior loss from approximately C[private portfolio amount]; mandate is 50% S&P…", "tags": ["JOY.TO", "OBE.TO"], "links": [], "related_decisions": ["JOY.TO", "OBE.TO"]}, {"id": "report-office-reports-2026-07-10-initial-cio-note-md", "title": "Initial CIO Operating Note — 2026-07-10 13:17 EDT", "category": "CIO Note", "date": "2026-07-10", "updated": "2026-07-10T13:18:00-04:00", "content": "# Initial CIO Operating Note — 2026-07-10 13:17 EDT\n\n## DECISION\n\n**Action:** INVESTIGATE  \n**Conviction:** 2/10 for any new security; 10/10 that no portfolio-aware trade can yet be sized  \n**Target allocation:** 0% pending underwriting  \n**Current allocation:** Unknown  \n**Time horizon:** Immediate intake and event triage  \n**Urgency:** Immediate for any IONS/NTLA holding; otherwise this week\n\n## EXECUTIVE THESIS\n\n- **Do not deploy new capital from this note.** Portfolio Gate 0 fails because positions, options, account split, currency, tax basis, cash, and margin terms are not authoritative.\n- The preliminary US regime is **policy-constrained, inflation-sensitive growth**: Fed 3.50–3.75%; June payrolls +57,000; unemployment 4.2%; May CPI +0.47% month over month.\n- Credit is bifurcated: broad HY OAS 2.70% versus CCC 9.75%. Quality financing remains open; weak balance sheets are already stressed.\n- **IONS requires immediate re-underwriting:** CARDIO-TTRansform missed its primary endpoint and showed no treatment effect when added to baseline stabilizer therapy.\n- **NTLA is a diagnosis task, not a buy-the-dip:** its −13.81% two-day move appears plausibly related to ATTR read-through, but no new company 8-K was found in the verified window.\n\n## REGIME SCENARIOS — PRELIMINARY ESTIMATES\n\n| Scenario | Probability | Portfolio implication |\n|---|---:|---|\n| Sticky-inflation soft growth | 45% | Favor quality cash flows, pricing power, shorter-duration exposure; avoid weak financing structures. |\n| Energy-led stagflation / renewed tightening | 35% | Reduce leverage and long-duration beta; favor selective real assets and inflation beneficiaries. |\n| Disinflation with material growth slowdown | 20% | Defensives and duration improve; cyclicals and low-quality credit weaken. |\n\nJune CPI on **July 14** is the next regime-changing event.\n\n## OPPORTUNITY QUEUE\n\n1. **IONS event SOTP** — urgent only if held; no averaging down.\n2. **NTLA read-through analysis** — mechanism/endpoint comparability, cash runway, dilution.\n3. **AVAV/KTOS** — highest-priority non-AI-infrastructure underwriting lane; funded backlog is evidence, not yet value.\n4. **AAOI** — re-underwrite immediately if held; legacy model remains incomplete.\n5. **VST/TMDX** — retain as leads pending primary-source valuation.\n\n## REQUIRED HUMAN INPUT\n\nProvide a redacted broker export using `office/templates/PORTFOLIO_INTAKE.md`. Margin remains **0% recommended use** until forced-liquidation stress passes.\n\n## EVIDENCE\n\nFederal Reserve (2026-06-17); BLS API (verified 2026-07-10); FRED HY OAS (2026-07-08); Ionis SEC 8-K Exhibit 99.1 (2026-07-09); Intellia SEC submissions index; local delayed-price audit log.", "summary": "Action: INVESTIGATE Conviction: 2/10 for any new security; 10/10 that no portfolio-aware trade can yet be sized Target allocation: 0% pending underwriting Current allocation: Unknown Time horizon: Immediate intake and event triage Urgency: Immediate for any IONS/NTLA holding; ot…", "t
