<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f3e8" />
  <meta name="description" content="Gus Investment Office — executive decisions, catalysts, and investment reports." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Gus Office" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Gus Investment Office</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
</head>
<body>
  <a class="skip-link" href="#mainContent">Skip to content</a>
  <div class="app-shell">
    <aside class="desktop-rail" aria-label="Investment Office navigation">
      <div class="identity">
        <div class="monogram" aria-hidden="true">G</div>
        <div><strong>Gus Investment Office</strong><span>Executive decision book</span></div>
      </div>
      <nav class="primary-nav" aria-label="Primary sections">
        <button type="button" data-view="today" class="active"><span>01</span>Today</button>
        <button type="button" data-view="decisions"><span>02</span>Ideas</button>
        <button type="button" data-view="reports"><span>03</span>Reports</button>
        <button type="button" data-view="watch"><span>04</span>Watch</button>
        <button type="button" data-view="guide"><span>05</span>Guide</button>
      </nav>
      <div class="rail-status">
        <span id="railGate" class="status-dot"></span>
        <div><strong id="railGateLabel">Checking portfolio</strong><small id="railUpdated"></small></div>
      </div>
    </aside>

    <div class="app-column">
      <header class="app-header">
        <div class="mobile-identity"><span class="mini-monogram">G</span><div><strong>Investment Office</strong><small id="mobileUpdated">Loading edition…</small></div></div>
        <div class="view-heading"><p id="viewEyebrow">Executive brief</p><h1 id="viewTitle">Today</h1></div>
        <button type="button" id="shareApp" class="share-button" aria-label="Share this edition">Share</button>
      </header>

      <main id="mainContent" tabindex="-1">
        <section id="today" class="view active" aria-label="Today's executive brief"></section>
        <section id="decisions" class="view" aria-label="Current investment decisions"></section>
        <section id="reports" class="view" aria-label="Investment reports"></section>
        <section id="watch" class="view" aria-label="Catalysts and watchlist"></section>
        <section id="guide" class="view" aria-label="Investment glossary and app guide"></section>
      </main>
    </div>

    <nav class="bottom-nav" aria-label="Mobile navigation">
      <button type="button" data-view="today" class="active"><span class="nav-glyph" aria-hidden="true">●</span><span>Today</span></button>
      <button type="button" data-view="decisions"><span class="nav-glyph" aria-hidden="true">◎</span><span>Ideas</span></button>
      <button type="button" data-view="reports"><span class="nav-glyph" aria-hidden="true">≡</span><span>Reports</span></button>
      <button type="button" data-view="watch"><span class="nav-glyph" aria-hidden="true">◇</span><span>Watch</span></button>
      <button type="button" data-view="guide"><span class="nav-glyph" aria-hidden="true">?</span><span>Guide</span></button>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
